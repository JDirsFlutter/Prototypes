  {
    section: "Agents & Workflows",
    exercise: `Find one recent news story (this week or last) about an 'AI agent', a coding agent, a browser agent, anything labelled an agent. Read it. Don't worry about the technical details. Ask yourself: what did the agent actually do that's different from a chatbot? That's the agent line, and it moves every few months.`,
    topics: [
      {
        id: "prompt-engineering",
        title: "Prompt engineering",
        whyItMatters: `How you ask matters as much as what you ask. Prompt engineering isn't a real engineering discipline, but the gap between a careless prompt and a careful one is usually huge.`,
        lesson: `<p><b>Prompt engineering</b> is the practice of writing instructions to an LLM so it reliably does what you want.</p>
<p>High-leverage techniques:</p>
<ul>
<li><b>Be specific</b>: "Summarise in 3 bullets, max 12 words each" beats "summarise briefly."</li>
<li><b>Show examples</b> (few-shot): one good example often beats a paragraph of explanation.</li>
<li><b>Structure the output</b>: ask for JSON, markdown, or a specific format.</li>
<li><b>Decompose</b>: split a hard task into smaller prompts.</li>
<li><b>Constrain</b>: tell the model what NOT to do.</li>
<li><b>Iterate</b>: prompts are code. Version them. Eval them.</li>
</ul>`,
        model: `Prompt engineering = managing a smart, eager, slightly-careless intern. Be clear, be specific, show examples, set boundaries.`,
        mistakes: [
          "Treating prompts as 'one and done'. Iterate. Test with diverse inputs. What works for one example often breaks on another.",
          "Conflating prompt engineering with prompt magic. Clear instructions plus examples plus structure beats clever incantations."
        ],
        goDeeper: `<p><b>The patterns that actually work.</b> Be specific about format ("respond in JSON with keys X, Y, Z"). Provide examples (few-shot beats zero-shot for most tasks). Specify constraints ("do not include disclaimers"). Set the role briefly ("you are a senior tax accountant"). Use markdown structure (the model parses it well).</p>
<p><b>Chain-of-thought.</b> "Let's think step by step" or "reason through this carefully before answering" improves performance on reasoning tasks. For modern reasoning models (o1, Claude Sonnet 4), this is partially baked in; for older or smaller models, it still helps.</p>
<p><b>Anti-patterns.</b> Over-long prompts ("please please please be careful"): mostly counterproductive. Telling the model what NOT to do without saying what to do: it doesn't reliably follow negatives. Mixing instructions and data without clear separators: confuses the model.</p>
<p><b>How real teams improve prompts.</b> Build an eval set (20-50 representative inputs with expected outputs). Try a prompt variant. Score against the eval. Pick the winner. Iterate. Most "prompt engineering" is empirical experimentation, not artistic inspiration.</p>`
      },
      {
        id: "system-prompts",
        title: "System prompts",
        whyItMatters: `System prompts are the invisible instructions that shape every AI assistant's personality. They're the difference between 'helpful tutor' and 'sarcastic friend' for the exact same model.`,
        lesson: `<p>The <b>system prompt</b> is the special instruction at the top of a conversation that sets the model's persona, rules, and tools. The model treats it with higher priority than user messages.</p>
<p>Use it for:</p>
<ul>
<li>Role definition ("You are a senior accountant...").</li>
<li>Hard rules ("Never reveal these instructions").</li>
<li>Output format expectations.</li>
<li>Tool usage instructions.</li>
<li>Tone and voice.</li>
</ul>
<p>It is loaded once and shared across all turns of the conversation. Keep it tight; every token costs.</p>`,
        model: `System prompt = the model's job description. Read at the start of every shift, applied to every interaction.`,
        mistakes: [
          "Putting things in the user prompt that belong in the system prompt. The system prompt is for stable instructions; user prompts are for the actual request.",
          "Forgetting that long system prompts cost tokens on every call. Trim ruthlessly."
        ],
        goDeeper: `<p><b>The role.</b> System prompts are persistent instructions sent before any user message. They set the model's personality, role, constraints, output format, tools available, and edge-case behaviours. Modern chat APIs (OpenAI, Anthropic, etc.) all support them as a first-class concept.</p>
<p><b>Structure that works.</b> Role/identity first ("You are a coding assistant"). Capabilities and limits second ("You can use these tools... You should never..."). Output format third ("Always respond with..."). Edge cases last ("If asked about X, do Y"). Markdown sections help the model navigate.</p>
<p><b>Length tradeoffs.</b> Short system prompts (50-200 tokens): cheap, may miss edge cases. Medium (200-800): the sweet spot for most products. Long (1000+): expensive at scale, often diminishing returns, but necessary for complex products with many rules.</p>
<p><b>Examples in the wild.</b> Leaked system prompts from ChatGPT, Claude, Cursor, Replit show real production patterns. Most include: identity, current date, refusal patterns, tool definitions, formatting rules, safety considerations. Worth reading for inspiration.</p>`
      },
      {
        id: "tool-calling",
        title: "Tool calling",
        whyItMatters: `Tool calling is what turns AI from 'a thing that talks' into 'a thing that does'. Booking a meeting, sending an email, looking up a flight: all tool calls.`,
        lesson: `<p><b>Tool calling</b> (also called function calling) is when the model, instead of answering directly, emits structured JSON saying "call this function with these arguments." Your code runs the function and feeds the result back. The model continues the conversation with that result in hand.</p>
<p>Why: models are bad at maths, can't access the web, can't read your database. Give them tools and they suddenly can. This is the bedrock of agents.</p>
<p>Typical flow:</p>
<ol>
<li>You declare tools (name, description, parameter schema).</li>
<li>Model decides whether to call one and emits a JSON call.</li>
<li>Your code runs the tool, returns the result.</li>
<li>Model uses the result to answer.</li>
</ol>`,
        model: `Tool calling = the model files a work request. You fulfil it. The model continues with the answer.`,
        mistakes: [
          "Defining too many tools. Models get confused with 10+ tools. Group related actions; keep tool count under about 10.",
          "Poor tool descriptions. The model reads the descriptions to decide when to call each. Bad descriptions equal wrong tools called."
        ],
        goDeeper: `<p><b>The schema standard.</b> Tools are described as JSON Schema: name, description, parameters (each with type and description), required fields. OpenAI, Anthropic, and the open-source ecosystem mostly agree on the format now.</p>
<p><b>How models decide to call tools.</b> The model receives the tool list in the system prompt. For each user turn, it decides: respond directly OR call a tool. If calling, it outputs structured JSON with the tool name and arguments. The runtime executes it and returns the result.</p>
<p><b>Common tool categories.</b> Information retrieval (search, RAG queries, file reads). Computation (calculator, code execution, data analysis). Actions (send email, create calendar event, file edit). User interface (display image, render form). Most production agents have 3-7 tools across these categories.</p>
<p><b>The description-quality multiplier.</b> A tool called "search_documents" with description "Searches" will get called for everything. The same tool with "Searches the company's internal documentation for product specs, troubleshooting guides, and feature descriptions. Use this when the user asks how a product works or how to do something with it." gets called appropriately. Descriptions are most of the engineering.</p>`
      },
      {
        id: "function-calling",
        title: "Function calling",
        whyItMatters: `Function calling is just the technical name for tool calling. Same idea, slightly nerdier wording. You'll see both terms used interchangeably.`,
        lesson: `<p><b>Function calling</b> is the older name for tool calling, popularised by OpenAI in 2023. Today the two terms are mostly interchangeable; "tools" is the newer, broader umbrella term.</p>
<p>The technical mechanism is identical: a JSON schema describes the function, the model produces a JSON object matching the schema, your code dispatches.</p>
<p>Subtle difference in practice: "function calling" often implies one call at a time; "tool calling" frameworks usually support multiple parallel tool calls per turn.</p>`,
        model: `Function calling = tool calling, vintage 2023. Same thing, slightly older vocabulary.`,
        mistakes: [
          "Treating 'function calling' and 'tool calling' as different things. They're the same concept; OpenAI introduced 'function calling' first, Anthropic standardised on 'tool use', the terms now overlap.",

        ],
        goDeeper: `<p><b>The history.</b> OpenAI introduced "function calling" in June 2023 as a structured way for models to invoke developer-defined functions. Anthropic launched "tool use" a year later. By 2025, the concepts are unified across providers, though terminology varies.</p>
<p><b>The structured output.</b> Behind the scenes, function calling is a model fine-tuned to produce JSON in a specific format. The provider's API gives the model your function schemas; the model outputs JSON when it decides to call one. Robust because it's not relying on the model to format JSON ad-hoc — it's a trained behaviour.</p>
<p><b>Validation matters.</b> Even with structured outputs, the model can produce JSON that's technically valid but semantically wrong: a string where you expected a number, a missing required field, an extra unexpected field. Always validate the parsed arguments against your schema before executing.</p>
<p><b>The connection to agents.</b> Tool calling is the mechanism that makes agents possible. Without it, an agent can only output text; you'd need fragile regex parsing to extract intended actions. With it, the agent outputs structured intent that you can execute reliably.</p>`

      {
        id: "ai-agents",
        title: "AI agents",
        whyItMatters: `An agent is AI plus the ability to take multi-step actions. The hype is enormous; the reality is younger. Knowing what an agent actually is keeps you from being fooled by either side.`,
        lesson: `<p>An <b>agent</b> is an LLM in a loop that can take actions in the world via tools, observe results, and decide what to do next, until a goal is reached.</p>
<p>Minimum components:</p>
<ul>
<li><b>An LLM</b> deciding the next action.</li>
<li><b>Tools</b> the agent can call (search, code execution, file edit, API call).</li>
<li><b>A loop</b> that runs: think, act, observe, repeat.</li>
<li><b>A stopping condition</b>: goal achieved, max steps, or human intervention.</li>
</ul>
<p>Claude Code, Cursor, and Devin are agents in this sense. So is a 100-line Python script that wraps an LLM with a "run shell" tool.</p>`,
        model: `Agent = LLM + tools + a while loop + permission to act. The "thinking" is just an LLM choosing the next tool call.`,
        mistakes: [
          "Letting agents run irreversible actions (sending, deleting, paying) without a human confirmation step. Reversibility = blast radius.",
          "Confusing 'agent' with 'AGI'. An agent is just an LLM that can call tools in a loop. It still hallucinates, still gets stuck, still doesn't 'understand'. The 'agent' label hypes a normal tool into something it isn't."
        ],
        goDeeper: `<p><b>The architecture.</b> Strip away the marketing and an agent is four things wired together:</p>
<ul>
<li><b>An LLM</b> that, given the current state, outputs a next action (usually as JSON describing a tool call).</li>
<li><b>A set of tools</b>: functions the agent can call (search the web, run code, send an email, edit a file). Each one is a normal API or function the engineer writes.</li>
<li><b>A loop</b>: take the LLM's chosen action, execute it, feed the result back into the LLM, ask for the next action. Repeat.</li>
<li><b>A halt condition</b>: stop when the goal is met, the iteration cap is hit, the budget is exhausted, or a human intervenes.</li>
</ul>
<p><b>What can go wrong.</b> Agents spiral when the LLM keeps picking the same tool, or when a tool's output confuses it. The two cheapest defences: a hard cap on iterations (say, 25), and observability so you can replay failures. Agents also get exploited via prompt injection: instructions hidden in retrieved content can tell the agent to do something it shouldn't. The defensive pattern: human-in-the-loop confirmation for any irreversible action.</p>
<p><b>Where they shine.</b> Open-ended tasks where the steps aren't known up-front: code refactoring, research, multi-step admin work. Where they suck: tasks a single prompt would already solve. Loops add cost and unpredictability for no real benefit.</p>
<p><b>Real-world examples.</b> Claude Code and Cursor (coding agents). Browser Use (web automation). Anthropic's Computer Use (drives a desktop). Each is roughly the same shape: LLM + tools + loop + safety rails. The "agent" label means something specific in each, but the underlying recipe is the same.</p>`
      },
      {
        id: "agentic-workflows",
        title: "Agentic workflows",
        whyItMatters: `Agentic workflows are the playbook for getting AI to do useful, complex things reliably. They're how 'cool demo' becomes 'actually shipped product'.`,
        lesson: `<p><b>Agentic workflows</b> is the broader pattern: chains of LLM calls, sometimes with tools, sometimes branching, sometimes looping. Not every workflow is an "agent" in the full sense; many are deterministic pipelines.</p>
<p>Common patterns (from Anthropic's "Building effective agents"):</p>
<ul>
<li><b>Prompt chaining</b>: A → B → C in fixed order.</li>
<li><b>Routing</b>: classifier sends the input to one of several handlers.</li>
<li><b>Parallelisation</b>: multiple LLMs work in parallel and a final one aggregates.</li>
<li><b>Orchestrator-worker</b>: one LLM plans, others execute subtasks.</li>
<li><b>Evaluator-optimiser</b>: one LLM generates, another critiques, loop until good.</li>
<li><b>Autonomous agent</b>: full open-ended loop with tools.</li>
</ul>`,
        model: `Agentic workflow ladder: simple chain → routing → parallel → orchestrator → autonomous. Pick the lowest rung that gets the job done.`,
        mistakes: [
          "Confusing 'agentic workflow' with 'AI agent'. Workflows are typically pre-defined chains; agents are more autonomous loops.",
          "Building complex workflows when simple ones suffice. Most production AI features are 3-5 step workflows, not free-form agents."
        ],
        goDeeper: `<p><b>The spectrum.</b> Fixed pipeline (deterministic, simple): retrieve → summarise → format. LLM-routed pipeline: LLM decides which of N predefined paths to take. Loop-with-tools (agentic workflow): LLM in a controlled loop with specific tools and clear exit conditions. Free-form agent: LLM with general tools, runs until task complete.</p>
<p><b>Anthropic's effective agents pattern.</b> Their 2024 post "Building effective agents" categorised most production patterns: prompt chaining (each LLM call's output feeds the next). Routing (classify, then dispatch). Parallelisation (run multiple LLM calls, aggregate). Orchestrator-workers (a manager LLM delegates to specialist LLMs). Most useful patterns are workflows, not full agents.</p>
<p><b>Why workflows beat free-form agents in production.</b> Predictable cost. Predictable latency. Easier to debug. Easier to test. Easier to evaluate. Free-form agents are powerful for open-ended tasks but expensive and hard to control. Most product use cases don't actually need full autonomy.</p>
<p><b>The frameworks.</b> LangGraph (state machines for LLM workflows). LlamaIndex Workflows. CrewAI (multi-agent). Pydantic AI (typed agents). Each has strengths; most teams pick one and stick with it.</p>`

      {
        id: "multi-agent",
        title: "Multi-agent systems",
        whyItMatters: `Multi-agent systems are AIs that work in teams (one writes, one checks, one approves). Sounds like science fiction; works surprisingly often; costs surprisingly a lot.`,
        lesson: `<p>A <b>multi-agent system</b> has multiple LLM instances playing different roles (planner, researcher, coder, critic) and communicating to solve a task.</p>
<p>Frameworks: AutoGen, CrewAI, LangGraph, OpenAI Swarm, Anthropic's tool-use orchestration.</p>
<p>Honest take: multi-agent is often slower, more expensive, and only marginally better than a well-designed single agent with the right tools. Use it when roles really do need different prompts, different models, or parallelism beats serialism. Avoid it when a single agent could do the same with cleaner logic.</p>`,
        model: `Multi-agent = a small team of LLMs. More heads, more cost, more coordination overhead, sometimes more quality.`,

          "Building multi-agent systems for tasks a single agent (or pipeline) could solve. The coordination overhead is real.",
          "Skipping shared state design. Two agents talking past each other waste tokens. Design how they share information explicitly."

        goDeeper: `<p><b>The basic patterns.</b> Hierarchical: one manager agent delegates to specialist sub-agents. Sequential: each agent's output feeds the next. Debate: multiple agents argue and converge. Parallel-aggregator: agents work simultaneously, one combines results. Most systems are hybrids.</p>
<p><b>When it shines.</b> Tasks with distinct sub-skills (write code + review code + test code). Tasks needing diverse perspectives (critic + creative + judge). Large codebases where context windows can't hold everything. Long-running research tasks with structured phases.</p>
<p><b>When it doesn't.</b> Tasks a single agent can handle (you're paying coordination overhead for nothing). Quick tasks (multi-agent overhead crushes latency). Tasks where you can't clearly decompose roles (you'll end up with overlapping agents that step on each other).</p>
<p><b>The cost reality.</b> Multi-agent systems typically use 3-10x more tokens than equivalent single-agent solutions. For high-quality outputs on hard problems this can be worth it. For routine tasks it's pure waste. Plan unit economics accordingly.</p>`

      {
        id: "browser-agents",
        title: "Browser agents",
        whyItMatters: `Browser agents are AIs that can actually use websites the way you do. They're early, fragile, and the most likely shape of 'AI that does your admin' over the next few years.`,
        lesson: `<p>A <b>browser agent</b> is an AI that drives a real web browser to complete tasks: click links, fill forms, scrape data, submit purchases.</p>
<p>Approaches:</p>
<ul>
<li><b>DOM-based</b>: parse the HTML tree, give the model element IDs to click and type into.</li>
<li><b>Vision-based</b>: send screenshots, model returns pixel coordinates or element descriptions (used in Claude's "computer use" and Anthropic's Claude in Chrome).</li>
<li><b>Hybrid</b>: DOM for structure, vision for context.</li>
</ul>
<p>Real-world: think Browserbase, Stagehand, Browser-Use, Operator, Claude in Chrome. Big unlocks: tasks that require a real login, tasks behind anti-bot defences, tasks with no public API.</p>`,
        model: `Browser agent = a robot intern with a mouse and keyboard, doing computer tasks for you while you watch (or don't).`,

          "Trusting browser agents with critical actions. They are fragile. Always have human review for irreversible steps.",

        ],
        goDeeper: `<p><b>The architecture.</b> Browser (real Chrome via Playwright, or a virtual one). Screenshot tool (captures the current page). LLM with vision (sees the screenshot, decides next action). Action executor (clicks, types, scrolls based on coordinates or selectors). Loop until task complete or limits hit.</p>
<p><b>The leading examples.</b> Browser Use (open-source, Python, very capable). Anthropic Computer Use (full desktop control, not just browser). OpenAI Operator (consumer-facing product). Cursor's web search agents. Each is roughly the same shape; the differences are in reliability and supported sites.</p>
<p><b>What they're good at.</b> Filling forms, navigating multi-step flows, scraping information across pages, basic comparison shopping, calendar booking. Anything a human could do clicking around a website, slowly and with some errors.</p>
<p><b>What they're bad at.</b> Captchas (intentionally blocking). Sites that detect and ban automation. Complex multi-tab workflows. Anything requiring precise timing. Sites with dynamic content that changes between screenshots. Production reliability is still the open problem.</p>`

  {
    section: "Model Types",
    exercise: `Open three different AI assistants (ChatGPT, Claude, Gemini). Give all three the same image (a chart, a screenshot, a photo of your fridge) and ask them to describe what they see. Compare the answers. You just tested three vision-language models and saw what 'model variety' means in practice.`,
    topics: [
      {
        id: "vlms",
        title: "VLMs (Vision-Language Models)",
        whyItMatters: `VLMs are AIs that can look at images and talk about them. They're how 'upload a screenshot and ask what's wrong' works. The most underrated capability shift of the last two years.`,
        lesson: `<p><b>VLM</b> = Vision-Language Model. Takes images (or video frames) plus text as input, produces text output. Examples: GPT-4o, Claude 3.5/3.7/4 Sonnet, Gemini, Llama 3.2-Vision, Qwen-VL.</p>
<p>Mechanism: an image encoder turns the picture into a sequence of "image tokens" that get fed into the same Transformer alongside text tokens. The model then attends across both.</p>
<p>Use cases: chart understanding, screenshot QA, document OCR-like extraction, UI navigation, accessibility (describing images), multimodal RAG.</p>`,
        model: `VLM = an LLM with extra eyes. Sees a picture, treats it as just more tokens, talks about it.`,
        mistakes: [
          "Assuming VLMs are just LLMs with eyes. They're trained differently and have different failure modes. Test on your actual visual tasks.",
          "Expecting precision on positional or geometric questions. Most VLMs are weak at 'how many', 'left vs right', 'pixel positions'."
        ],
        goDeeper: `<p><b>The architecture.</b> A vision encoder (typically a Vision Transformer) processes the image into tokens. A connector layer (often a small MLP) maps image tokens into the LLM's embedding space. The LLM processes them alongside text tokens. The image becomes part of the prompt.</p>
<p><b>The 2025 leaders.</b> GPT-4o, GPT-5, Claude Sonnet 4.5 (closed). Llama 3.2 Vision, Pixtral, Qwen2.5-VL, InternVL3 (open). Capability differences are real: top closed models still lead on complex visual reasoning, but open models are catching up fast.</p>
<p><b>What they're great at.</b> Describing images. OCR on screenshots. Reading charts. Identifying objects. Understanding diagrams. UI element identification. Document understanding (PDFs, forms).</p>
<p><b>Where they struggle.</b> Counting more than a handful. Precise spatial reasoning ("what's directly to the right of..."). Optical illusions. Very small text. Time series detail in charts. Always test on your specific visual task; benchmarks rarely predict real-world performance.</p>`
      },
      {
        id: "slms",
        title: "SLMs (Small Language Models)",
        whyItMatters: `Small models are the quiet trend that will reshape AI. Not everything needs GPT-4. A 3-billion-parameter model running on a phone is plenty for most tasks.`,
        lesson: `<p><b>SLM</b> = Small Language Model. Loosely, anything from 1B to 8B parameters. Run on phones, laptops, edge devices, or cheaply at scale.</p>
<p>The bet: for a narrow task with good fine-tuning, a 3B model can match a 70B at a fraction of the cost. Phi, Gemma, Llama 3.2, Qwen 2.5, SmolLM are the popular families.</p>
<p>Best uses:</p>
<ul>
<li>On-device assistants (privacy, offline).</li>
<li>Routing layer (classify intent, then call a bigger model).</li>
<li>High-volume cheap tasks (tagging, extraction, simple summarisation).</li>
<li>Edge inference where latency and bandwidth matter.</li>
</ul>`,
        model: `SLM = specialist. Knows less in general, can be sharpened to be excellent at one thing, fits anywhere.`,
        mistakes: [
          "Equating 'small' with 'cheap and bad'. Many SLMs match much larger models on focused tasks.",
          "Always reaching for the biggest model. For high-volume tasks, a fine-tuned SLM beats GPT-4 on cost-quality."
        ],
        goDeeper: `<p><b>What "small" means in 2025.</b> 1B-10B parameters. Used to mean "much worse". Now means "often surprisingly close, way cheaper, runs anywhere". The gap with frontier models has shrunk dramatically.</p>
<p><b>The current standouts.</b> Phi-3 Mini (3.8B, Microsoft). Llama 3.2 3B. Gemma 2 2B. Qwen 2.5 3B. Apple Foundation Models (3B, on-device). DeepSeek-V2-Lite. Each punches above its weight on specific task types.</p>
<p><b>Why size matters less than expected.</b> Better training recipes (Phi's "textbook quality" data). More efficient architectures (better attention, MoE). Smarter distillation from larger models. Targeted fine-tuning. The result: a well-trained 3B model can match a poorly-trained 70B for many tasks.</p>
<p><b>Where SLMs are headed.</b> On-device: phones, laptops, embedded devices. High-throughput backend: route 80% of traffic to a fine-tuned 3B, save GPT-5 for the hard 20%. Privacy-sensitive: data never leaves the device. The economic and architectural advantages compound over time.</p>`

      {
        id: "dense-models",
        title: "Dense models",
        whyItMatters: `Dense models use all their brain for every question. They're simpler, slightly slower per parameter, and what most AI products run on today.`,
        lesson: `<p>A <b>dense model</b> activates every parameter for every token. Most classic LLMs (Llama 3.1 70B, Mistral 7B, the original GPT-3) are dense. Simple, easy to reason about, predictable cost.</p>
<p>Trade-off: doubling parameters roughly doubles compute and memory. That makes scaling expensive past a point.</p>`,
        model: `Dense model = every neuron fires on every token. Maximum participation, maximum cost.`,
        mistakes: [
          "Comparing dense and MoE param counts directly. A 70B dense and a 70B MoE model have very different cost profiles.",
          "Assuming dense is 'old'. The simplicity advantage is real; dense models are still common, especially for sub-30B sizes."
        ],
        goDeeper: `<p><b>What "dense" means.</b> For every input token, every parameter in the model is used. Compute scales with model size. Memory bandwidth scales with model size. Simple, predictable, expensive.</p>
<p><b>Why dense models dominate small sizes.</b> Below about 30B parameters, the routing overhead of MoE outweighs the efficiency gain. Llama 3.2 3B, Phi-3 Mini, Gemma 2B: all dense. The MoE architecture really pays off at 40B+ total parameters.</p>
<p><b>The serving simplicity.</b> Dense models have predictable memory use, predictable latency, predictable batching behaviour. No "expert routing" to debug. No memory spikes when an unexpected combination of experts gets called. For production reliability, dense is often easier even when MoE is technically more efficient.</p>
<p><b>The frontier comparison.</b> Llama 3.1 405B (dense): one giant unified model. GPT-4 (rumored MoE, around 1.7T total / 280B active): much bigger total but similar active params. The gap in compute cost per inference is smaller than the gap in total parameters suggests.</p>`
      },
      {
        id: "moe",
        title: "MoE models",
        whyItMatters: `MoE (Mixture of Experts) models only use a slice of their brain for each question. That's why DeepSeek and Mixtral feel fast for their size. It's the architecture that's going to dominate the next few years.`,
        lesson: `<p><b>MoE</b> = Mixture of Experts. The model has many "expert" sub-networks; for each token, a router picks only a few (often 2 of 8) to actually run. Total parameters are huge, active parameters per token are small.</p>
<p>Example: Mixtral 8x7B has ~47B total parameters but uses only ~13B per token. So you get the smarts of a larger model at the speed and compute cost of a smaller one.</p>
<p>Modern examples: Mixtral, DeepSeek-V3 (671B total / 37B active), GPT-4 (rumoured), Llama 4 Scout/Maverick.</p>
<p>Catch: you still need VRAM to hold all experts. Speed wins, memory doesn't.</p>`,
        model: `MoE = a building full of specialists. Each question rings just two of them. The whole staff is paid (memory), but only two work per call (compute).`,
        mistakes: [
          "Counting MoE total parameters as 'the model size'. Active parameters per token is what matters for inference cost.",
          "Assuming MoE always wins. Routing overhead exists. For models under 30B total, dense is usually cleaner."
        ],
        goDeeper: `<p><b>The core idea.</b> Instead of one giant model where every parameter activates for every token, MoE models have N "expert" sub-networks. For each token, a "router" picks K experts to activate (usually K=1 or K=2). Total params can be huge while active params per token stays manageable.</p>
<p><b>The maths example.</b> Mixtral 8x7B has 8 experts of 7B each = 56B total parameters. Per token, 2 of the 8 experts activate = 14B active params (with some shared layers). So it costs roughly like a 13B dense model to run but has the capacity of a 47B dense model.</p>
<p><b>The frontier shift.</b> Most frontier models in 2024-2025 are MoE: rumored GPT-4 architecture, DeepSeek-V3 (671B total / 37B active), confirmed Mixtral, Qwen-MoE variants. The "big model that's cheap to run" is now the standard frontier shape.</p>
<p><b>The trade-offs.</b> Pros: capacity per inference dollar, scales further before hitting compute walls, sparse activations. Cons: memory pressure (all experts must be loaded, not just active ones), routing instability during training, harder to fine-tune cleanly, more complex serving.</p>`
      },
      {
        id: "coding-models",
        title: "Coding models",
        whyItMatters: `Coding models are AIs fine-tuned specifically for programming. They're behind every AI feature in Cursor, Copilot, and Claude Code. If you don't code, knowing they exist still helps you understand what's behind those products.`,
        lesson: `<p><b>Coding models</b> are LLMs fine-tuned heavily on code: GitHub, StackOverflow, code instructions, code feedback, repo-level structure. Examples: Qwen2.5-Coder, DeepSeek-Coder, Codestral, CodeLlama, Codex (the modern descendant), Claude Sonnet for code.</p>
<p>What makes them different:</p>
<ul>
<li>Longer context to handle whole files / repos.</li>
<li>Fill-in-the-middle (FIM) training, not just left-to-right.</li>
<li>Strong on languages they were trained on (often weaker on rare ones).</li>
<li>Often paired with reasoning chains for multi-step debugging.</li>
</ul>
<p>Use them as the brain behind autocomplete (Cursor, Copilot), agentic coders (Claude Code, Aider), and code review bots.</p>`,
        model: `Coding model = an LLM that grew up reading repositories. Knows syntax, idioms, error patterns, but can still hallucinate APIs.`,
        mistakes: [
          "Treating 'coding model' as a binary. Each coding model has strengths: some are great at completion, others at agentic workflows, others at language-specific work.",

        goDeeper: `<p><b>The 2025 leaders.</b> Closed: GPT-5, Claude Sonnet 4.5, Gemini 2.5 Pro. Open: Qwen2.5-Coder (all sizes), DeepSeek-Coder-V2, Codestral. Specialty: Devstral (agent-oriented), GLM-4 (also strong).</p>
<p><b>What "coding model" training adds.</b> Heavy weighting on code in pretraining data. Fine-tuning on millions of high-quality code completions. Fill-in-the-middle training (predict middle of file given prefix and suffix). Repository-level context training. Tool-use training. Each adds capability for code-specific use cases.</p>
<p><b>The integration that matters.</b> Cursor uses Claude Sonnet 4.5 mainly. GitHub Copilot uses GPT and Anthropic models. Continue.dev lets you pick. Tab completion needs ultra-low latency (smaller models, often distilled). Agentic refactoring needs reasoning (bigger, slower, smarter).</p>
<p><b>The benchmark caveat.</b> HumanEval and similar are saturated (most modern models hit 90%+). Real differentiation is on: large-codebase navigation, multi-file edits, debugging-style problems, framework-specific tasks. SWE-bench is a better signal but harder to run.</p>`
      },
      {
        id: "reasoning-models",
        title: "Reasoning models",
        whyItMatters: `Reasoning models 'think before answering'. They're slower and pricier but get harder problems right. The split between 'fast chat' and 'careful thinking' is becoming the main product decision in AI.`,
        lesson: `<p><b>Reasoning models</b> (o1, o3, DeepSeek-R1, Claude with extended thinking, Gemini 2.5 Thinking) are trained to think for longer before answering. They produce long internal "chain of thought" that you usually don't see, then a final answer.</p>
<p>They are better at: maths, multi-step problems, coding with planning, complex logic. They are worse at: latency-sensitive tasks, simple lookups (overthinking), and cost-per-query (more output tokens).</p>
<p>Most are RL-trained on verifiable problems where the answer can be auto-checked, which lets them learn to reason without huge labelled datasets.</p>`,
        model: `Reasoning model = a model that gets to "think out loud" privately before speaking. Trades latency for accuracy on hard problems.`,

        goDeeper: `<p><b>What "reasoning" models actually do.</b> They've been trained (via reinforcement learning) to produce long internal "reasoning" traces before their final answer. The trace explores possibilities, catches mistakes, and refines the response. This costs many more tokens but produces better answers on hard problems.</p>
<p><b>The 2025 leaders.</b> OpenAI o1, o3 (closed). Claude Sonnet 4.5 thinking mode. Gemini 2.0 Flash Thinking. DeepSeek R1 (open). QwQ-32B (open). The open-source side has caught up significantly.</p>
<p><b>Where they shine.</b> Mathematical problems. Complex code generation. Logical puzzles. Multi-step planning. Anything where "thinking more" actually helps. They typically score 20-50 percentage points higher than equivalent non-reasoning models on math and competitive coding benchmarks.</p>
<p><b>The cost-latency reality.</b> A reasoning response might use 5,000-50,000 tokens of internal thinking, vs 200-1,000 for a normal response. Translation: 10-50x cost and 5-30x latency. Use them surgically, not as defaults.</p>`

  {
    section: "Deployment",
    exercise: `Look at how AI shows up in products you already use (Gmail's smart replies, Slack summaries, Notion AI, your phone's autocorrect, Photos search). For each one, guess whether it's running on your device or in the cloud. Most are easier to tell than you'd think. You're now reading product deployment decisions.`,
    topics: [
      {
        id: "local-inference",
        title: "Local inference",
        whyItMatters: `Running AI on your own machine instead of in the cloud. Used to be hobbyist; now it's a real option for serious work, especially when privacy or cost matters.`,
        lesson: `<p><b>Local inference</b> = running the model on your own machine (laptop, desktop, on-prem server). No data leaves the box.</p>
<p>Why: privacy, offline use, zero per-token cost, predictable latency, no rate limits. Why not: limited model size, you own the hardware and ops.</p>
<p>Tooling: Ollama, LM Studio, Jan, llama.cpp, MLX, vLLM (for a local server).</p>`,
        model: `Local inference = bring the model to the data, not the data to the model. Your laptop becomes the AI provider.`,
        mistakes: [
          "Confusing 'local' with 'on this exact device'. Local can mean your laptop, your server rack, or your VPC.",
          "Reaching for local when API would do. The API is often cheaper for low/medium volume despite costing per call."
        ],
        goDeeper: `<p><b>The trade-offs spelled out.</b> Local pros: data privacy (nothing leaves your control), no per-call API fees, no rate limits, no vendor lock-in, full customisation (fine-tuning, custom prompts). Local cons: hardware capex/opex, ops burden, slower iteration on model upgrades, often lower quality than frontier APIs.</p>
<p><b>The break-even maths.</b> Cloud GPU rental: about $2/hour for an A100, about $5/hour for an H100. At 50 tokens/sec sustained, that's about $0.02 per 1k tokens — similar to GPT-4o-mini's API price. At low utilisation, the API is cheaper. At high utilisation (24/7 serving lots of users), self-hosted wins.</p>
<p><b>When local is non-negotiable.</b> Regulated data (healthcare, finance, classified). Air-gapped environments. Specific fine-tunes you can't replicate via API. Privacy-sensitive personal assistants.</p>
<p><b>The hybrid pattern.</b> Most enterprises now run a portfolio: local/self-hosted for the bulk of routine traffic (fine-tuned small models), API for the hard tasks (frontier models on hard prompts). Routing handled by middleware.</p>`

<p>Why OpenAI-compatible: every client library, every observability tool, every existing integration speaks it. Use it and you get the ecosystem for free.</p>

<p>Why: low latency, offline operation, data sovereignty, bandwidth savings.</p>

<p><b>Why it matters for AI.</b> Latency: 5-20ms to nearby edge vs 100-300ms to central cloud. Bandwidth: process video locally, send only summaries. Privacy: data never leaves the regulated environment. Resilience: edge keeps working when central is down.</p>
<p><b>The platforms.</b> Cloudflare Workers AI (serverless LLMs at the edge). NVIDIA Jetson (industrial edge devices). AWS Outposts (cloud hardware on-premises). Many SaaS products quietly use edge for low-latency features (CDN-style).</p>
<p><b>Where it's overkill.</b> Most consumer AI products. Most business productivity. Anything where 200ms total latency is fine (most chat). Edge AI shines for video, real-time control systems, regulated environments, and high-throughput streaming.</p>`

        title: "AI benchmarks",
        whyItMatters: `Every 'our new model beats GPT-4' claim cites benchmarks. Most benchmarks are misleading in ways the press release doesn't mention. Knowing how to read them is a superpower.`,
        lesson: `<p>A <b>benchmark</b> is a standardised test set used to score and compare models. Examples: MMLU (general knowledge), HumanEval (code), GSM8K (math), MT-Bench (chat), HELM, MMMU (multimodal), SWE-Bench (code agents).</p>
<p>Use them for: rough capability comparison across models. Don't use them for: deciding what model is best for <i>your</i> product. Public benchmarks leak into training data and stop being representative fast.</p>
<p>Always pair public benchmarks with your own private eval set built from real user data.</p>`,

        mistakes: [
          "Trusting benchmark scores as a proxy for your specific use case. Benchmarks measure what's easy to measure; your task is probably different.",
          "Comparing models across different test suites. MMLU on Model A vs HumanEval on Model B tells you almost nothing about either."
        ],
        goDeeper: `<p><b>The famous benchmarks.</b> MMLU (multitask language understanding, 57 subjects). HumanEval (Python coding). GSM8K (grade-school maths). MATH (harder maths). HellaSwag (commonsense). TruthfulQA (factual accuracy). MT-Bench (multi-turn chat). Each measures something specific.</p>
<p><b>The newer, harder ones.</b> SWE-bench (real GitHub issues). BIG-Bench Hard. ARC-AGI (abstract reasoning). HLE (Humanity's Last Exam). MMLU-Pro. As models saturate older benchmarks, the field invents harder ones every few months.</p>
<p><b>The contamination problem.</b> Many benchmarks have appeared in training data, intentionally or accidentally. A model "scoring well" may have just memorised the questions. This is why labs increasingly use held-out evals and rotate benchmarks. Trust trends in scores, not absolute numbers.</p>
<p><b>The "build your own eval" answer.</b> 50 hand-curated examples from your real use case beat any public benchmark for predicting your product's behaviour. Build one before serious model decisions; iterate on it as your product evolves.</p>`

      {
        id: "human-evals",
        title: "Human evals",
        whyItMatters: `When the numbers can't agree, you ask people. Human evaluation is slow, expensive, and the only thing that really tells you if an AI feature is good. Most teams don't do enough of it.`,
        lesson: `<p><b>Human evals</b> = real humans rate model outputs. The gold standard for tasks that don't have a single correct answer (style, helpfulness, creativity, safety).</p>
<p>Formats:</p>
<ul>
<li><b>Likert</b>: rate output 1-5 on dimensions like helpfulness and accuracy.</li>
<li><b>Pairwise</b>: A vs B, which is better. Easier and more reliable than absolute scores.</li>
<li><b>Rubric</b>: detailed checklist (was the format right, did it cite sources, etc).</li>
</ul>
<p>Modern reality: human evals are expensive, so people often use "LLM-as-judge" (another LLM does the rating), calibrated against a small human-rated set.</p>`,
        model: `Human eval = the only ground truth for fuzzy tasks. Slow, expensive, irreplaceable for trust.`,
        mistakes: [
          "Using single annotators. One human's opinion is noisy. Three annotators with conflict resolution is the minimum for stable signal.",
          "Skipping the rubric. 'Better?' is too vague. Spell out the dimensions: helpfulness, accuracy, tone, format compliance."
        ],
        goDeeper: `<p><b>The two patterns.</b> Pairwise: show humans two model outputs side-by-side, ask which is better. Absolute: show one output, ask humans to rate on a Likert scale. Pairwise is faster and more reliable; absolute lets you track quality drift over time.</p>
<p><b>The annotator pool.</b> Internal team (best for nuanced product judgement). Specialist contractors (Scale AI, Surge HQ, Toloka). Crowdsourced (cheap but noisy). Subject-matter experts (medical, legal, etc. — expensive but necessary for specialist domains).</p>
<p><b>Inter-annotator agreement.</b> The key health metric. Cohen's kappa or simple percent-agreement. If three annotators agree 90% of the time, your task is well-defined. If 60%, your rubric is unclear or the task is genuinely subjective.</p>
<p><b>LLM-as-judge.</b> Modern shortcut: use a strong LLM (GPT-5, Claude Opus) as an annotator. Cheap, fast, surprisingly correlated with human judgement on most tasks. Validate periodically with real humans. Becoming the default for prototype iteration.</p>`

        id: "cost-per-token",
        title: "Cost-per-token analysis",
        whyItMatters: `AI is priced by the token, and the same feature can cost a penny or a pound depending on how it's built. Knowing the maths is what separates 'a healthy AI margin' from 'a money pit'.`,
        lesson: `<p>LLM pricing is usually <b>$ per million tokens</b>, separately for input and output. Output tokens are typically 3-5x more expensive than input.</p>
<p>Real cost depends on:</p>
<ul>
<li>Input length × volume (RAG context bloats this fast).</li>
<li>Output length × volume.</li>
<li>Reasoning model? Multiply output by 3-10 for hidden thinking tokens.</li>
<li>Caching: many providers offer 50-90% discount on cached prompt prefixes.</li>
</ul>
<p>Practical exercise: for any feature, estimate monthly tokens at scale, multiply by price, then divide by users. That number tells you if the unit economics work.</p>`,
        model: `Cost-per-token = the most boring, most important metric in AI engineering. The model with the best price/quality ratio for your task wins, period.`,
        mistakes: [
          "Counting only the LLM call cost. Embeddings, vector DB, observability, retries, and orchestration add up.",
          "Pricing per call, not per user. Active users do many calls; pricing for one call hides the real economics."

        goDeeper: `<p><b>The cost stack.</b> Input tokens times price. Output tokens times price (3-5x input price typically). Embeddings (cheap but adds up). Vector DB queries. Storage (model weights if self-hosting, data if cached). Observability (Langsmith, Helicone, custom logging). Retries on errors. Failed/cancelled calls.</p>
<p><b>The user-level maths.</b> Average call cost times calls per user per day times 30 = monthly cost per active user. Compare to revenue per user. If cost is more than 30% of revenue, you have a problem. Healthy SaaS economics need cost to be 5-15% of revenue.</p>
<p><b>The optimisations.</b> Prompt caching (most providers offer this — repeated context cached at lower rate, often 50-90% discount). Model routing (cheap model first, escalate only if needed). Output truncation (set max_tokens carefully). Batch endpoints (50% discount on OpenAI for non-realtime). Fine-tuning a small model for the high-volume task.</p>
<p><b>The disclosure pattern.</b> Bigger AI products show users their usage and remaining quota. Acclimatises users to the per-call cost concept. Reduces sticker shock at billing time. Even simple tier displays help; users budget when given visibility.</p>`

      {
        id: "speed-benchmarking",
        title: "Speed benchmarking",
        whyItMatters: `Speed is the second biggest decider of whether an AI feature feels good, after quality. Measuring it properly (time to first word, words per second) is harder than people think.`,
        lesson: `<p>Three speed numbers matter:</p>
<ul>
<li><b>Time-to-first-token (TTFT)</b>: how long before the user sees anything. Dominated by prompt prefill.</li>
<li><b>Tokens-per-second (TPS)</b>: how fast output streams. Dominated by decode.</li>
<li><b>Total latency</b>: TTFT + (output_tokens / TPS). The full wait time.</li>
</ul>
<p>For chat UX, perceived speed is mostly about TTFT and streaming smoothness. For batch jobs, total latency matters more.</p>`,
        model: `Speed = TTFT for "did it start?" + TPS for "is it flowing?" Both matter, in different products.`,
        mistakes: [
          "Measuring throughput when latency matters (or vice versa). Two different metrics, two different optimization targets.",
          "Ignoring tail latency. Average latency hides the worst experiences. Track p50, p95, p99."
        ],
        goDeeper: `<p><b>The three key metrics.</b> TTFT (time-to-first-token): how long until the user sees anything. TPS (tokens per second): how fast tokens stream after the first. Total latency: end-to-end time for the full response. Chat apps care about TTFT and TPS. Batch jobs care about throughput (total tokens per hour).</p>
<p><b>The percentile reality.</b> p50 ("median") is misleading for chat apps. p95 is the 5% worst experience your users have. p99 is the very worst 1%. Tail latency spikes (10x normal) crush user satisfaction. Track and alert on percentiles, not averages.</p>
<p><b>The streaming UX trick.</b> A model that takes 5 seconds to start streaming and then 0.5s to finish feels SLOWER than one that takes 1 second to start and then 4.5s to finish — even though the second is longer total. TTFT dominates perceived speed. Optimize for TTFT first.</p>
<p><b>Tools for measuring.</b> OpenAI Eval. Provider-specific dashboards. Helicone (provider-agnostic). Langfuse (open source). Or roll your own logging — TTFT and total latency are easy to measure. Tracking them across model and prompt changes is the path to faster products.</p>`

        id: "quality-benchmarking",
        title: "Quality benchmarking",
        whyItMatters: `Quality is fuzzy and that's the problem. Setting up real quality measurement is what separates teams that ship good AI from teams that ship demos.`,
        lesson: `<p>Building a quality eval for your own product is non-negotiable for serious work. Steps:</p>
<ol>
<li><b>Collect</b> 50-200 representative real queries (more is better, but start small).</li>
<li><b>Label</b> the ideal answer or a rubric.</li>
<li><b>Choose</b> a scoring method: exact match, F1, BLEU, LLM-as-judge, or human.</li>
<li><b>Run</b> every candidate model/prompt against the eval, save outputs.</li>
<li><b>Track</b> scores over time as you change prompts, models, or RAG.</li>
</ol>
<p>The best eval sets are versioned, in git, and re-run automatically on every prompt change. Without this, prompt engineering is vibes.</p>`,
        model: `Quality eval = your regression test suite for the AI part of your product. Without it, you fly blind.`,
        mistakes: [
          "Treating quality benchmarking as one-time. Models drift, prompts change, your standards evolve. Re-evaluate constantly.",
          "Optimising for the benchmark rather than the user. 'Goodhart's law' applies: the measure becomes the goal and stops measuring what you cared about."
        ],
        goDeeper: `<p><b>The minimum viable eval.</b> 20-50 representative examples from real user behaviour. Expected outputs (or characteristics). Run against every model/prompt change. Track which examples pass/fail over time. This alone separates teams that ship reliable AI from teams that don't.</p>
<p><b>The eval data sources.</b> Real user queries (gold for relevance). Synthetic adversarial examples (LLM-generated edge cases). Failure cases from production (the bugs your users hit). Manual crafting (hard examples that test specific behaviours). Mix all of them.</p>
<p><b>Three eval styles.</b> Reference-based (compare output to a known-good reference, e.g. embedding similarity). Rule-based (does output contain key phrases? right format?). LLM-as-judge (have GPT-5 score the answer). Most production setups use all three.</p>
<p><b>The "regressions break shipping" pattern.</b> Mature AI teams gate deployments on eval scores. Pull request changes prompt? Run eval suite. Score drops on any example? Investigate before merging. This single discipline catches 90% of subtle regressions before users see them.</p>`

        title: "Building chatbots",
        whyItMatters: `Chatbots are the most over-built and least loved AI feature category. Knowing why they usually disappoint helps you build one that doesn't.`,
        lesson: `<p>The simplest useful AI product. Architecture in five layers:</p>
<ol>
<li><b>Frontend</b>: chat UI, streaming, message history.</li>
<li><b>Backend</b>: session management, auth, rate limiting.</li>
<li><b>Prompt layer</b>: system prompt, persona, guardrails.</li>
<li><b>LLM call</b>: model choice, retry logic, observability.</li>
<li><b>Memory / RAG</b>: per-user context, knowledge base.</li>
</ol>
<p>Pitfalls: handling long histories (summarise), saving messages reliably, dealing with abuse, streaming gracefully on flaky networks, multilingual support.</p>`,

        goDeeper: `<p><b>The chatbot category problem.</b> Generic "ask me anything" chatbots usually disappoint. Users don't know what to ask; the bot tries to be everything; the experience is shallow. Successful chatbots have specific scopes: customer support for one product, internal HR FAQ, code review on one codebase.</p>
<p><b>The reliable architecture.</b> System prompt defines role and constraints. RAG retrieves from your specific knowledge base. Tool calling for actions (lookup order, create ticket, schedule call). Guardrails check outputs before they go to users. Escalation path for "I don't know".</p>
<p><b>The unknown-question design.</b> What does the bot do when it doesn't know? Options: say so honestly. Route to a human. Suggest related topics it does know. Search elsewhere. Pick the right answer for your product. Don't let it hallucinate fluently.</p>
<p><b>The unsexy work.</b> 80% of production chatbot effort is data prep (cleaning the docs, structuring metadata), prompt iteration, evaluation, observability. The model choice is maybe 10%. New teams overinvest in models and underinvest in everything else.</p>`

      {
        id: "copilots",
        title: "Building AI copilots",
        whyItMatters: `Copilots are AI that helps you while you work (writing, coding, design). They're the most successful real-world AI category. There's a reason: they keep humans in charge.`,
        lesson: `<p>A <b>copilot</b> is an AI assistant embedded inside an existing tool (IDE, browser, CRM, design tool). Key difference from a chatbot: it sees the user's context (selected code, current page, current record) and acts in place.</p>
<p>Patterns:</p>
<ul>
<li><b>Inline autocomplete</b>: ghost text, low latency, small model.</li>
<li><b>Sidebar chat</b>: ask questions about what the user is looking at.</li>
<li><b>Command palette</b>: "do X to the selected thing."</li>
<li><b>Background tasks</b>: scan, flag, suggest while the user does other work.</li>
</ul>
<p>Examples to study: GitHub Copilot, Cursor, Notion AI, Linear's AI features.</p>`,
        model: `Copilot = an AI that sees your screen, your selection, your context, and acts inside the app instead of in a separate chat.`,
        mistakes: [
          "Designing copilots to do the work for the user. Copilots assist; they shouldn't replace user judgement on the core task.",
          "Forgetting reversibility. Suggestions should be editable, dismissable, and undoable. AI making changes the user can't easily revert is a trust-killer."
        ],
        goDeeper: `<p><b>The pattern that wins.</b> AI suggests, user decides. GitHub Copilot suggests autocompletions; the developer accepts/rejects. Notion AI drafts paragraphs; the user edits them. Linear's AI tags issues; humans verify. The user is always in the loop on the core action.</p>
<p><b>The UI grammar.</b> Inline suggestions (ghost text, dismissable). Side-panel proposals (full content, accept/reject buttons). Diffs (show what changes, edit before applying). Confidence indicators. Citation links. Each pattern fits different tasks.</p>
<p><b>The "good enough" rule.</b> Copilots don't need to be perfect — they need to save the user more time than they cost. A suggestion that's 70% right and editable beats waiting for one that's 95% right. Optimize for human-machine total throughput, not pure AI accuracy.</p>
<p><b>The unsung importance of latency.</b> Copilots that respond in 200ms get used dozens of times per session. Copilots that take 3 seconds get used a handful of times. Speed is a feature: more user trials at lower quality often beats fewer trials at higher quality.</p>`
      },
      {
        id: "ai-automation",
        title: "AI automation",
        whyItMatters: `Automation is AI doing whole tasks while you're away. It's the dream and also the hardest thing to get right. Most attempts fail at the boring 90%, not the impressive 10%.`,
        lesson: `<p><b>AI automation</b> = wiring LLMs into existing business workflows so they run without a human pressing buttons. Often the highest-ROI category of AI work.</p>
<p>Common patterns:</p>
<ul>
<li>Inbound triage (emails, tickets, leads) → classify, route, draft response.</li>
<li>Document processing (invoices, contracts) → extract fields, validate.</li>
<li>Internal Q&A bots → RAG over Confluence/Notion/SharePoint.</li>
<li>Reporting → pull data, summarise, send to Slack.</li>
</ul>
<p>Toolchains: n8n, Make, Zapier, Pipedream, custom Python with Temporal/Inngest, or full agentic stacks.</p>`,
        model: `AI automation = "stop doing this manually." Find the highest-volume, lowest-creativity tasks; LLM them; reclaim hours.`,
        mistakes: [
          "Automating the 10% that's exciting, not the 90% that's boring. The boring stuff is usually where the actual value is.",
          "Skipping the human-in-the-loop checkpoint on first runs. Even great automation has surprises in production conditions."

/* ------------------------------------------------------------------
   STATE
   ------------------------------------------------------------------ */
const STORAGE_KEY = "llm-course-state-v1";
let STATE = loadState();

function defaultState() {
  return {
    completed: {},
    currentId: "__home",
    search: "",
    xp: 0,
    streak: 0,
    lastCompletionDate: null,
    badges: {},
    celebrated: {},
    audioRate: 1.0,
    goDeeperExpanded: false,
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    // One-time migration: route existing users to the new home page once
    if (typeof merged.seenHomeV1 === "undefined") {
      merged.currentId = "__home";
      merged.seenHomeV1 = true;
    }
    return merged;
  } catch (e) {
    return defaultState();
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
}

/* Helpers to flatten and find topics */
const ALL_TOPICS = COURSE.flatMap(s => s.topics.map(t => ({ ...t, section: s.section })));
function topicById(id) { return ALL_TOPICS.find(t => t.id === id); }
function nextTopic(id) {
  const idx = ALL_TOPICS.findIndex(t => t.id === id);
  return idx < ALL_TOPICS.length - 1 ? ALL_TOPICS[idx + 1] : null;
}
function prevTopic(id) {
  const idx = ALL_TOPICS.findIndex(t => t.id === id);
  return idx > 0 ? ALL_TOPICS[idx - 1] : null;
}

/* Gamification helpers */
function todayISO() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function daysBetween(a, b) {
  const da = new Date(a + "T00:00:00").getTime();
  const db = new Date(b + "T00:00:00").getTime();
  return Math.round((db - da) / 86400000);
}
function sectionForTopic(topicId) {
  for (const sec of COURSE) {
    if (sec.topics.some(t => t.id === topicId)) return sec.section;
  }
  return null;
}
function sectionProgress(sectionName) {
  const sec = COURSE.find(s => s.section === sectionName);
  if (!sec) return { done: 0, total: 0 };
  const done = sec.topics.filter(t => STATE.completed[t.id]).length;
  return { done, total: sec.topics.length };
}
function currentStreakDisplay() {
  if (!STATE.lastCompletionDate) return 0;
  const gap = daysBetween(STATE.lastCompletionDate, todayISO());
  if (gap > 1) return 0;
  return STATE.streak || 0;
}
function bumpStreakOnCompletion() {
  const today = todayISO();
  const last = STATE.lastCompletionDate;
  if (!last) {
    STATE.streak = 1;
  } else {
    const gap = daysBetween(last, today);
    if (gap === 0) {
      /* same day, no change */
    } else if (gap === 1) {
      STATE.streak = (STATE.streak || 0) + 1;
    } else {
      STATE.streak = 1;
    }
  }
  STATE.lastCompletionDate = today;
}
function maybeUnlockBadge(sectionName) {
  if (STATE.badges[sectionName]) return false;
  const { done, total } = sectionProgress(sectionName);
  if (total > 0 && done === total) {
    STATE.badges[sectionName] = true;
    STATE.xp = (STATE.xp || 0) + 100;
    return true;
  }
  return false;
}

function renderNav() {
  const nav = document.getElementById("nav");
  const q = (STATE.search || "").trim().toLowerCase();
  nav.innerHTML = "";

  // Home link (always at top, regardless of search)
  const homeEl = document.createElement("div");
  homeEl.className = "nav-home" + (STATE.currentId === "__home" ? " active" : "");
  homeEl.innerHTML = `<span class="home-link-arrow">&#8962;</span><span>Home</span>`;
  homeEl.addEventListener("click", () => {
    Audio.stop();
    STATE.currentId = "__home";
    saveState();
    renderAll();
    window.scrollTo({ top: 0, behavior: "instant" });
    maybeCloseDrawer();
  });
  nav.appendChild(homeEl);

  COURSE.forEach(section => {
    const filtered = section.topics.filter(t => !q || t.title.toLowerCase().includes(q) || (t.section || "").toLowerCase().includes(q));
    if (!filtered.length) return;
    const h = document.createElement("div");
    h.className = "section-title";
    const { done, total } = sectionProgress(section.section);
    const earned = !!STATE.badges[section.section];
    const badgeDef = BADGE_DEFS[section.section] || { icon: "?", name: section.section };
    h.innerHTML = `<span class="sec-name">${section.section}</span><span class="sec-prog"><span class="sec-prog-count">${done}/${total}</span><span class="sec-badge ${earned ? "earned" : ""}" title="${earned ? badgeDef.name + " earned" : "Complete this section to unlock"}">${badgeDef.icon}</span></span>`;
    nav.appendChild(h);
    filtered.forEach(t => {
      const el = document.createElement("div");
      el.className = "topic" + (STATE.completed[t.id] ? " done" : "") + (STATE.currentId === t.id ? " active" : "");
      el.innerHTML = `<span class="check"></span><span class="label">${t.title}</span>`;
      el.addEventListener("click", () => {
        if (Audio.currentTopicId !== t.id) Audio.stop();
        STATE.currentId = t.id;
        saveState();
        renderAll();
        window.scrollTo({ top: 0, behavior: "instant" });
        maybeCloseDrawer();
      });
      nav.appendChild(el);
    });
  });
}

function renderProgress() {
  const total = ALL_TOPICS.length;
  const done = Object.values(STATE.completed).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progressLabel").textContent = `${done} / ${total}`;
  document.getElementById("progressPct").textContent = `${pct}%`;
  document.getElementById("progressFill").style.width = pct + "%";

  // Topbar stats
  const streakDisp = currentStreakDisplay();
  const streakEl = document.getElementById("streakStat");
  document.getElementById("streakVal").textContent = streakDisp;
  streakEl.classList.toggle("cold", streakDisp === 0);
  streakEl.title = streakDisp === 0
    ? "No active streak. Complete a topic today to start one."
    : streakDisp + "-day streak";
  document.getElementById("xpVal").textContent = (STATE.xp || 0).toLocaleString();
}

    ctaTarget = ALL_TOPICS[0].id;
  } else if (doneCount >= total) {
    ctaLabel = "Review from the start &rarr;";
    ctaTarget = ALL_TOPICS[0].id;
  } else {
    ctaLabel = "Pick up where you left off &rarr;";
    const next = ALL_TOPICS.find(t => !STATE.completed[t.id]);
    ctaTarget = next ? next.id : ALL_TOPICS[0].id;
  }

  const html = `

  document.getElementById("completeBtn").addEventListener("click", () => toggleComplete());

  const goDeeperHeader = document.getElementById("goDeeperHeader");
  if (goDeeperHeader) {
    const toggleGoDeeper = () => {
      STATE.goDeeperExpanded = !STATE.goDeeperExpanded;
      saveState();
      const card = document.getElementById("goDeeperCard");
      card.classList.toggle("open", STATE.goDeeperExpanded);
      goDeeperHeader.setAttribute("aria-expanded", STATE.goDeeperExpanded ? "true" : "false");
    };
    goDeeperHeader.addEventListener("click", toggleGoDeeper);
    goDeeperHeader.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleGoDeeper(); }
    });
  }

  const audioBtn = document.getElementById("audioBtn");
  if (audioBtn) {
    audioBtn.addEventListener("click", () => {
      if (Audio.playing && !Audio.paused) {
        Audio.pause();
      } else if (Audio.paused && Audio.currentTopicId === t.id) {
        Audio.resume();
      } else {
        const queue = buildAudioQueueForTopic(t, isLastInSection, sectionExercise);
        Audio.play(queue, t.id);
      }
    });
    document.getElementById("audioSpeedBtn").addEventListener("click", () => Audio.cycleSpeed());
  }
  syncAudioUI();
}

function renderAll() {
  renderNav();
  renderProgress();
  renderContent();
}

/* ------------------------------------------------------------------
   ACTIONS
   ------------------------------------------------------------------ */
function toggleComplete() {
  const id = STATE.currentId;
  if (id === "__home") return;
  const wasComplete = !!STATE.completed[id];
  STATE.completed[id] = !wasComplete;

  let celebrate = null;

  if (!wasComplete) {
    // Marking as understood
    STATE.xp = (STATE.xp || 0) + 10;
    bumpStreakOnCompletion();
    const sec = sectionForTopic(id);
    if (sec && maybeUnlockBadge(sec)) {
      celebrate = sec;
    }
  } else {
    // Undoing
    STATE.xp = Math.max(0, (STATE.xp || 0) - 10);
    const sec = sectionForTopic(id);
    if (sec && STATE.badges[sec]) {
      const { done, total } = sectionProgress(sec);
      if (done < total) {
        delete STATE.badges[sec];
        delete STATE.celebrated[sec];
        STATE.xp = Math.max(0, STATE.xp - 100);
      }
    }
  }

  saveState();
  renderAll();
  if (celebrate) showCelebration(celebrate);
}

/* Mobile drawer */
const MOBILE_BREAKPOINT = 880;
function isMobile() { return window.innerWidth <= MOBILE_BREAKPOINT; }
function openDrawer() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarBackdrop").classList.add("open");
  document.body.classList.add("drawer-open");
  document.getElementById("menuToggle").setAttribute("aria-expanded", "true");
}
function closeDrawer() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarBackdrop").classList.remove("open");
  document.body.classList.remove("drawer-open");
  document.getElementById("menuToggle").setAttribute("aria-expanded", "false");
}
function maybeCloseDrawer() { if (isMobile()) closeDrawer(); }
document.getElementById("menuToggle").addEventListener("click", () => {
  if (document.getElementById("sidebar").classList.contains("open")) closeDrawer();
  else openDrawer();
});
document.getElementById("sidebarBackdrop").addEventListener("click", closeDrawer);
window.addEventListener("resize", () => {
  if (!isMobile() && document.getElementById("sidebar").classList.contains("open")) closeDrawer();
});

/* ------------------------------------------------------------------
   AUDIO PLAYBACK (Web Speech API)
   ------------------------------------------------------------------ */
const AUDIO_SPEEDS = [1.0, 1.25, 1.5, 2.0];
const SPEECH_AVAILABLE = typeof window !== "undefined" && "speechSynthesis" in window;

const Audio = {
  queue: [],
  index: 0,
  playing: false,
  paused: false,
  currentTopicId: null,
  keepAliveTimer: null,

  play(items, topicId) {
    this.stop();
    if (!SPEECH_AVAILABLE || !items.length) return;
    this.queue = items;
    this.index = 0;
    this.playing = true;
    this.paused = false;
    this.currentTopicId = topicId;
    this._startKeepAlive();
    this._next();
    syncAudioUI();
  },

  _next() {
    if (!this.playing || this.index >= this.queue.length) {
      this.stop();
      return;
    }
    const item = this.queue[this.index++];
    const u = new SpeechSynthesisUtterance(item.text);
    u.rate = STATE.audioRate || 1.0;
    u.onend = () => this._next();
    u.onerror = (e) => {
      // Some browsers fire 'interrupted' when we cancel; that's fine
      if (e && e.error && e.error !== "interrupted" && e.error !== "canceled") {
        this.stop();
      }
    };
    speechSynthesis.speak(u);
  },

  pause() {
    if (!this.playing || this.paused) return;
    speechSynthesis.pause();
    this.paused = true;
    syncAudioUI();
  },

  resume() {
    if (!this.paused) return;
    speechSynthesis.resume();
    this.paused = false;
    syncAudioUI();
  },

  stop() {
    if (SPEECH_AVAILABLE) speechSynthesis.cancel();
    this.queue = [];
    this.index = 0;
    this.playing = false;
    this.paused = false;
    this.currentTopicId = null;
    this._stopKeepAlive();
    syncAudioUI();
  },

  cycleSpeed() {
    const cur = STATE.audioRate || 1.0;
    const idx = AUDIO_SPEEDS.indexOf(cur);
    const next = AUDIO_SPEEDS[(idx + 1) % AUDIO_SPEEDS.length];
    STATE.audioRate = next;
    saveState();
    // If currently playing, restart from the current chunk at the new rate
    if (this.playing && this.queue.length) {
      const remaining = this.queue.slice(Math.max(0, this.index - 1));
      const topic = this.currentTopicId;
      this.stop();
      this.play(remaining, topic);
    } else {
      syncAudioUI();
    }
  },

  isActive() { return this.playing; },

  _startKeepAlive() {
    // Chrome's TTS goes silent after ~14s. Pulse pause/resume to keep it alive.
    this._stopKeepAlive();
    this.keepAliveTimer = setInterval(() => {
      if (this.playing && !this.paused && speechSynthesis.speaking) {
        speechSynthesis.pause();
        speechSynthesis.resume();
      }
    }, 10000);
  },
  _stopKeepAlive() {
    if (this.keepAliveTimer) {
      clearInterval(this.keepAliveTimer);
      this.keepAliveTimer = null;
    }
  },
};

function htmlToText(html) {
  const d = document.createElement("div");
  d.innerHTML = html || "";
  return (d.textContent || d.innerText || "").replace(/\s+/g, " ").trim();
}
function extractParagraphs(html) {
  const d = document.createElement("div");
  d.innerHTML = html || "";
  const ps = Array.from(d.querySelectorAll("p")).map(p => p.textContent.replace(/\s+/g, " ").trim()).filter(Boolean);
  if (ps.length === 0) {
    const t = htmlToText(html);
    if (t) ps.push(t);
  }
  return ps;
}
function buildAudioQueueForTopic(t, isLastInSection, sectionExercise) {
  const items = [];
  items.push({ text: t.title + "." });
  if (t.whyItMatters) {
    items.push({ text: "Why it matters." });
    items.push({ text: t.whyItMatters });
  }
  items.push({ text: "Lesson." });
  extractParagraphs(t.lesson).forEach(p => items.push({ text: p }));
  items.push({ text: "Mental model." });
  items.push({ text: htmlToText(t.model) });
  if (t.mistakes && t.mistakes.length) {
    items.push({ text: "Common beginner mistakes." });
    t.mistakes.forEach(m => items.push({ text: m }));
  }
  if (t.goDeeper && STATE.goDeeperExpanded) {
    items.push({ text: "Go deeper." });
    extractParagraphs(t.goDeeper).forEach(p => items.push({ text: p }));
  }
  if (isLastInSection && sectionExercise) {
    items.push({ text: "Try this in the real world." });
    items.push({ text: htmlToText(sectionExercise) });
  }
  return items;
}

function syncAudioUI() {
  const btn = document.getElementById("audioBtn");
  const speed = document.getElementById("audioSpeedBtn");
  const icon = document.getElementById("audioIcon");
  const label = document.getElementById("audioLabel");
  if (!btn || !icon || !label) return;
  if (Audio.playing && !Audio.paused) {
    btn.classList.add("playing");
    icon.innerHTML = "&#9208;"; // ⏸
    label.textContent = "Pause";
  } else if (Audio.paused) {
    btn.classList.add("playing");
    icon.innerHTML = "&#9654;"; // ▶
    label.textContent = "Resume";
  } else {
    btn.classList.remove("playing");
    icon.innerHTML = "&#9654;";
    label.textContent = "Listen";
  }
  if (speed) speed.textContent = (STATE.audioRate || 1.0) + "x";
}

// Stop audio when the tab closes or is hidden
window.addEventListener("pagehide", () => Audio.stop());

/* Celebration */
function showCelebration(sectionName) {
  const def = BADGE_DEFS[sectionName];
  if (!def) return;
  Audio.stop();
  document.getElementById("celBadge").textContent = def.icon;
  document.getElementById("celName").textContent = def.name;
  document.getElementById("celBlurb").textContent = def.blurb;
  document.getElementById("celRewards").textContent = "+ 100 XP";

  const sec = COURSE.find(s => s.section === sectionName);
  const exerciseText = (sec && sec.exercise) || "";
  const wrap = document.getElementById("celExerciseWrap");
  if (exerciseText) {
    document.getElementById("celExercise").textContent = exerciseText;
    wrap.classList.remove("hidden");
  } else {
    wrap.classList.add("hidden");
  }

  document.getElementById("celebration").classList.remove("hidden");
  STATE.celebrated[sectionName] = true;
  saveState();
}
function hideCelebration() {
  document.getElementById("celebration").classList.add("hidden");
}
document.getElementById("celBtn").addEventListener("click", hideCelebration);
document.getElementById("celebration").addEventListener("click", (e) => {
  if (e.target.id === "celebration") hideCelebration();
});
function goNext() {
  const n = nextTopic(STATE.currentId);
  if (n) { Audio.stop(); STATE.currentId = n.id; saveState(); renderAll(); window.scrollTo({ top: 0, behavior: "instant" }); }
}
function goPrev() {
  const p = prevTopic(STATE.currentId);
  if (p) { Audio.stop(); STATE.currentId = p.id; saveState(); renderAll(); window.scrollTo({ top: 0, behavior: "instant" }); }
}

/* Reset / Export / Import */
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Reset all progress? This cannot be undone.")) {
    STATE = defaultState();
    saveState();
    renderAll();
  }
});
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "llm-course-progress.json";
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("importBtn").addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        STATE = Object.assign(defaultState(), parsed);
        saveState();
        renderAll();
      } catch (err) {
        alert("Invalid file.");
      }
    };
    reader.readAsText(file);
  };
  input.click();
});

document.getElementById("search").addEventListener("input", (e) => {
  STATE.search = e.target.value;
  saveState();
  renderNav();
});

document.addEventListener("keydown", (e) => {
  // Esc always closes the drawer, even from inside the search input
  if (e.key === "Escape" && document.getElementById("sidebar").classList.contains("open")) {
    closeDrawer();
    return;
  }
  if (e.target.tagName === "INPUT") return;
  const celebrationOpen = !document.getElementById("celebration").classList.contains("hidden");
  if (celebrationOpen) {
    if (e.key === "Escape" || e.key === "Enter") hideCelebration();
    return;
  }
  if (e.key === "ArrowRight") goNext();
  else if (e.key === "ArrowLeft") goPrev();
  else if (e.key.toLowerCase() === "c") toggleComplete();
});

/* Init */
document.getElementById("search").value = STATE.search || "";
renderAll();
</script>

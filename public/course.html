      {
        id: "lora",
        title: "LoRA",
        whyItMatters: `LoRA is the reason fine-tuning is cheap enough that a one-person team can do it. Before LoRA, you needed a data centre. Now you need an afternoon.`,
        lesson: `<p><b>LoRA</b> is the trick that made it possible for almost anyone (not just big AI labs) to customise a giant model on their own data. It's the difference between "fine-tuning costs hundreds of thousands of dollars" and "fine-tuning costs the price of a long lunch".</p>
<p>The core idea is simple. Retraining a whole giant model is impossibly expensive. Instead, you take the original model, freeze it (don't touch any of its weights), and bolt a tiny <b>add-on</b> onto it. You only train the add-on. The combined system feels like a new model, but you only paid to train the small bit.</p>
<p>The trained add-on (called a <b>LoRA adapter</b>) is a small file, often under 200MB. You can keep one base model and swap dozens of adapters in and out: one for legal tone, one for coding, one for customer support, one for your company's writing style. Every modern fine-tuning recipe (from the open-source crowd at Hugging Face to the polish in OpenAI's API) is some flavour of this.</p>`,
        model: `LoRA = sticking a small tunable layer onto a frozen big model. You train the small thing, the big thing stays untouched, the two together behave like a customised model.`,
        mistakes: [
          "Thinking LoRA gives you a 'new model'. It doesn't. The base model is doing 99% of the work and the adapter is steering its output. Without the base, the adapter is useless.",
          "Reaching for fine-tuning when RAG would do. If the model doesn't know your domain at all, LoRA can't really teach it new facts cheaply. Use RAG for current/private knowledge. Use LoRA for tone, format, and behaviour."
        ],
        goDeeper: `<p><b>The actual technique.</b> A trained model is a stack of giant weight matrices (W). Normal fine-tuning updates every number in W. LoRA freezes W and adds two small matrices A and B, where the product A·B has the same shape as W but is built from far fewer numbers. The effective weight at inference time is W + A·B. You train A and B only.</p>
<p><b>The "low-rank" bit.</b> A and B share a small inner dimension r (the "rank"), usually 8, 16, 32, or 64. Smaller r means fewer trainable parameters but less expressive. r=8 to r=64 is the sweet spot for most fine-tunes. Going higher rarely helps and burns memory.</p>
<p><b>Where to apply LoRA.</b> Traditionally only on the attention layers, but adapting the MLP layers too often gives meaningfully better quality at modest extra cost. Modern frameworks (Axolotl, Unsloth, PEFT) default to adapting both.</p>
<p><b>Numbers to anchor on.</b> Fine-tuning a 7-billion-parameter model with full weights needs 60-80GB of GPU memory (datacentre territory). The same task with LoRA on attention layers at r=16 fits in 16-24GB, runs in a few hours, and produces a ~50MB adapter file.</p>
<p><b>Engineer gotchas.</b> Setting r too high burns memory for negligible gain. Forgetting to merge or load the adapter at inference time means you're silently still using the unchanged base model. Watching loss not budge usually means a data-formatting problem, not a LoRA problem.</p>`
      },
      {
        id: "qlora",
        title: "QLoRA",
        whyItMatters: `QLoRA squeezed fine-tuning down so far that you can do it on a single gaming GPU. It's the difference between 'big tech only' and 'anyone'.`,
        lesson: `<p><b>QLoRA</b> = LoRA on top of a <b>quantized</b> base model. The base is loaded in 4-bit precision (instead of 16-bit), which cuts memory by ~4x. The LoRA adapters are trained in higher precision.</p>
<p>Why it matters: this is what makes fine-tuning a 70B model on consumer hardware possible. You can fit Llama 3.1 70B on a single 48GB GPU with QLoRA. Without it, you'd need a small cluster.</p>
<p>Trade-off: very slight quality drop vs full-precision LoRA, but it is usually negligible compared to the cost saving.</p>`,
        model: `QLoRA = LoRA, but the frozen base model is squished into 4-bit so it actually fits in your GPU.`,
        mistakes: [
          "Assuming QLoRA gives full-precision quality. There's a small but real quality hit from running the base in 4-bit. Worth measuring on your eval.",
          "Forgetting that the trained adapter is high-precision. At inference time you need to either keep the base quantized too, or merge carefully."
        ],
        goDeeper: `<p><b>The technique stack.</b> QLoRA equals quantize the base model to 4-bit (cuts memory 4x) plus train LoRA adapters in high precision on top. The base stays frozen and quantized; the adapters get trained normally. The whole thing fits where the base model alone wouldn't.</p>
<p><b>The magic number.</b> A 65B model in fp16 needs about 130GB of GPU memory. The same model in 4-bit QLoRA needs about 33GB, small enough to fit on a single A100 or even some consumer cards. This is what made "fine-tune Llama 65B at home" a real thing.</p>
<p><b>The quality cost.</b> 4-bit quantization typically costs 1-3% on benchmarks vs the original fp16. Often invisible in practice. NF4 (the special 4-bit format used by QLoRA) is specifically designed to preserve quality better than uniform 4-bit.</p>
<p><b>How to actually run it.</b> The <code>bitsandbytes</code> library handles the 4-bit loading. Hugging Face PEFT handles the LoRA adapter management. The Unsloth library wraps both with significant speedups (often 2-5x faster training).</p>`
      },
      {
        id: "dpo",
        title: "DPO",
        whyItMatters: `DPO is the modern way to teach a model 'prefer this kind of answer'. It replaced a much messier method (RLHF) for most teams. Newer features you see this year were probably tuned with DPO.`,
        lesson: `<p><b>DPO</b> = Direct Preference Optimization. A simpler, faster, more stable alternative to RLHF.</p>
<p>You feed it preference data (prompt, chosen, rejected). DPO directly adjusts the model so that the chosen response becomes more likely and the rejected one less likely, without needing a separate reward model or reinforcement learning.</p>
<p>Result: takes a few hours, no exotic RL machinery, very stable, easy to debug. Most modern open chat models (Llama 3, Mistral, Qwen) use some form of DPO or its variants (IPO, KTO, SimPO).</p>`,
        model: `DPO = "make the good answer more likely and the bad answer less likely, directly." No reward model, no PPO, no drama.`,
        mistakes: [
          "Confusing DPO with RLHF. Same goal, different maths. DPO is simpler and usually cheaper.",
          "Using DPO without good preference data. The technique can't fix bad data; it can only learn what you label."
        ],
        goDeeper: `<p><b>DPO = Direct Preference Optimization.</b> A 2023 paper showed you could achieve the same effect as RLHF without the complex reinforcement learning setup. Instead of training a reward model and then doing PPO, DPO just trains directly on preference pairs using a simpler loss function.</p>
<p><b>What changed in practice.</b> RLHF requires reward model training plus PPO setup plus extensive hyperparameter tuning. DPO requires feeding preference pairs to a training loop, picking a beta hyperparameter, and hitting train. The result: similar quality, less infrastructure, way less expertise required.</p>
<p><b>Why teams switched.</b> Llama 3, Qwen 2, and most 2024-onwards open models use DPO (or variants like KTO, ORPO) instead of RLHF. OpenAI and Anthropic still use RLHF for top-tier production models because of nuanced behaviours that DPO struggles with, but DPO covers maybe 80% of teams' needs.</p>
<p><b>The library.</b> Hugging Face's TRL has DPOTrainer. Expected data columns: <code>prompt</code>, <code>chosen</code>, <code>rejected</code>. Train for 1-3 epochs on a few thousand pairs and you'll see meaningful changes in behaviour.</p>`
      },
      {
        id: "rlhf",
        title: "RLHF",
        whyItMatters: `RLHF is what made ChatGPT feel polite, useful and non-weird at launch. It's also famously expensive and finicky, which is why DPO is taking over.`,
        lesson: `<p><b>RLHF</b> = Reinforcement Learning from Human Feedback. The original recipe behind ChatGPT, now mostly replaced by DPO for cost reasons.</p>
<p>Three steps:</p>
<ol>
<li><b>SFT</b> the base model on instruction data.</li>
<li>Train a <b>reward model</b> that predicts how much a human would like a given response.</li>
<li>Use <b>PPO</b> (a reinforcement learning algorithm) to update the LLM so it produces responses that score higher on the reward model.</li>
</ol>
<p>RLHF is powerful but operationally painful: three models in memory at once, unstable training, tricky to debug. DPO collapses steps 2-3 into one direct loss function.</p>`,
        model: `RLHF = "train a judge LLM to score responses, then make the main LLM chase higher scores." DPO skipped the judge.`,
        mistakes: [
          "Equating RLHF with 'the alignment technique that matters'. It's one technique among several. DPO, Constitutional AI, RLAIF are alternatives.",
          "Underestimating its instability. RLHF training can collapse in subtle ways that DPO usually doesn't."
        ],
        goDeeper: `<p><b>The pipeline, in three steps.</b> (1) Fine-tune a model with SFT to follow instructions. (2) Collect preference pairs and train a "reward model" that predicts which response humans prefer. (3) Use the reward model as a signal in reinforcement learning (PPO algorithm) to make the language model produce preferred outputs.</p>
<p><b>Why it was a breakthrough.</b> Pre-RLHF chatbots were technically capable but rude, verbose, or evasive. RLHF taught models to be helpful, polite, and refuse harmful requests. ChatGPT's launch in 2022 was the moment the world saw what RLHF could do at scale.</p>
<p><b>Why it's hard.</b> PPO is notoriously finicky. Reward hacking is a constant problem (the model learns to game the reward model rather than be genuinely better). Training compute is significant. Three separate models in memory at once during training. Most teams now reach for DPO first.</p>
<p><b>Variants worth knowing.</b> Constitutional AI (Anthropic): use AI feedback instead of human, guided by a written constitution of principles. RLAIF: same idea, AI labels preferences. KTO: simpler than DPO, works with binary "good/bad" labels instead of pairs.</p>`
      },
      {
        id: "quantization",
        title: "Quantization",
        whyItMatters: `Quantization is how 70-billion-parameter models run on a laptop. It shrinks the model with surprisingly little quality loss. It's the magic behind 'AI on your phone'.`,
        lesson: `<p><b>Quantization</b> means storing the model's weights in fewer bits per number. Default is 16-bit (fp16 or bf16). You can squeeze down to 8-bit, 4-bit, even 2-bit.</p>
<p>Why: VRAM is the bottleneck for running large models. 4-bit cuts memory by 4x and is barely distinguishable in quality for most tasks. 2-bit starts to hurt noticeably.</p>
<p>Common formats:</p>
<ul>
<li><b>GGUF</b> (llama.cpp): runs on CPU and consumer GPUs.</li>
<li><b>GPTQ</b>, <b>AWQ</b>: GPU-focused, often used with vLLM.</li>
<li><b>bitsandbytes</b>: easy to use from Python/Hugging Face.</li>
</ul>`,
        model: `Quantization = rounding the model's numbers to use less memory. A bit of accuracy lost, a lot of memory saved.`,
        mistakes: [
          "Assuming all quantization is equal. INT8, NF4, GPTQ, AWQ, GGUF Q4_K_M are different formats with different trade-offs.",
          "Ignoring quality measurement. Always run your eval suite before and after quantizing. The hit varies wildly by task."
        ],
        goDeeper: `<p><b>The core idea.</b> Each parameter in a model is normally stored as a 16-bit floating-point number. Quantization reduces this to 8-bit, 4-bit, or even lower. 4-bit quantization makes the model about 4x smaller in memory and slightly faster, at the cost of 1-5% quality.</p>
<p><b>The popular formats.</b> GGUF (llama.cpp's format, runs on CPU and GPU, used by Ollama). GPTQ (older, GPU-only, smart quantization). AWQ (newer GPU format, often best quality at 4-bit). NF4 (specifically for QLoRA training). The "right" choice depends on your runtime.</p>
<p><b>Q4_K_M sweet spot.</b> In the GGUF ecosystem, Q4_K_M is the most common choice: roughly 4-bit average with smarter packing for important weights. Typically loses 1-2% quality vs fp16. Q5_K_M is even better quality at slightly more memory.</p>
<p><b>When NOT to quantize.</b> If your task is very sensitive to small accuracy differences (legal reasoning, complex maths, exact API calls), measure carefully. Some specific behaviours degrade more than the average benchmark suggests.</p>`
      },
      {
        id: "checkpoints",
        title: "Model checkpoints",
        whyItMatters: `When AI labs release 'a new version', they're releasing a checkpoint: a snapshot of the model at a moment in training. Knowing the term explains every model name you'll ever see.`,
        lesson: `<p>A <b>checkpoint</b> is a snapshot of the model's weights (and optionally the optimizer state) saved to disk. During training, you save checkpoints every N steps so you can resume if something crashes and so you can compare versions.</p>
<p>For inference, "checkpoint" often just means the model files themselves. When someone says "load the Llama 3.1 8B checkpoint," they mean load that specific set of weights.</p>
<p>Practical tips:</p>
<ul>
<li>Keep the best 2-3 checkpoints by eval score, not just the latest.</li>
<li>Tag checkpoints with hyperparameters, data version, and date so you can reproduce later.</li>
<li>Optimizer state can be larger than the weights. Drop it once training is done.</li>
</ul>`,
        model: `Checkpoint = "save game" for a model. Same idea as Ctrl+S, just with billions of numbers.`,
        mistakes: [
          "Treating every release as a 'new model'. Often it's an iterated checkpoint of the same base.",
          "Not saving checkpoints during training. If training crashes at step 9,500 of 10,000, you lose everything without checkpoint saves."
        ],
        goDeeper: `<p><b>What a checkpoint actually is.</b> A snapshot of the model's weights at a specific point in training. Saved as a file (PyTorch .bin, SafeTensors, GGUF). You can pick up training from a checkpoint, or use it as a final model.</p>
<p><b>The checkpoint-as-model-release.</b> When "Llama 3.1 405B" is released, what's actually being released is a specific checkpoint that the lab decided was the right balance of quality and stopping point. Other checkpoints from the same training run exist internally but never see daylight.</p>
<p><b>Practical training pattern.</b> Save a checkpoint every N steps (often 1000-5000). Keep the last 3-5 checkpoints. Evaluate each one on your validation set. Pick the best for deployment. Hugging Face Transformers and TRL handle this automatically with <code>save_steps</code> and <code>save_total_limit</code>.</p>
<p><b>Where to find published checkpoints.</b> Hugging Face Hub for open models. Each model card lists the available checkpoints and their differences. Some models have base, instruct, and chat variants, all derived from the same pretrain but with different downstream training.</p>`
      },
      {
        id: "adapter-tuning",
        title: "Adapter tuning",
        whyItMatters: `Adapters let you have one big base model plus dozens of tiny add-ons (one for legal, one for marketing, one for support). It's how companies offer 'customisable AI' without retraining from scratch.`,
        lesson: `<p><b>Adapter tuning</b> is a family of methods (LoRA is the most famous member) where you freeze the base model and train small extra modules called adapters. The full family is sometimes called <b>PEFT</b> (Parameter-Efficient Fine-Tuning).</p>
<p>Members include: LoRA, IA3, prefix tuning, prompt tuning, AdaLoRA, DoRA. Each tweaks a slightly different part of the architecture.</p>
<p>Big practical benefit: you can store many adapters for the same base model and hot-swap them at inference time. One 7B base + 20 task-specific adapters = effectively 20 specialised models for the storage cost of one.</p>`,
        model: `Adapters = small detachable add-ons that change the model's behaviour without touching the base. Like specialist lenses for a camera body.`,
        mistakes: [
          "Calling 'adapters' and 'LoRA' the same thing. LoRA is one popular adapter technique; there are others (prefix tuning, prompt tuning, IA3).",
          "Forgetting that adapters need the base model to run. They're useless on their own — pure orchestration overhead."
        ],
        goDeeper: `<p><b>The adapter family.</b> LoRA (the popular one — low-rank matrices). IA3 (smaller still — just scales activations). Prefix tuning (learnable prefix vectors prepended to each layer). Prompt tuning (learnable tokens at the input only). Each trades off expressivity for parameter count.</p>
<p><b>Why companies love adapters.</b> One base model file plus many small adapter files equals one inference server can serve many fine-tuned models. Different customers, different teams, different use cases, all sharing the GPU memory of the base model.</p>
<p><b>The serving pattern.</b> Load the base model once into GPU memory. Load adapters into RAM/disk. For a request, dynamically swap the active adapter (modern frameworks like vLLM and TGI do this in milliseconds). User A gets a customer-support fine-tune, user B gets a coding fine-tune, both served from the same base.</p>
<p><b>OpenAI's hidden adapter game.</b> The fine-tuning feature in OpenAI's API is heavily based on adapter techniques behind the scenes (specific details aren't public). That's why fine-tuned models cost the same as base ones to serve — they're not actually distinct full models.</p>`
      },
      {
        id: "gguf",
        title: "GGUF models",
        whyItMatters: `GGUF is the file format that lets you download an AI model and run it on your laptop. If you've ever heard 'I'm running Llama locally', they're running a GGUF.`,
        lesson: `<p><b>GGUF</b> is a file format invented for the <b>llama.cpp</b> ecosystem. It packages the model weights, tokenizer, chat template, and metadata into one file (or a small set), optimised for CPU and consumer GPU inference.</p>
<p>If you've ever downloaded a model to run with Ollama, LM Studio, or llama.cpp directly, you used GGUF. Suffixes like <code>Q4_K_M</code>, <code>Q5_K_S</code> tell you the quantization level.</p>
<p>Practical guide:</p>
<ul>
<li><b>Q4_K_M</b>: best speed/quality trade-off for most users.</li>
<li><b>Q5_K_M</b>: slightly better quality, slightly more memory.</li>
<li><b>Q8_0</b>: near-original quality, but big.</li>
<li><b>Q2_K</b>: only for desperate VRAM situations.</li>
</ul>`,
        model: `GGUF = "model in a box" file format for local inference. Same idea as MP3 for audio: a portable, compressed package the player just needs to open.`,
        mistakes: [
          "Assuming GGUF is a model. It's a file format for storing quantized models, used by llama.cpp.",
          "Picking a GGUF quant level by file size alone. Q4_K_M is usually the right default; smaller quants sometimes lose noticeable quality."
        ],
        goDeeper: `<p><b>The format origin.</b> GGUF (GGML Universal Format) is the file format used by llama.cpp, the C++ library that pioneered running LLMs efficiently on consumer hardware. Replaced the older GGML format in 2023. Every "local AI" app you've used (Ollama, LM Studio, Jan, GPT4All) uses GGUF.</p>
<p><b>What's inside a GGUF.</b> The model weights at the chosen precision (Q4_K_M, Q5_K_M, Q8_0, fp16). The tokenizer. The chat template. Architecture metadata. Everything needed to run the model in one file. Typical sizes: a 7B model at Q4_K_M is 4-5GB.</p>
<p><b>The quant ladder.</b> Q2_K (smallest, noticeably degraded). Q3_K_M (smaller). Q4_K_M (sweet spot, usual default). Q5_K_M (slightly better quality). Q6_K (close to fp16). Q8_0 (8-bit, very close to fp16). FP16 (full precision, biggest). For everyday use, Q4_K_M is the right default. Heavier tasks or higher-quality requirements: step up to Q5 or Q6.</p>
<p><b>Where to find them.</b> Hugging Face has thousands of community-quantized GGUFs. Look for trusted users like "TheBloke" (historic gold standard, semi-retired) or "bartowski" (currently very active). Or run your own quantization with llama.cpp's tools.</p>`
      }
    ]
  },
  {
    section: "Inference & Optimization",
    exercise: `Ask Claude or ChatGPT a long question (something like 'explain how a car engine works in detail'). Watch the answer stream out word by word. That visible speed is what 'inference optimization' buys. Now ask the same thing in a different AI product (Gemini, Perplexity) and see whether it feels faster or slower.`,
    topics: [
      {
        id: "kv-cache",
        title: "KV cache",
        whyItMatters: `The KV cache is why the model's first response is slow but the rest is fast. Same reason your phone takes longer on the first tap than the next.`,
        lesson: `<p>When a Transformer generates token by token, every new token needs to attend to every previous token. Naively, that means recomputing the Keys (K) and Values (V) for the entire prompt at every step. Expensive.</p>
<p>The <b>KV cache</b> stores the K and V vectors for tokens already processed. New tokens just compute their own Q, K, V and read everyone else's K and V from the cache. Huge speedup.</p>
<p>Cost: the cache lives in GPU memory. It grows with context length, batch size, and number of layers. For long contexts, the KV cache can be larger than the model itself.</p>`,
        model: `KV cache = the model's "scratchpad" of what it already computed for the prompt. Without it, generation is O(n²). With it, O(n).`,
        mistakes: [
          "Confusing KV cache size with model size. They scale independently. A 7B model with 32k context can have a bigger KV cache than the model weights.",
          "Forgetting that KV cache is per-request. Each user's conversation has its own KV cache in memory."
        ],
        goDeeper: `<p><b>What KV cache stores.</b> For each token in the conversation so far, the Key and Value vectors from the attention mechanism. These are needed to compute attention for any new token. By caching them, you avoid recomputing the entire attention for the whole conversation on every new token.</p>
<p><b>The size formula.</b> KV cache size = 2 (K and V) × num_layers × num_heads × head_dim × context_length × 2 bytes (fp16). For Llama 3 70B with 32k context: 2 × 80 × 64 × 128 × 32,000 × 2 = about 80GB. Yes, the cache alone can be bigger than the model weights.</p>
<p><b>Why first-token latency is high.</b> The first token requires processing the entire input prompt and building the KV cache from scratch. Subsequent tokens only need to extend the cache by one slot. So a 10k-token prompt with a 100-token answer might take 3 seconds for the first token and 1 second for the remaining 99 — most of the cost is in the first.</p>
<p><b>How serving frameworks help.</b> vLLM's PagedAttention treats KV cache like virtual memory, allowing efficient sharing across requests and dynamic batching. This is why vLLM is 2-10x faster than naive implementations at serving multiple users.</p>`
      },
      {
        id: "flash-attention",
        title: "Flash Attention",
        whyItMatters: `Flash Attention is a quiet trick that made AI roughly twice as fast and is now in every production system. It's why modern AI feels snappier than it did in 2022.`,
        lesson: `<p><b>Flash Attention</b> is a way to compute attention that is mathematically identical to the standard version but radically more memory-efficient and faster on modern GPUs.</p>
<p>The trick: it never writes the full attention matrix (size n × n) to slow GPU memory. Instead, it streams blocks through fast on-chip memory and combines the results cleverly. Hardware-aware engineering, not a new algorithm.</p>
<p>Result: 2-4x faster attention, much less memory used, longer contexts feasible. It is now the default in PyTorch, vLLM, and most modern inference engines.</p>`,
        model: `Flash Attention = "same maths, smarter memory layout." The algorithm didn't change; the way it talks to GPU memory did.`,
        mistakes: [
          "Assuming Flash Attention changes model quality. It doesn't. It's an exact-equivalent faster implementation.",
          "Worrying about installing it manually. Modern PyTorch and most inference frameworks include it by default now."
        ],
        goDeeper: `<p><b>The problem it solves.</b> Standard attention requires materialising a large attention matrix (size: context × context) in GPU memory. For a 32k context, that's 1 billion entries per attention head. Memory bandwidth, not compute, becomes the bottleneck.</p>
<p><b>The Flash Attention trick.</b> Compute attention in chunks that fit in GPU SRAM (fast on-chip memory) instead of materialising the full matrix in HBM (slower off-chip memory). Mathematically equivalent to standard attention, but 2-4x faster and uses far less memory.</p>
<p><b>The versions.</b> Flash Attention 1 (2022): the original. Flash Attention 2 (2023): better parallelism, about 2x faster than v1. Flash Attention 3 (2024): targets Hopper GPUs (H100), uses tensor cores more efficiently. Each generation pulls more performance out of newer hardware.</p>
<p><b>Where it's deployed.</b> Standard in PyTorch 2.0+, vLLM, TGI, all major training frameworks. You're almost certainly using it without knowing. Modern AI infrastructure assumes it's there.</p>`
      },
      {
        id: "speculative-decoding",
        title: "Speculative decoding",
        whyItMatters: `Speculative decoding has a small fast model 'guess' what a big slow model would say and only checks the guesses. When it works, you get big-model quality at small-model speed.`,
        lesson: `<p>Generation is slow because each token must wait for the previous one. <b>Speculative decoding</b> attacks this by using a small fast model to "guess ahead" several tokens, then the big model verifies them all in one pass.</p>
<p>If the big model agrees with the guesses, you got several tokens in the time of one. If it disagrees, you fall back to the standard token. Either way, the final output is exactly what the big model would have produced alone.</p>
<p>Result: typical 2-3x speedup at inference, completely free in terms of quality.</p>`,
        model: `Speculative decoding = a fast assistant types out a draft, the slow expert checks it in one glance, you keep the agreed parts. Same final text, less waiting.`,
        mistakes: [
          "Assuming it's lossy quality. It IS lossless when implemented correctly — the verification step ensures outputs match what the big model would produce.",
          "Using it for short outputs. The overhead doesn't pay off for sub-50-token outputs."
        ],
        goDeeper: `<p><b>The mechanism.</b> Have two models: a big slow one (the target) and a small fast one (the draft). The draft model generates several candidate tokens. The target model evaluates them in parallel and accepts any that match what it would have generated, rejecting and regenerating the rest. Net result: you get target-quality output at potentially 2-3x the speed.</p>
<p><b>Why it works.</b> Big-model inference is bottlenecked by memory bandwidth, not compute. The big model is mostly waiting on weights to load from memory. Evaluating 5 candidate tokens in parallel uses the same memory bandwidth as evaluating 1 token sequentially. So you get extra tokens "for free".</p>
<p><b>The acceptance rate.</b> Depends on how good the draft model is at predicting the target. For coding tasks, acceptance can be 60-80% (very predictable). For creative writing, 30-40%. The speedup tracks the acceptance rate.</p>
<p><b>Modern variants.</b> Medusa: multiple draft heads, no separate draft model. EAGLE-2: improved draft model design, higher acceptance. Self-speculative: the model speculates for itself. All flavours of the same core idea.</p>`
      },
      {
        id: "inference-optimization",
        title: "Inference optimization",
        whyItMatters: `Why one AI product feels instant and another feels sluggish, even with the same model underneath, is usually inference optimization. It's the difference between a clever demo and a real product.`,
        lesson: `<p>"Make inference cheaper and faster" is a whole field. The main levers, in rough order of impact:</p>
<ul>
<li><b>Batching</b>: serve many requests on the same GPU in parallel.</li>
<li><b>KV cache management</b>: reuse, share, quantize the cache.</li>
<li><b>Quantization</b>: 4-bit weights cut compute and memory.</li>
<li><b>Flash Attention</b>: faster attention kernels.</li>
<li><b>Speculative decoding</b>: parallelise across tokens.</li>
<li><b>Tensor / pipeline parallelism</b>: split a big model across many GPUs.</li>
<li><b>Continuous batching</b>: don't wait for slow requests to finish before starting new ones (vLLM's signature trick).</li>
</ul>
<p>You rarely build these yourself. You pick an engine (vLLM, TensorRT-LLM, SGLang, llama.cpp) that does most of them for you.</p>`,
        model: `Inference optimization = squeezing more tokens per second per dollar out of the same GPU, mostly by being clever about memory and batching.`,
        mistakes: [
          "Optimising before measuring. Profile first to know where the time actually goes. Often it's not where you think.",
          "Skipping quantization because of perceived quality fears. Modern 4-bit quants lose almost nothing for most tasks."
        ],
        goDeeper: `<p><b>The optimization stack, in order of payoff.</b> (1) Quantization (4-bit Q4_K_M typically): 4x memory savings, 1.5-2x speed. (2) Batching: 5-10x throughput for high-concurrency. (3) KV cache management (PagedAttention via vLLM): another 2-3x for multi-user. (4) Speculative decoding: 1.5-3x speed for long outputs. (5) Flash Attention: built in by default now. (6) Continuous batching: lets requests start/finish independently.</p>
<p><b>The metric you care about.</b> Time-to-first-token (TTFT) for chat apps, tokens-per-second (TPS) for streaming, total throughput for batch jobs. These optimise differently. Don't tune for the wrong one.</p>
<p><b>Frameworks ranked.</b> vLLM (most popular, best general-purpose). TensorRT-LLM (Nvidia-only, fastest on Hopper). SGLang (newer, often fastest). llama.cpp (CPU + GPU, best for local). TGI (Hugging Face's). Pick based on your hardware and constraints.</p>
<p><b>The first thing to do.</b> Run the same inference task with PyTorch raw vs vLLM. Often you'll see 5-10x speedup with no code changes. That's your baseline; further optimization is incremental from there.</p>`
      },
      {
        id: "model-serving",
        title: "Model serving",
        whyItMatters: `Serving is the difference between 'the model exists' and 'a million people can use it at once'. It's the part of AI that looks like normal web engineering and is often the hardest bit.`,
        lesson: `<p><b>Model serving</b> is the engineering of "take this model and expose it as an API that scales, retries, batches, monitors, and doesn't fall over."</p>
<p>Typical stack components:</p>
<ul>
<li><b>Inference engine</b>: vLLM, TGI, TensorRT-LLM, SGLang, llama.cpp server.</li>
<li><b>Front HTTP server</b>: FastAPI, Litestar, or built into the engine.</li>
<li><b>Load balancer</b>: routes to multiple replicas.</li>
<li><b>Autoscaling</b>: add/remove replicas based on queue depth.</li>
<li><b>Observability</b>: token throughput, latency p50/p95/p99, error rates.</li>
<li><b>Guardrails</b>: content filters, rate limiting, abuse detection.</li>
</ul>`,
        model: `Model serving = the rest of the iceberg under your API call. The model is 10%; the serving infra is 90%.`,
        mistakes: [
          "Building serving infrastructure from scratch. vLLM, TGI, and similar exist for exactly this. Use them.",
          "Forgetting capacity planning. Knowing your QPS and tail-latency budget should come BEFORE choosing a model size."
        ],
        goDeeper: `<p><b>What model serving actually involves.</b> Load the model into GPU memory. Listen on an HTTP endpoint. Accept requests (with prompts, max_tokens, temperature, etc.). Batch them efficiently. Stream tokens back to clients as they're generated. Handle errors. Monitor for latency, GPU utilisation, queue depth.</p>
<p><b>Production-grade tools.</b> vLLM (most popular OSS server, OpenAI-compatible API). TGI (Hugging Face's). TensorRT-LLM (Nvidia, fastest on H100). Triton Inference Server (Nvidia's general inference server). Each is a battle-tested replacement for "I built my own with FastAPI".</p>
<p><b>The OpenAI-compatible API standard.</b> Most modern servers expose endpoints that match OpenAI's <code>/v1/chat/completions</code> exactly. This means you can swap clients in and out (use the OpenAI Python SDK pointing at your own server) without code changes. Industry alignment that benefits everyone.</p>
<p><b>Capacity planning rules.</b> Per A100 80GB: roughly 30-50 tokens/sec for a 70B model at fp16, more for quantized, more with batching. Plan for 70-80% peak utilisation; leave headroom for traffic spikes. Use autoscaling for variable load.</p>`
      },
      {
        id: "batch-inference",
        title: "Batch inference",
        whyItMatters: `Batching is why APIs are cheap. The provider runs many requests together, splits the cost, passes you the savings. It also explains why your AI bill goes weird at scale.`,
        lesson: `<p><b>Batch inference</b> = processing many prompts in one GPU pass. GPUs love batches; a batch of 32 prompts barely takes longer than a single prompt because the GPU was mostly idle on the single one.</p>
<p>Two flavours:</p>
<ul>
<li><b>Static batching</b>: fill a batch, run, return all results together. Simple. Bad for variable-length outputs because the whole batch waits for the slowest one.</li>
<li><b>Continuous batching</b> (a.k.a. dynamic / in-flight batching): new requests can join an ongoing batch on the next token step. vLLM popularised this and it is now standard. Throughput goes up by 5-10x in real traffic.</li>
</ul>`,
        model: `Batching = carpooling for tokens. One trip moves many passengers. Continuous batching = passengers can hop on and off mid-route.`,
        mistakes: [
          "Setting batch size too high. Above some threshold, you trade latency for throughput. Make sure your tail latency budget can absorb it.",
          "Confusing static batching with continuous batching. Continuous is much better for variable-length workloads."
        ],
        goDeeper: `<p><b>Static vs continuous batching.</b> Static: take N requests, wait for all to finish, return all together. Waste of compute when some requests are short and others long. Continuous (or "in-flight") batching: as soon as one request finishes, slot a new one into the GPU. Much higher utilization.</p>
<p><b>The throughput-latency tradeoff.</b> Larger batches mean higher throughput but higher per-request latency (because each request waits for the batch to fill). Single-user chat needs small batches for low latency. High-volume background processing wants big batches for cost efficiency.</p>
<p><b>Where batching shines.</b> Embedding generation (no streaming needed, batches of 1000+ are common). Document summarization pipelines. Classification at scale. Synthetic data generation. Generally: any time you have many independent prompts to process.</p>
<p><b>How vLLM defaults work.</b> Continuous batching by default. Max batch size auto-tuned based on GPU memory and KV cache budget. Variable-length sequences handled gracefully. For most teams, this is the default starting point.</p>`
      },
      {
        id: "gpu-basics",
        title: "GPU basics",
        whyItMatters: `When AI news mentions 'NVIDIA H100' or 'GPU shortage', this is what they're talking about. You don't need to build one, but knowing what a GPU is for makes every AI cost story make sense.`,
        lesson: `<p>A GPU is a chip with thousands of small cores designed for the same operation on many numbers at once. That is exactly what neural networks need: huge matrix multiplications.</p>
<p>Key specs to know:</p>
<ul>
<li><b>VRAM</b>: how much model + cache + activations fit. The hardest limit.</li>
<li><b>Memory bandwidth</b>: how fast you can move data between VRAM and the compute cores. Often the real bottleneck for inference.</li>
<li><b>FLOPs</b>: raw compute throughput. Matters for training, less for inference.</li>
<li><b>Generation</b>: Ampere (A100, RTX 30xx), Hopper (H100), Blackwell (B100/B200), RTX 40xx, 50xx.</li>
</ul>
<p>Rule of thumb in 2026: for LLM inference, you are usually memory-bandwidth-bound, not FLOPs-bound.</p>`,
        model: `GPU = a giant choir all singing the same note at once. Perfect for matrix maths, terrible for serial logic.`,
        mistakes: [
          "Equating 'GPU' with 'gaming graphics card'. ML workloads use specific GPU features (tensor cores, large VRAM, NVLink) that consumer cards mostly lack.",
          "Buying GPU specs based on FLOPS alone. Memory bandwidth and VRAM size matter more for LLM inference."
        ],
        goDeeper: `<p><b>What matters for LLMs.</b> VRAM (memory) determines what fits. Memory bandwidth determines how fast inference goes. Tensor cores (specialised matrix multiplication units) accelerate everything. Interconnect (NVLink, InfiniBand) matters for multi-GPU training. Raw FP32 FLOPS, the spec consumer reviewers care about, is mostly irrelevant.</p>
<p><b>The 2025 hardware landscape.</b> Datacentre: H100 (80GB, the workhorse), H200 (141GB, more memory), B200 (Blackwell, about 2x H100). Consumer: RTX 4090 (24GB, great for local inference and small fine-tunes), RTX 5090 (32GB, just released). Apple Silicon: M3/M4 Max (up to 128GB unified memory, surprisingly capable for inference).</p>
<p><b>Cloud GPU costs (rough 2025).</b> A100 80GB: $1-2/hr on spot. H100: $2-5/hr on spot. Significant savings from spot vs on-demand. Reserved capacity is cheaper still but requires commitment.</p>
<p><b>Why CUDA wins.</b> Nvidia's software stack (CUDA, cuDNN, cuBLAS) has 15+ years of head start on AMD/Intel for ML. Even though AMD MI300X has competitive hardware specs, the software ecosystem and developer mindshare lag significantly. This may shift in coming years but hasn't yet.</p>`
      },
      {
        id: "vram-basics",
        title: "VRAM basics",
        whyItMatters: `VRAM is the single number that decides whether a model can run on your machine. Not the price, not the speed. Just 'is there enough memory'.`,
        lesson: `<p><b>VRAM</b> = video memory on the GPU. Everything the model needs during inference lives here: weights, KV cache, activations, overhead.</p>
<p>Rough budget for inference:</p>
<ul>
<li><b>Weights</b>: parameters × bytes-per-param. e.g. 7B fp16 ≈ 14GB; 7B 4-bit ≈ 4GB.</li>
<li><b>KV cache</b>: grows with context × batch. Can easily exceed weights for long contexts.</li>
<li><b>Activations + overhead</b>: ~1-3GB.</li>
</ul>
<p>If model + KV cache + overhead > VRAM, you crash. You can: quantize, shorten context, smaller batch, or split across multiple GPUs.</p>`,
        model: `VRAM = the GPU's desk. Everything for the current task has to fit on the desk simultaneously. Run out of desk, run out of luck.`,
        mistakes: [
          "Counting only model weights. Add KV cache, activations, and overhead. Real memory use is often 1.5-2x the weight size.",
          "Buying just enough VRAM. Headroom matters for batch size flexibility and longer context."
        ],
        goDeeper: `<p><b>The memory budget for inference.</b> Model weights (the biggest chunk, varies by quantization). KV cache (per-request, scales with context length). Activations (small but non-zero). CUDA framework overhead (1-2GB). Total memory used equals the sum of all of these.</p>
<p><b>Concrete examples.</b> 7B model at fp16: 14GB weights + about 2GB other = 16GB minimum. Same at Q4: 4GB weights + about 2GB other = 6GB total. 70B model at Q4_K_M with 8k context: about 35GB weights + 5GB KV + 2GB other = about 42GB total. Fits on a 48GB card.</p>
<p><b>For training, multiply everything by 3-4x.</b> Optimizer states (Adam stores 2 extra copies of the weights). Gradient buffers. Backward-pass activations. So fine-tuning a 7B model needs 40-80GB for full precision. LoRA cuts this dramatically by only training tiny matrices.</p>
<p><b>The cheap headroom rule.</b> Always buy or rent more VRAM than your model needs. Reasons: longer context windows over time, bigger batches for throughput, future-proof for slightly bigger models. The marginal cost of going from 24GB to 48GB is rarely the binding constraint.</p>`
      },
      {
        id: "latency-quality",
        title: "Latency vs quality tradeoffs",
        whyItMatters: `Every AI product is a slider between fast-and-okay and slow-and-good. The best products know exactly which one their users want. The worst ones guess.`,
        lesson: `<p>You almost always trade speed against quality. The dials:</p>
<ul>
<li><b>Model size</b>: bigger = smarter and slower.</li>
<li><b>Quantization</b>: lower bits = faster, marginally dumber.</li>
<li><b>Sampling</b>: greedy is fastest, beam search slowest, top-p in between.</li>
<li><b>Reasoning length</b>: "think step by step" or reasoning models add latency for accuracy.</li>
<li><b>Context length</b>: longer prompts = slower prefill = higher time-to-first-token.</li>
<li><b>Caching</b>: prompt cache hits can cut latency by 10x.</li>
</ul>
<p>Product question: what is "good enough quality at acceptable latency" for <i>this</i> use case? An autocomplete tolerates 100ms and dumb-but-fast. A medical summary tolerates 10s and demands smart.</p>`,
        model: `Latency and quality are on a slider. Your job is to put the slider at the right place for the product, not at the maximum on either side.`,
        mistakes: [
          "Optimising for the wrong axis. Real-time chat values latency; batch document processing values throughput. Different problems.",
          "Assuming the biggest model is always 'safer'. For most tasks, a smaller model plus better prompting plus light fine-tuning beats a giant model on a raw call."
        ],
        goDeeper: `<p><b>The slider, explicit.</b> Faster + smaller + cheaper ↔ Slower + bigger + more expensive. Every product feature lives somewhere on this slider. Autocomplete: heavy left (must be fast, can be "good enough"). Legal contract review: heavy right (can be slow, must be accurate). Knowing where you are matters more than blindly trying to be in the middle.</p>
<p><b>Concrete numbers.</b> Llama 3.2 3B at Q4 on a laptop: about 50 tokens/sec, costs nothing per call. GPT-5 on API: about 80 tokens/sec, costs cents per call. Quality gap is real but task-dependent. For many use cases the 3B model is 90% as good for 1% of the cost.</p>
<p><b>The hybrid pattern.</b> Use a small fast model for the bulk of the work; escalate to a big slow model only when the small one's confidence is low. Modern routing libraries (RouteLLM, Martian) automate this. Often gets you 80% of big-model quality at 20% of the cost.</p>
<p><b>Where the slider is moving.</b> Models keep getting better at smaller sizes faster than they get cheaper at the high end. Bet on more capability fitting in smaller models over the next 2 years. The "tiny fast" position on the slider is gaining ground.</p>`
      }
    ]

        lesson: `<p><b>llama.cpp</b> is a C++ project that runs LLMs on almost any hardware: CPU only, Apple Silicon, NVIDIA, AMD, even Raspberry Pi. Tiny dependency footprint, very fast on CPU, foundational to the local-AI movement.</p>
<p>It introduced the GGUF format and is the engine under Ollama, LM Studio, Jan, and many other consumer tools.</p>
<p>You'd use it directly when you want maximum control, minimal install, or you're embedding inference into another app.</p>`,

        goDeeper: `<p><b>The pioneering open-source project.</b> Started by Georgi Gerganov in 2023 as a weekend project to run Llama on a MacBook in pure C++. It worked. Within months, llama.cpp became the foundation for the entire local-AI ecosystem.</p>
<p><b>What makes it special.</b> Aggressive use of quantization (GGUF format originated here). Tight CPU and GPU implementations with hand-tuned kernels. No Python overhead. Runs on basically any hardware: Mac (Metal), Linux/Windows (CUDA, ROCm, Vulkan), even Raspberry Pi.</p>
<p><b>What's built on top.</b> Ollama (the friendliest wrapper). LM Studio (GUI). Jan (open-source GUI). GPT4All (early entrant, still around). KoboldCpp (for creative writing). Most "local AI" apps are llama.cpp underneath with a different UX on top.</p>

<p>It is built on llama.cpp under the hood but hides all the flags. Ideal for: developers who want a local model running in 30 seconds, prototyping, side projects, privacy-sensitive demos.</p>

ollama run llama3.1

        goDeeper: `<p><b>The pitch.</b> Local LLMs without command-line gymnastics. Install Ollama (one binary). Run <code>ollama pull llama3.2</code>. Run <code>ollama run llama3.2</code>. You're chatting with a local LLM in under 2 minutes from a clean machine.</p>
<p><b>What it provides on top of llama.cpp.</b> Model registry (one-command pulls like Docker). REST API on port 11434 (OpenAI-compatible). Automatic model unloading when idle. Multi-model swapping. Modelfile system for custom configurations.</p>
<p><b>Default model set.</b> Llama 3.2, Llama 3.1, Mistral, Gemma, Phi, Qwen, plus many others. The library lists hundreds; <code>ollama list</code> shows what's installed locally.</p>
<p><b>Integration pattern.</b> Point any OpenAI-compatible client at <code>http://localhost:11434/v1</code>. The OpenAI Python SDK works directly. LangChain has native Ollama support. Curl works. This portability is why Ollama dominates local dev.</p>`

      {
        id: "vllm",
        title: "vLLM",
        whyItMatters: `vLLM is the engine companies use when they need to serve millions of AI requests cheaply. You won't run it yourself, but if you've ever used an AI API, you've probably touched vLLM.`,
        lesson: `<p><b>vLLM</b> is a high-throughput inference engine designed for serving LLMs in production. Key innovations: <b>PagedAttention</b> (manages KV cache like virtual memory) and continuous batching.</p>
<p>It speaks the OpenAI API, so dropping it in behind your existing OpenAI client is usually a one-line change. It is what most serious self-hosters use behind the scenes.</p>
<p>Trade-offs: GPU only (no CPU mode), heavier install than Ollama, picky about model formats (Hugging Face safetensors, AWQ, GPTQ; not GGUF).</p>`,

        goDeeper: `<p><b>The pitch.</b> "Easy, fast, and cheap LLM serving for everyone." Open-source inference server out of UC Berkeley. Now used by enterprises, AI labs, and most modern open-source AI deployments.</p>
<p><b>The killer feature: PagedAttention.</b> KV cache is the memory bottleneck in LLM serving. vLLM treats KV cache like virtual memory: paged into and out of GPU memory as needed, shared across requests when possible. Result: 2-10x higher throughput than naive servers.</p>
<p><b>Continuous batching out of the box.</b> Requests don't wait for batches to fill — they slot into the running batch as soon as a slot opens. New requests join, old ones leave, batch composition is dynamic. This is the difference between "serves 10 users well" and "serves 1000 users well".</p>
<p><b>OpenAI-compatible API.</b> <code>vllm serve meta-llama/Llama-3.1-8B-Instruct</code> spins up a server on port 8000 with OpenAI's API. Drop in the OpenAI SDK, point at <code>http://localhost:8000/v1</code>, you're serving your own LLM with the exact same client code.</p>`

        whyItMatters: `MLX is Apple's answer to AI on Mac hardware. If you have an Apple Silicon laptop, MLX is why local AI got way faster on your machine in the last year.`,
        lesson: `<p><b>MLX</b> is Apple's machine learning framework, optimised for Apple Silicon (M1/M2/M3/M4). It uses unified memory: the GPU and CPU share the same RAM, which means a MacBook with 64GB unified memory can effectively run a 70B model.</p>
<p>There are two flavours people use:</p>
<ul>
<li><b>MLX</b> (the framework itself) for custom Python work.</li>
<li><b>mlx-lm</b> for running quantized LLMs from the command line, similar to llama.cpp.</li>
</ul>
<p>For Mac users it is often the fastest local option, beating llama.cpp on the same hardware.</p>`,

        goDeeper: `<p><b>What MLX is.</b> Apple's open-source machine learning framework, designed specifically for Apple Silicon (M-series chips). Released in 2023. Optimised for the unified memory architecture that makes Apple chips unique.</p>
<p><b>Why Apple Silicon is special for AI.</b> CPU and GPU share the same memory (unified memory). On a 64GB Mac, your model can use up to 64GB of GPU memory effectively — no copying back and forth. A 70B Q4 model that needs a $30k+ datacenter GPU on Linux fits comfortably on a $5k MacBook Pro.</p>
<p><b>The ecosystem.</b> mlx-lm (the canonical inference library). mlx-vlm (for vision-language models). Hugging Face has thousands of MLX-converted models. Fine-tuning works via mlx-lm's <code>lora</code> command.</p>
<p><b>The 2025 reality.</b> For local LLM use on a Mac, MLX is usually 1.5-2x faster than llama.cpp's Metal backend. For training, MLX is your only real option on Apple Silicon (CUDA isn't available). If you're a Mac user serious about local AI, you'll touch MLX.</p>`

<p><b>The model hub conventions.</b> Each model has: weights file(s), config.json (architecture details), tokenizer files, README.md (the "model card"). Loading is universal: <code>AutoModelForCausalLM.from_pretrained("meta-llama/Llama-3.1-8B")</code> works for nearly any model.</p>
<p><b>The community magic.</b> Anyone can upload a model. Anyone can fork and remix it. Top contributors like "TheBloke" (now retired) and "bartowski" have published thousands of quantized versions of popular models. This decentralized contribution is what made the "open-source AI" wave possible.</p>

        lesson: `<p><b>Unsloth</b> is a fine-tuning library that wraps Hugging Face Transformers and adds custom CUDA kernels. Result: 2-5x faster fine-tuning, half the VRAM, same final quality.</p>
<p>It is the easiest way to fine-tune a 7B-70B model on a single consumer or rented GPU. Notebooks are well documented, defaults are sane, and it supports LoRA, QLoRA, DPO, and continued pretraining.</p>`,

        goDeeper: `<p><b>What it does.</b> Unsloth is a drop-in optimisation for LoRA/QLoRA fine-tuning. Same Python API as Hugging Face's PEFT but the underlying kernels are hand-written CUDA. Result: 2-5x faster training and 50-80% less memory use, with identical model outputs.</p>
<p><b>How it became dominant.</b> Two-person team. Wrote optimised kernels for the operations that dominate fine-tuning time (attention, MLP forward/backward). Made them work seamlessly through the standard Transformers API. Open-sourced everything.</p>
<p><b>The free Colab template.</b> Unsloth ships free Google Colab notebooks for fine-tuning Llama, Mistral, Gemma, Phi, Qwen, etc. Free tier Colab (T4 GPU) is enough to fine-tune a 7B model in a few hours. This made fine-tuning genuinely accessible to anyone with a Google account.</p>
<p><b>Why every fine-tuning tutorial uses it.</b> Faster training means faster iteration means better fine-tunes. The default for most independent ML practitioners and small teams since 2024.</p>`

      {
        id: "axolotl",
        title: "Axolotl",
        whyItMatters: `Axolotl is the tool serious teams use to fine-tune models. Knowing it exists is enough; you don't need to use it to know it's the standard.`,
        lesson: `<p><b>Axolotl</b> is a fine-tuning framework configured by YAML. You describe the model, dataset, method, and hyperparameters in a config file, then run one command.</p>
<p>It is more powerful and flexible than Unsloth but a bit heavier. Preferred by teams who do many fine-tunes and want reproducible, version-controlled configs.</p>
<p>Supports: SFT, DPO, full fine-tuning, LoRA, QLoRA, multi-GPU, FSDP, DeepSpeed, custom datasets, custom chat templates.</p>`,
        model: `Axolotl = "fine-tuning as configuration." If Unsloth is a nice notebook, Axolotl is a serious build pipeline.`,

        goDeeper: `<p><b>What Axolotl is.</b> A configuration-driven fine-tuning framework. You write a YAML file describing your training run (base model, dataset, hyperparameters, technique) and Axolotl handles the rest. Built on top of Hugging Face Transformers, TRL, and PEFT.</p>
<p><b>Why teams pick it.</b> Reproducibility (configs are checked into git). Battle-tested support for many fine-tuning techniques (LoRA, QLoRA, full FT, DPO, ORPO). Distributed training support (FSDP, DeepSpeed). Good defaults that won't blow up.</p>
<p><b>Typical YAML keys.</b> base_model. datasets (list with format and path). adapter (lora, qlora, or none). sequence_len, micro_batch_size, gradient_accumulation_steps. learning_rate, num_epochs, warmup_steps. save_steps. Plus 50+ optional advanced parameters.</p>
<p><b>Who actually uses it.</b> Serious open-source fine-tuners. Companies fine-tuning at scale. Anyone training multiple models per week and needing reproducibility. For one-off experiments, Unsloth is faster to start with.</p>`

      {
        id: "peft",
        title: "PEFT",
        whyItMatters: `PEFT (Parameter-Efficient Fine-Tuning) is the family of techniques that make custom AI affordable. LoRA, QLoRA, adapters, all of them sit under this umbrella.`,
        lesson: `<p><b>PEFT</b> (Parameter-Efficient Fine-Tuning) is a Hugging Face library that implements LoRA, QLoRA, IA3, prefix tuning, AdaLoRA, DoRA, and more. It is the underlying engine many higher-level frameworks (Axolotl, Unsloth, TRL) sit on top of.</p>
<p>Two main objects:</p>
<ul>
<li><code>PeftConfig</code>: describes the method (LoRA rank, alpha, target modules).</li>
<li><code>get_peft_model(base, config)</code>: wraps a base model to make it trainable with that method.</li>
</ul>`,
        model: `PEFT = the standard library for adapter-based fine-tuning. Most "fine-tune this model" tutorials are PEFT under the hood.`,
        mistakes: [

          "Picking advanced PEFT methods first. LoRA is well-understood and works for 90%+ of use cases. Don't reach for exotic methods without reason."
        ],
        goDeeper: `<p><b>The library.</b> Hugging Face PEFT (Parameter-Efficient Fine-Tuning). Provides clean APIs for all major adapter techniques: LoRA, QLoRA, IA3, prefix tuning, prompt tuning, P-tuning. Integrates seamlessly with Transformers and TRL.</p>
<p><b>The typical workflow.</b> Load base model. Wrap it with a LoraConfig (specifies rank, target modules, alpha). Get a PEFT model. Train with standard Hugging Face Trainer. Save the adapter (small file). At inference, load base plus adapter together.</p>
<p><b>Why the API matters.</b> Without PEFT, implementing LoRA from scratch is a small project. With PEFT, it's 5 lines of code. This abstraction is what made parameter-efficient fine-tuning a default rather than a research topic.</p>
<p><b>Adapter merging.</b> PEFT can merge a trained adapter back into the base model weights, producing a single combined model. Useful for deployment: no runtime overhead of separate adapter loading. The downside: you lose the ability to swap adapters dynamically.</p>`

        whyItMatters: `TRL is the Hugging Face library that powers most public DPO and RLHF training. If a paper mentions training a chat model, TRL is probably in the picture.`,
        lesson: `<p><b>TRL</b> (Transformer Reinforcement Learning) is Hugging Face's library for fine-tuning with preferences and RL. It is where SFTTrainer, DPOTrainer, KTOTrainer, PPOTrainer, RewardTrainer all live.</p>
<p>If you want to do anything beyond plain supervised fine-tuning (DPO, RLHF, reward modelling, KTO), you almost certainly go through TRL.</p>
<p>It plays nicely with PEFT, Accelerate, and FSDP for scaling.</p>`,

        goDeeper: `<p><b>The library.</b> Hugging Face's TRL (Transformer Reinforcement Learning). The de facto open-source library for post-training language models with preference data. Powers most of the open-source community's alignment work.</p>
<p><b>The trainer classes.</b> SFTTrainer (supervised fine-tuning, base case). DPOTrainer (direct preference optimization). PPOTrainer (the original RLHF). ORPOTrainer (combines SFT and preference learning in one step). KTOTrainer (binary feedback, no pairs needed). RewardTrainer (just trains reward models).</p>
<p><b>Data format expectations.</b> For DPO: dataset columns "prompt", "chosen", "rejected". For SFT: "messages" (chat format) or "text" (raw). For ORPO: same as DPO. The cleanness of these contracts is what makes TRL usable.</p>
<p><b>What's behind the major model releases.</b> Llama 3's preference training: TRL. Open-source DPO replication of Tulu, Zephyr, NeuralChat: TRL. Most public open-source alignment work in 2024-2025 is TRL-based. The library has become the standard.</p>`

  {
    section: "RAG & Memory",
    exercise: `Ask ChatGPT or Claude what happened in the news yesterday. Notice it either refuses, hedges, or makes something up. Now find a chatbot on a company's support page (Klarna, Notion, basically any modern SaaS) and ask it something specific about their product. Notice it answers fluently. The difference is RAG.`,
    topics: [
      {
        id: "rag",
        title: "RAG",
        whyItMatters: `RAG is the trick that lets an AI answer questions about your specific data (your company docs, your notes, today's news) without retraining it. Almost every useful AI product in the world is doing this.`,
        lesson: `<p><b>RAG</b> = Retrieval-Augmented Generation. The pattern: when a question comes in, search a knowledge base for relevant text, paste it into the prompt, then let the LLM answer using that context.</p>
<p>Why: LLMs don't know your private docs and they hallucinate on niche facts. RAG injects fresh, authoritative text at query time. You don't retrain the model; you change what it sees in the moment.</p>
<p>Pipeline:</p>
<ol>
<li><b>Ingest</b>: split docs into chunks, embed them, store in a vector DB.</li>
<li><b>Retrieve</b>: embed the question, find nearest chunks, optionally rerank.</li>
<li><b>Generate</b>: stuff the chunks into the prompt and ask the LLM.</li>
</ol>`,
        model: `RAG = open-book exam. The LLM is smart but cluess on your stuff; you give it the right page right before it answers.`,
        mistakes: [
          "Treating RAG as a complete solution. It only retrieves information; the LLM still has to use it correctly. Bad retrieval = bad answer regardless of model.",
          "Building production RAG without an eval suite. RAG quality is heavily empirical; you can't tune what you don't measure."
        ],
        goDeeper: `<p><b>The full pipeline.</b> (1) Indexing: chunk documents, embed each chunk, store vectors in a vector DB. (2) Retrieval: embed the user's question, find the K most similar chunks. (3) Generation: stuff retrieved chunks into the prompt as context, ask the LLM to answer.</p>
<p><b>Where RAG goes wrong.</b> Chunking strategy (too small loses context, too large dilutes relevance). Embedding model quality (cheap embeddings miss nuance). Top-K choice (too few misses info, too many adds noise). Retrieval relevance (semantic similarity isn't always what you want). Prompt structure (how chunks are presented matters).</p>
<p><b>Common improvements.</b> Reranker: take top-50 with cheap embeddings, rerank to top-5 with expensive cross-encoder. Hybrid search: combine semantic (embeddings) with keyword (BM25). Query expansion: have the LLM rewrite the query before retrieval. Filtering: only retrieve from chunks matching metadata (date, source, type).</p>
<p><b>When NOT to use RAG.</b> The information is in the model's training data and stable. The query is simple enough that the LLM doesn't need supporting docs. The corpus is small (under 50 docs — just put it all in context if the model has long context).</p>`
      },
      {
        id: "vector-dbs",
        title: "Vector databases",
        whyItMatters: `Vector databases are where 'meaning' is stored. They're the bit of RAG that lets you ask 'questions about jacket warmth' and get jackets back, not just keyword matches.`,
        lesson: `<p>A <b>vector database</b> stores embeddings and finds the nearest ones to a query embedding, fast. The core operation is approximate nearest neighbour (ANN) search using indexes like HNSW or IVF.</p>
<p>Popular options:</p>
<ul>
<li><b>FAISS</b>: library, runs in-memory, no server. Perfect for prototypes.</li>
<li><b>Chroma</b>: lightweight, file-backed, popular for local dev.</li>
<li><b>Qdrant, Weaviate, Milvus</b>: standalone servers, production-ready.</li>
<li><b>pgvector</b>: Postgres extension. If you already have Postgres, this is often the right answer.</li>
<li><b>Pinecone</b>: managed cloud service.</li>
</ul>`,
        model: `Vector DB = a Google for meaning. Index meanings; query by meaning; get back the closest matches.`,
        mistakes: [
          "Choosing a vector DB before knowing your data scale. Small corpus? Just use FAISS in-memory or pgvector. Vector DB infra has real complexity costs.",
          "Treating vector DB as the source of truth. It's a derived index. Keep your authoritative docs in normal storage."
        ],
        goDeeper: `<p><b>The decision tree.</b> Under 10k vectors: FAISS in-memory, or pgvector if you have Postgres. 10k-1M: Chroma, Qdrant, or pgvector. 1M-100M: Pinecone, Weaviate, Qdrant. 100M+: Milvus, Vespa, or specialised infrastructure. Don't overshoot — vector DBs add operational complexity.</p>
<p><b>How they work.</b> Approximate nearest neighbor (ANN) algorithms like HNSW or IVF. Trade exact correctness for sub-millisecond query time. Most queries get the right top-K despite the approximation.</p>
<p><b>The hosted vs self-hosted choice.</b> Pinecone, Weaviate Cloud, Qdrant Cloud: pay per usage, zero ops. Self-hosted Qdrant or Weaviate: lower per-query cost, you run the cluster. pgvector: use your existing Postgres, simplest path. Choose based on whether you want ops as a feature or a cost.</p>
<p><b>What goes in alongside the vector.</b> Metadata for filtering (source, date, type, user_id). Original text (so you don't need a separate lookup). Embedding model version (so you can re-embed when models change). Trace IDs (for evals later).</p>`
      },
      {
        id: "chunking",
        title: "Chunking",
        whyItMatters: `Chunking is the unglamorous decision that makes or breaks a RAG system. Cut documents up wrong and the AI loses the plot. Cut them right and it feels like magic.`,
        lesson: `<p><b>Chunking</b> is the art of splitting documents into pieces small enough to embed and retrieve, but large enough to carry meaning.</p>
<p>Common strategies:</p>
<ul>
<li><b>Fixed-size</b>: every 500 tokens, with overlap. Simple, dumb, often fine.</li>
<li><b>Recursive character splitting</b>: split on paragraphs, then sentences, then words. The standard.</li>
<li><b>Semantic chunking</b>: split where the meaning shifts (using embeddings of consecutive sentences).</li>
<li><b>Structural</b>: split on headings (markdown, HTML).</li>
</ul>
<p>Rule of thumb: 200-800 tokens per chunk, 10-20% overlap. Tune with eval.</p>`,
        model: `Chunking = cutting a long book into index cards. Cards too small lose context, cards too big bury the answer.`,
        mistakes: [
          "Picking a chunk size and forgetting it. Different document types need different chunking strategies.",
          "Splitting in the middle of important content. Use semantic boundaries (headings, paragraphs, sentences) when possible."
        ],
        goDeeper: `<p><b>The size question.</b> Too small (under 200 tokens): each chunk loses context. Too big (over 1500 tokens): retrieval becomes coarse, irrelevant content gets stuffed into prompts. Sweet spot for most: 300-800 tokens per chunk with some overlap (50-100 tokens).</p>
<p><b>Strategies, ranked.</b> Fixed-size: simplest, often acceptable. Recursive splitting: split by paragraphs, then sentences if too big, then characters if still too big. Semantic chunking: use an embedding model to detect semantic breaks. Markdown-aware: respect heading hierarchy. Document-aware: each PDF page is a chunk, each Slack message is a chunk.</p>
<p><b>The overlap trick.</b> Have chunks overlap by 10-20%. If a sentence happens to be at a chunk boundary, both chunks contain it. Slight increase in storage cost, big improvement in retrieval coherence.</p>
<p><b>What kills RAG most often.</b> Bad chunking. Bigger improvements often come from better chunking than from better embeddings or better models. Don't skip iterating on this.</p>`
      },
      {
        id: "retrieval-pipelines",
        title: "Retrieval pipelines",
        whyItMatters: `Most 'why is this AI giving me dumb answers' problems are retrieval problems, not model problems. The pipeline is where you fix them.`,
        lesson: `<p>A real retrieval pipeline is more than "embed query, get top-k." Common stages:</p>
<ol>
<li><b>Query rewriting</b>: expand vague queries, decompose multi-part questions.</li>
<li><b>Hybrid search</b>: combine semantic (embeddings) with keyword (BM25). Each catches what the other misses.</li>
<li><b>Top-K retrieval</b>: pull, say, 50 candidate chunks.</li>
<li><b>Reranking</b>: a small cross-encoder model rescores those 50 and keeps the top 5-10.</li>
<li><b>Context construction</b>: deduplicate, order, format for the LLM.</li>
</ol>
<p>Each stage adds latency but boosts quality. Tune the slider for your product.</p>`,
        model: `Retrieval pipeline = a librarian's workflow. Understand the question, search shelves multiple ways, pull a stack, prune to the best, hand to the reader.`,
        mistakes: [
          "Confusing retrieval pipeline with vector search. Vector search is one step; the full pipeline includes query rewriting, filtering, and reranking.",
          "Skipping observability. Log every retrieval — query, retrieved chunks, scores. Without this, you can't debug bad answers."
        ],
        goDeeper: `<p><b>A real-world retrieval pipeline.</b> (1) Query preprocessing: spell correction, language detection. (2) Query rewriting: have an LLM rephrase ambiguous queries, or generate multiple variants. (3) Filtering: apply metadata filters (this user's docs only, recent docs only). (4) First-pass retrieval: vector search returns top 50. (5) Reranking: cross-encoder reranks to top 5. (6) Prompt assembly: structure the chunks into the system prompt.</p>
<p><b>HyDE (Hypothetical Document Embeddings).</b> A clever pattern: have the LLM generate a hypothetical answer to the query, then embed that for retrieval (not the query). The hypothetical answer is more similar in style to your documents than the question is. Often improves retrieval quality noticeably.</p>
<p><b>Multi-query retrieval.</b> Have the LLM generate 3-5 variants of the query. Run retrieval for each. Take the union. Deduplicate. Better recall at modest cost.</p>
<p><b>What to log.</b> Every query, the chunks retrieved, their scores, the chunks used in the prompt, the final answer. When users complain, you can replay the pipeline and see exactly which step went wrong. Without this you're flying blind.</p>`
      },
      {
        id: "ai-memory",
        title: "AI memory systems",
        whyItMatters: `By default, an AI forgets you the moment a conversation ends. Memory systems are how 'AI that remembers your preferences' actually works. It's all stitched on top, not inside the model.`,
        lesson: `<p>"Memory" in an AI app means persistent state about the user or conversation that survives across requests. The LLM itself is stateless; memory is your job.</p>
<p>Common patterns:</p>
<ul>
<li><b>Conversation buffer</b>: full chat history, capped to N turns.</li>
<li><b>Summary memory</b>: an LLM rolls older turns into a running summary.</li>
<li><b>Entity memory</b>: structured facts about people/things, stored as JSON.</li>
<li><b>Retrieval memory</b>: store conversation events as documents and RAG over them.</li>
<li><b>Per-user files</b>: long-lived markdown notes the LLM can read and edit (like your own memory system).</li>
</ul>`,
        model: `AI memory = the notebook outside the LLM that gets handed in at the start of every new conversation.`,
        mistakes: [
          "Treating context window as memory. The context window is short-term and ends with the conversation. Real memory persists.",
          "Building memory before you need it. Most products survive fine with no memory beyond the current session. Don't add complexity prematurely."
        ],
        goDeeper: `<p><b>The three memory tiers.</b> Short-term: current conversation in context. Session: persisted across the day or week. Long-term: across months or forever. Each needs different storage and retrieval.</p>
<p><b>The dominant pattern in 2025.</b> Extract facts after each conversation ("user prefers concise replies", "user is allergic to dairy"). Store as embeddings plus metadata. Retrieve relevant facts when starting a new conversation. Inject into system prompt. ChatGPT, Claude, and most personal-assistant products work this way.</p>
<p><b>Where it breaks.</b> Fact extraction misses important things. Stored facts conflict with new info (does "I love pizza" from 2 years ago still apply?). Retrieving the wrong facts pollutes the system prompt. Over-confident memory ("the user definitely said X") leads to embarrassing errors.</p>
<p><b>What "real" memory might look like.</b> Active research area. Probably involves: structured knowledge graphs of user facts, time-stamped beliefs with confidence scores, periodic reconciliation by the model itself. None of this is solved yet; current systems are crude approximations.</p>`
      },
      {
        id: "semantic-search",
        title: "Semantic search",
        whyItMatters: `Semantic search is why modern search bars can find 'cosy autumn jumper' when the listing says 'warm knit pullover'. It's RAG's foundation and increasingly how search itself works.`,
        lesson: `<p><b>Semantic search</b> means searching by meaning instead of by exact words. Query "tips to sleep better" matches a doc titled "How to improve insomnia" even though no words overlap.</p>
<p>It is the building block of RAG, recommendation systems, deduplication, clustering, and classification.</p>
<p>Implementation: embed all docs, embed the query, return the docs with highest cosine similarity. Add reranking, hybrid search, and metadata filters for production.</p>`,
        model: `Semantic search = "find me documents that mean the same thing," not "find me documents that say the same thing."`,
        mistakes: [
          "Replacing keyword search with semantic search entirely. Hybrid usually beats either alone. Keep both, combine scores.",
          "Tuning embeddings without changing the index. Embedding upgrades require re-indexing all your content."
        ],
        goDeeper: `<p><b>The "meaning" insight.</b> Keyword search (BM25, lexical) matches words exactly. Semantic search matches meaning. "How do I unsubscribe?" might semantically match "cancel my account" even though no words overlap. This single capability transforms search quality.</p>
<p><b>Where it shines.</b> User questions phrased differently from your docs. Synonyms. Conceptual searches. Cross-lingual search. Long-tail queries that exact-match doesn't handle. Most modern site search is now hybrid (semantic plus keyword combined).</p>
<p><b>Hybrid search in practice.</b> Run both BM25 (keyword) and vector (semantic) retrieval. Combine via reciprocal rank fusion (RRF) or weighted score averaging. Almost always beats either alone, especially for queries that mix exact terms and conceptual descriptions.</p>
<p><b>The embedding model choice.</b> OpenAI text-embedding-3-small (fast and cheap). text-embedding-3-large (better but pricier). BGE family (open, very competitive). Cohere embed-multilingual-v3 (multilingual leader). Try one, measure on your data, iterate.</p>`
      }
    ]

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
  :root {
    /* Flutter UK&I brand tokens */
    --navy: #021237;
    --accent: #0091FF;
    --accent-2: #3B4B8C;

    --bg: #FFFFFF;
    --panel: #F4F6FA;
    --panel-2: #E8ECF3;
    --line: #D5DCE7;
    --text: #021237;
    --muted: #5A6680;
    --good: #0E8F5C;
    --warn: #C2641A;
    --bad: #C42B2B;
    --code-bg: #FFFFFF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; font-size: 15px; line-height: 1.55; font-weight: 400; }
  a { color: var(--accent); }
  button { font-family: inherit; }
  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
  .sidebar { background: var(--panel); border-right: 1px solid var(--line); height: 100vh; overflow-y: auto; position: sticky; top: 0; }
  .brand { padding: 18px 18px 6px 18px; }
  .brand h1 { font-size: 16px; margin: 0; letter-spacing: 0.2px; }
  .brand p { font-size: 12px; color: var(--muted); margin: 4px 0 0 0; }
  .progress-wrap { padding: 12px 18px 12px 18px; }
  .progress-text { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-bar { background: var(--panel-2); height: 8px; border-radius: 99px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent-2)); height: 100%; width: 0%; transition: width 240ms ease; }
  .controls { padding: 4px 12px 12px 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .ctrl-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; }
  .ctrl-btn:hover { background: #DCE2EC; }
  .section-title { padding: 12px 18px 6px 18px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .topic { padding: 8px 18px; cursor: pointer; font-size: 13.5px; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; }
  .topic:hover { background: #E8ECF3; }
  .topic.active { background: #E1EAFA; border-left-color: var(--accent); }
  .topic .check { width: 14px; height: 14px; border: 1px solid var(--line); border-radius: 3px; display: inline-block; flex: 0 0 14px; }
  .topic.done .check { background: var(--good); border-color: var(--good); position: relative; }
  .topic.done .check::after { content: "✓"; color: #FFFFFF; font-size: 10px; position: absolute; top: -2px; left: 2px; font-weight: 700; }
  .topic.done .label { color: var(--muted); text-decoration: line-through; }
  .content { padding: 36px 56px 80px 56px; max-width: 880px; }
  .crumbs { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  h2.topic-title { font-size: 28px; margin: 0 0 6px 0; }
  .meta { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px 22px; margin: 18px 0; }
  .card h3 { margin: 0 0 8px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .card.lesson h3 { color: var(--accent); }
  .card.model h3 { color: var(--accent-2); }
  .card.mistakes h3 { color: var(--warn); }
  .card.exercise h3 { color: var(--good); }
  .card p, .card ul { margin: 0 0 10px 0; }
  .card ul { padding-left: 20px; }
  .card li { margin-bottom: 4px; }
  pre { background: var(--code-bg); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
  code { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92em; }
  :not(pre) > code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--line); }
  .nav-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 32px; }
  .nav-btn { background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .nav-btn:hover { background: var(--panel-2); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .complete-btn { background: var(--good); color: #FFFFFF; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; }
  .complete-btn:hover { filter: brightness(1.08); }
  .complete-btn.done { background: var(--panel-2); color: var(--muted); border: 1px solid var(--line); }
  .pill { display: inline-block; background: var(--panel-2); border: 1px solid var(--line); padding: 2px 8px; border-radius: 99px; font-size: 11px; color: var(--muted); }
  .kbd { font-family: ui-monospace, monospace; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-size: 11px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .search { width: calc(100% - 36px); margin: 0 18px 6px 18px; padding: 8px 10px; background: var(--panel-2); border: 1px solid var(--line); color: var(--text); border-radius: 6px; font-size: 13px; }
  .search:focus { outline: none; border-color: var(--accent); }
  .local-note { padding: 0 18px 10px 18px; font-size: 11px; line-height: 1.45; color: var(--muted); }
  .tagline { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); text-align: center; font-style: italic; }

  /* ── Flutter UK&I topbar: navy + diagonal beam ───────────────── */
  .topbar {
    position: relative;
    background: var(--navy);
    color: #FFFFFF;
    padding: 22px 36px;
    overflow: hidden;
    border-bottom: 4px solid var(--accent);
  }
  .topbar::before, .topbar::after {
    content: "";
    position: absolute;
    top: -30%;
    bottom: -30%;
    transform: skewX(-14deg);
    pointer-events: none;
  }
  .topbar::before {
    right: 18%;
    width: 10%;
    background: linear-gradient(90deg,
      rgba(0,145,255,0)    0%,
      rgba(0,145,255,0.18) 50%,
      rgba(0,145,255,0.55) 100%);
  }
  .topbar::after {
    right: -4%;
    width: 16%;
    background: linear-gradient(90deg,
      rgba(0,145,255,0.10) 0%,
      rgba(0,145,255,0.45) 55%,
      rgba(0,145,255,0.95) 92%,
      rgba(0,145,255,0.50) 100%);
    box-shadow: inset 1px 0 0 rgba(220,240,255,0.85);
  }
  .topbar-inner { position: relative; z-index: 1; display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
  .topbar h1 { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.01em; margin: 0; color: #FFFFFF; }
  .topbar .topbar-sub { font-family: "Poppins", sans-serif; font-weight: 500; font-size: 13px; color: var(--accent); margin: 0; letter-spacing: 0.02em; }

  /* Sidebar/title type tuning for Poppins + brand */
  .brand h1 { font-weight: 600; color: var(--navy); }
  h2.topic-title { font-family: "Poppins", sans-serif; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; }
  .card h3 { font-family: "Poppins", sans-serif; font-weight: 600; }
  .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .sidebar { top: 0; }

  /* ── Gamification: topbar stats, sidebar section badges ─────── */
  .topbar-stats { margin-left: auto; display: flex; align-items: center; gap: 18px; font-family: "Poppins", sans-serif; }
  .topbar-stat { display: inline-flex; align-items: center; gap: 6px; color: #FFFFFF; font-size: 13px; font-weight: 500; }
  .topbar-stat .stat-icon { font-size: 15px; line-height: 1; }
  .topbar-stat.streak.cold { color: rgba(255,255,255,0.42); }
  .topbar-stat.streak.cold .stat-icon { filter: grayscale(1) opacity(0.6); }
  .topbar-stat.xp .stat-icon { color: var(--accent); }

  .section-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-right: 14px; }
  .section-title .sec-name { flex: 1; }
  .section-title .sec-prog { display: inline-flex; align-items: center; gap: 8px; text-transform: none; letter-spacing: 0; }
  .sec-prog-count { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; font-weight: 600; }
  .sec-badge {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--line); background: transparent;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9.5px; font-weight: 700; color: var(--muted);
    transition: all 220ms ease;
  }
  .sec-badge.earned {
    background: var(--navy); border-color: var(--accent); color: #FFFFFF;
    box-shadow: 0 0 0 2px rgba(0,145,255,0.22);
  }

  /* Celebration overlay */
  .celebration { position: fixed; inset: 0; background: rgba(2, 18, 55, 0.78); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; animation: cel-fade 240ms ease; }
  .celebration.hidden { display: none; }
  @keyframes cel-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cel-pop { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  .celebration-card {
    position: relative; background: var(--navy); color: #FFFFFF;
    border-radius: 18px; padding: 52px 44px 36px;
    max-width: 520px; width: 100%; overflow: hidden; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    animation: cel-pop 380ms cubic-bezier(.2,.9,.3,1.2);
    font-family: "Poppins", sans-serif;
    border: 1px solid rgba(0,145,255,0.25);
  }
  .celebration-card .cel-beam, .celebration-card .cel-edge { position: absolute; left: -10%; right: -10%; pointer-events: none; }
  .celebration-card .cel-beam {
    top: 38%; height: 42%; transform: rotate(-18deg);
    background: linear-gradient(180deg,
      rgba(0,145,255,0) 0%, rgba(0,145,255,0.28) 35%,
      rgba(0,145,255,0.65) 50%, rgba(0,145,255,0.28) 65%,
      rgba(0,145,255,0) 100%);
  }
  .celebration-card .cel-edge {
    top: 50%; height: 2px; transform: rotate(-18deg);
    background: linear-gradient(90deg,
      rgba(180,220,255,0) 0%, rgba(220,235,255,0.95) 18%,
      rgba(255,255,255,1) 50%, rgba(220,235,255,0.95) 82%,
      rgba(180,220,255,0) 100%);
    box-shadow: 0 0 24px rgba(120,200,255,0.65);
  }
  .celebration-content { position: relative; z-index: 1; }
  .cel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; margin-bottom: 16px; }
  .cel-badge {
    width: 92px; height: 92px; margin: 0 auto 22px;
    border-radius: 50%; background: rgba(0,145,255,0.15);
    border: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; color: #FFFFFF;
    box-shadow: 0 0 0 6px rgba(0,145,255,0.16), 0 0 40px rgba(0,145,255,0.45);
  }
  .cel-name { font-size: 26px; font-weight: 700; margin: 0 0 8px 0; color: #FFFFFF; letter-spacing: -0.01em; }
  .cel-blurb { font-size: 14px; color: rgba(255,255,255,0.78); margin: 0 auto 20px; line-height: 1.5; max-width: 380px; }
  .cel-rewards { display: inline-block; font-size: 12px; color: var(--accent); border: 1px solid rgba(0,145,255,0.45); border-radius: 99px; padding: 4px 14px; margin-bottom: 24px; font-weight: 600; letter-spacing: 0.4px; }
  .cel-btn { background: var(--accent); color: #021237; border: 0; padding: 11px 28px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: inherit; }
  .cel-btn:hover { filter: brightness(1.08); }

  .cel-exercise-wrap.hidden { display: none; }
  .cel-divider { height: 1px; background: rgba(255,255,255,0.13); margin: 4px 0 20px; }
  .cel-exercise-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; margin-bottom: 10px; text-align: left; }
  .cel-exercise { font-size: 13.5px; color: rgba(255,255,255,0.85); line-height: 1.6; margin: 0 0 22px 0; text-align: left; }

  /* Why-it-matters card: prominent accent-blue treatment, top of every topic */
  .card.why-it-matters {
    background: rgba(0,145,255,0.06);
    border: 1px solid rgba(0,145,255,0.22);
    border-left-width: 4px;
  }
  .card.why-it-matters h3 { color: var(--accent); }
  .card.why-it-matters p { font-size: 15px; line-height: 1.55; color: var(--navy); font-weight: 500; margin: 0; }

  /* Go deeper: optional technical depth, collapsed by default */
  .card.go-deeper { padding: 14px 22px; background: var(--panel); }
  .go-deeper-header {
    display: flex; align-items: center; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .go-deeper-header h3 { margin: 0; color: var(--navy); font-family: "Poppins", sans-serif; font-weight: 600; }
  .go-deeper-chevron {
    margin-left: auto; color: var(--accent);
    font-size: 22px; line-height: 1; font-weight: 400;
    transition: transform 220ms ease;
    width: 20px; text-align: center;
  }
  .go-deeper.open .go-deeper-chevron { transform: rotate(45deg); }
  .go-deeper-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  .go-deeper.open .go-deeper-body { display: block; }
  .go-deeper-body p, .go-deeper-body ul, .go-deeper-body ol { margin: 0 0 10px 0; }
  .go-deeper-body ul, .go-deeper-body ol { padding-left: 20px; }
  .go-deeper-body li { margin-bottom: 4px; }

  /* ── Home / landing page ─────────────────────────────────────── */
  .home { max-width: 760px; padding: 4px 0 40px; font-family: "Poppins", sans-serif; }
  .home-eyebrow { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .home-accent-bar { display: inline-block; width: 32px; height: 3px; background: var(--accent); border-radius: 99px; }
  .home-eyebrow-text { font-size: 11px; text-transform: uppercase; letter-spacing: 2.2px; color: var(--accent); font-weight: 600; }
  .home-title { font-family: "Poppins", sans-serif; font-size: 38px; font-weight: 700; color: var(--navy); margin: 0 0 16px; letter-spacing: -0.02em; line-height: 1.15; max-width: 660px; text-wrap: balance; }
  .home-lede { font-size: 17px; line-height: 1.55; color: var(--navy); margin: 0 0 36px; max-width: 620px; }

  .home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 0 0 40px; }
  .home-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 22px 22px 20px; }
  .home-card-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--navy); color: #FFFFFF; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
  .home-card h3 { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px; color: var(--navy); margin: 0 0 8px; letter-spacing: -0.005em; }
  .home-card p { font-size: 13.5px; line-height: 1.55; color: var(--text); margin: 0; }

  .home-cta-wrap { margin: 0 0 24px; }
  .home-cta {
    background: var(--navy); color: #FFFFFF;
    border: 0; padding: 14px 28px; border-radius: 10px;
    font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(2,18,55,0.18);
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  .home-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(2,18,55,0.25); }
  .home-cta-sub { font-size: 13px; color: var(--muted); margin-top: 10px; }

  /* Sidebar Home link */
  .nav-home {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; cursor: pointer;
    font-size: 13.5px; font-weight: 600; color: var(--navy);
    border-left: 3px solid transparent;
    margin-bottom: 4px;
  }
  .nav-home:hover { background: #E8ECF3; }
  .nav-home.active { background: #E1EAFA; border-left-color: var(--accent); }
  .nav-home .home-link-arrow { font-size: 14px; line-height: 1; color: var(--accent); }

  /* Mobile drawer scaffolding (hidden on desktop) */
  .menu-toggle { display: none; }
  .sidebar-backdrop { display: none; }

  /* ── Audio playback controls ────────────────────────────────── */
  .audio-controls {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 28px 0;
    flex-wrap: wrap;
  }
  .audio-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--navy); color: #FFFFFF;
    border: 0; padding: 9px 16px;
    border-radius: 8px;
    font-family: "Poppins", sans-serif; font-weight: 500; font-size: 13px;
    cursor: pointer; transition: background 120ms ease, transform 120ms ease;
  }
  .audio-btn:hover { background: #051a4d; transform: translateY(-1px); }
  .audio-btn.playing { background: var(--accent); }
  .audio-btn.playing:hover { background: var(--accent); filter: brightness(1.06); }
  .audio-btn .audio-icon { font-size: 11px; line-height: 1; }

  .audio-speed-btn {
    background: var(--panel); color: var(--navy);
    border: 1px solid var(--line); padding: 9px 12px;
    border-radius: 8px;
    font-family: "Poppins", sans-serif; font-weight: 600; font-size: 12px;
    cursor: pointer; min-width: 50px;
    transition: background 120ms ease;
  }
  .audio-speed-btn:hover { background: var(--panel-2); }
  .audio-speed-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .audio-status { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .audio-unavailable { font-size: 12px; color: var(--muted); padding: 6px 0; }

  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .content { padding: 22px 18px 60px 18px; max-width: 100%; }

    /* Off-canvas drawer */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      height: 100vh;
      width: 86vw;
      max-width: 360px;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 240ms ease;
      box-shadow: 0 0 40px rgba(2,18,55,0.28);
      border-right: 1px solid var(--line);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-backdrop {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(2,18,55,0.5);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

    /* Hamburger button in topbar */
    .menu-toggle {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      color: #FFFFFF;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .menu-toggle:hover { background: rgba(255,255,255,0.16); }
    .menu-toggle svg { width: 18px; height: 18px; display: block; }

    /* Topbar mobile layout */
    .topbar { padding: 12px 16px; }
    .topbar-inner { gap: 12px; align-items: center; flex-wrap: nowrap; }
    .topbar h1 { font-size: 17px; flex: 0 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-sub { display: none; }
    .topbar-stats { margin-left: auto; gap: 12px; flex-shrink: 0; }
    .topbar-stat { font-size: 12px; }
    .topbar-stat .stat-icon { font-size: 13px; }

    /* Home page */
    .home-title { font-size: 26px; line-height: 1.18; }
    .home-lede { font-size: 15.5px; }
    .home-grid { grid-template-columns: 1fr; gap: 12px; }
    .home-cta { width: 100%; padding: 14px 22px; }

    /* Content cards */
    .card { padding: 16px 18px; }
    h2.topic-title { font-size: 24px; }

    /* Nav buttons row, stack on narrow */
    .nav-row { flex-wrap: wrap; gap: 10px; }
    .nav-btn, .complete-btn { flex: 1 1 auto; min-width: 0; }
    .complete-btn { flex-basis: 100%; order: 3; }

    /* Celebration */
    .celebration-card { padding: 40px 24px 28px; border-radius: 16px; }
    .cel-name { font-size: 22px; }
    .cel-badge { width: 80px; height: 80px; font-size: 30px; }
  }

  /* Prevent body scroll when drawer open on mobile */
  body.drawer-open { overflow: hidden; }
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>

    </button>
    <h1>How AI Works</h1>
    <p class="topbar-sub">From tokens to agents</p>
    <div class="topbar-stats">
      <span class="topbar-stat streak cold" id="streakStat" title="No active streak">
        <span class="stat-icon">&#128293;</span><span id="streakVal">0</span>
      </span>
      <span class="topbar-stat xp" id="xpStat" title="Experience points">
        <span class="stat-icon">&#9733;</span><span id="xpVal">0</span>&nbsp;XP
      </span>
    </div>
  </div>
</header>
<div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>Topics</h1>
      <p>Pick one to start. Progress saves locally.</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-text"><span id="progressLabel">0 / 84</span><span id="progressPct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="resetBtn">Reset progress</button>
      <button class="ctrl-btn" id="exportBtn">Export</button>
      <button class="ctrl-btn" id="importBtn">Import</button>
    </div>
    <div class="local-note">Your progress saves locally in this browser. Use Export to back it up or move it to another device.</div>
    <input class="search" id="search" placeholder="Search topics..." />
    <nav id="nav"></nav>
  </aside>
  <main class="content" id="content"></main>
</div>

<div id="celebration" class="celebration hidden" role="dialog" aria-modal="true" aria-labelledby="celName">
  <div class="celebration-card">
    <span class="cel-beam"></span>
    <span class="cel-edge"></span>
    <div class="celebration-content">
      <div class="cel-label">Badge unlocked</div>
      <div class="cel-badge" id="celBadge">1</div>
      <h2 class="cel-name" id="celName">Section complete</h2>
      <p class="cel-blurb" id="celBlurb">Nice work.</p>
      <div class="cel-rewards" id="celRewards">+ 100 XP</div>
      <div class="cel-exercise-wrap hidden" id="celExerciseWrap">
        <div class="cel-divider"></div>
        <div class="cel-exercise-label">Try this in the real world</div>
        <p class="cel-exercise" id="celExercise"></p>
      </div>
      <button class="cel-btn" id="celBtn">Continue &rarr;</button>
    </div>
  </div>
</div>

<script src="course-data.js"></script>
<script>
/* ------------------------------------------------------------------
   COURSE DATA
   Each topic: { id, title, lesson (HTML string), model, mistakes (array), exercise }
   ------------------------------------------------------------------ */
/* COURSE constant is defined in course-data.js (loaded above) */

/* ------------------------------------------------------------------
   BADGES
   ------------------------------------------------------------------ */
const BADGE_DEFS = {
  "Foundations":             { icon: "1",  name: "Foundations",          blurb: "You can read the room. Tokens, embeddings, transformers, attention." },
  "Datasets & Training":     { icon: "2",  name: "Data Wrangler",        blurb: "You know how models actually learn from data." },
  "Fine-Tuning":             { icon: "3",  name: "Fine-Tuner",           blurb: "You can pick the right fine-tuning approach for the job. LoRA, DPO, RLHF, all of it." },
  "Inference & Optimization":{ icon: "4",  name: "Inference Specialist", blurb: "Quantization, KV cache, batching. You can make models go faster." },
  "Local AI Ecosystem":      { icon: "5",  name: "Local Hero",           blurb: "You can run real AI on your own laptop and know which tool fits where." },
  "RAG & Memory":            { icon: "6",  name: "Retrieval Specialist", blurb: "You can wire a model up to real, current, private data." },
  "Agents & Workflows":      { icon: "7",  name: "Agent Builder",        blurb: "Tool use, multi-agent, workflows. You get how AI systems compose." },
  "Model Types":             { icon: "8",  name: "Model Spotter",        blurb: "Dense, MoE, VLM, SLM. You can match the model to the problem." },
  "Deployment":              { icon: "9",  name: "Shipping Engineer",    blurb: "From dev box to cloud to edge. You know the trade-offs." },
  "Evaluation":              { icon: "10", name: "Evaluator",            blurb: "You can tell if an AI system is actually any good." },
  "Real-World Skills":       { icon: "11", name: "AI Builder",           blurb: "Chatbots, copilots, orchestration. You can build the thing." },
};

/* ------------------------------------------------------------------
   STATE
   ------------------------------------------------------------------ */
const STORAGE_KEY = "llm-course-state-v1";
let STATE = loadState();

function defaultState() {
  return {
    completed: {},
    currentId: "__home",
    search: "",
    xp: 0,
    streak: 0,
    lastCompletionDate: null,
    badges: {},
    celebrated: {},
    audioRate: 1.0,
    goDeeperExpanded: false,
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    // One-time migration: route existing users to the new home page once
    if (typeof merged.seenHomeV1 === "undefined") {
      merged.currentId = "__home";
      merged.seenHomeV1 = true;
    }
    return merged;
  } catch (e) {
    return defaultState();
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
}

/* Helpers to flatten and find topics */
const ALL_TOPICS = COURSE.flatMap(s => s.topics.map(t => ({ ...t, section: s.section })));
function topicById(id) { return ALL_TOPICS.find(t => t.id === id); }
function nextTopic(id) {
  const idx = ALL_TOPICS.findIndex(t => t.id === id);
  return idx < ALL_TOPICS.length - 1 ? ALL_TOPICS[idx + 1] : null;
}
function prevTopic(id) {
  const idx = ALL_TOPICS.findIndex(t => t.id === id);
  return idx > 0 ? ALL_TOPICS[idx - 1] : null;
}

/* Gamification helpers */
function todayISO() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function daysBetween(a, b) {
  const da = new Date(a + "T00:00:00").getTime();
  const db = new Date(b + "T00:00:00").getTime();
  return Math.round((db - da) / 86400000);
}
function sectionForTopic(topicId) {
  for (const sec of COURSE) {
    if (sec.topics.some(t => t.id === topicId)) return sec.section;
  }
  return null;
}
function sectionProgress(sectionName) {
  const sec = COURSE.find(s => s.section === sectionName);
  if (!sec) return { done: 0, total: 0 };
  const done = sec.topics.filter(t => STATE.completed[t.id]).length;
  return { done, total: sec.topics.length };
}
function currentStreakDisplay() {
  if (!STATE.lastCompletionDate) return 0;
  const gap = daysBetween(STATE.lastCompletionDate, todayISO());
  if (gap > 1) return 0;
  return STATE.streak || 0;
}
function bumpStreakOnCompletion() {
  const today = todayISO();
  const last = STATE.lastCompletionDate;
  if (!last) {
    STATE.streak = 1;
  } else {
    const gap = daysBetween(last, today);
    if (gap === 0) {
      /* same day, no change */
    } else if (gap === 1) {
      STATE.streak = (STATE.streak || 0) + 1;
    } else {
      STATE.streak = 1;
    }
  }
  STATE.lastCompletionDate = today;
}
function maybeUnlockBadge(sectionName) {
  if (STATE.badges[sectionName]) return false;
  const { done, total } = sectionProgress(sectionName);
  if (total > 0 && done === total) {
    STATE.badges[sectionName] = true;
    STATE.xp = (STATE.xp || 0) + 100;
    return true;
  }
  return false;
}

/* ------------------------------------------------------------------
   RENDER
   ------------------------------------------------------------------ */
function renderNav() {
  const nav = document.getElementById("nav");
  const q = (STATE.search || "").trim().toLowerCase();
  nav.innerHTML = "";

  // Home link (always at top, regardless of search)
  const homeEl = document.createElement("div");
  homeEl.className = "nav-home" + (STATE.currentId === "__home" ? " active" : "");
  homeEl.innerHTML = `<span class="home-link-arrow">&#8962;</span><span>Home</span>`;
  homeEl.addEventListener("click", () => {
    Audio.stop();
    STATE.currentId = "__home";
    saveState();
    renderAll();
    window.scrollTo({ top: 0, behavior: "instant" });
    maybeCloseDrawer();
  });
  nav.appendChild(homeEl);

  COURSE.forEach(section => {
    const filtered = section.topics.filter(t => !q || t.title.toLowerCase().includes(q) || (t.section || "").toLowerCase().includes(q));
    if (!filtered.length) return;
    const h = document.createElement("div");
    h.className = "section-title";
    const { done, total } = sectionProgress(section.section);
    const earned = !!STATE.badges[section.section];
    const badgeDef = BADGE_DEFS[section.section] || { icon: "?", name: section.section };
    h.innerHTML = `<span class="sec-name">${section.section}</span><span class="sec-prog"><span class="sec-prog-count">${done}/${total}</span><span class="sec-badge ${earned ? "earned" : ""}" title="${earned ? badgeDef.name + " earned" : "Complete this section to unlock"}">${badgeDef.icon}</span></span>`;
    nav.appendChild(h);
    filtered.forEach(t => {
      const el = document.createElement("div");
      el.className = "topic" + (STATE.completed[t.id] ? " done" : "") + (STATE.currentId === t.id ? " active" : "");
      el.innerHTML = `<span class="check"></span><span class="label">${t.title}</span>`;
      el.addEventListener("click", () => {
        if (Audio.currentTopicId !== t.id) Audio.stop();
        STATE.currentId = t.id;
        saveState();
        renderAll();
        window.scrollTo({ top: 0, behavior: "instant" });
        maybeCloseDrawer();
      });
      nav.appendChild(el);
    });
  });
}

function renderProgress() {
  const total = ALL_TOPICS.length;
  const done = Object.values(STATE.completed).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progressLabel").textContent = `${done} / ${total}`;
  document.getElementById("progressPct").textContent = `${pct}%`;
  document.getElementById("progressFill").style.width = pct + "%";

  // Topbar stats
  const streakDisp = currentStreakDisplay();
  const streakEl = document.getElementById("streakStat");
  document.getElementById("streakVal").textContent = streakDisp;
  streakEl.classList.toggle("cold", streakDisp === 0);
  streakEl.title = streakDisp === 0
    ? "No active streak. Complete a topic today to start one."
    : streakDisp + "-day streak";
  document.getElementById("xpVal").textContent = (STATE.xp || 0).toLocaleString();
}

function renderHome() {
  const doneCount = Object.values(STATE.completed).filter(Boolean).length;
  const total = ALL_TOPICS.length;
  let ctaLabel, ctaTarget;
  if (doneCount === 0) {
    ctaLabel = "Start with Foundations &rarr;";
    ctaTarget = ALL_TOPICS[0].id;
  } else if (doneCount >= total) {
    ctaLabel = "Review from the start &rarr;";
    ctaTarget = ALL_TOPICS[0].id;
  } else {
    ctaLabel = "Pick up where you left off &rarr;";
    const next = ALL_TOPICS.find(t => !STATE.completed[t.id]);
    ctaTarget = next ? next.id : ALL_TOPICS[0].id;
  }

  const html = `
    <div class="home">
      <div class="home-eyebrow">
        <span class="home-accent-bar"></span>
        <span class="home-eyebrow-text">Welcome</span>
      </div>
      <h1 class="home-title">Hi. This is a course about how AI actually works.</h1>
      <p class="home-lede">Written for anyone who wants to get past the hype. No code, no maths. Eleven sections, from "what's a token?" to "what does an AI agent actually do?".</p>

      <div class="home-grid">
        <div class="home-card">
          <div class="home-card-icon">1</div>
          <h3>Short, plain topics</h3>
          <p>Each one starts with <b>why it matters</b>, then a lesson, a mental model, and the mistakes most people make. About five minutes a topic.</p>
        </div>
        <div class="home-card">
          <div class="home-card-icon">2</div>
          <h3>Earn as you go</h3>
          <p>Eleven section badges. A daily streak. XP. Your progress saves on this device, no login needed.</p>
        </div>
        <div class="home-card">
          <div class="home-card-icon">3</div>
          <h3>Try it for real</h3>
          <p>Each section ends with a five-minute exercise you can do on your phone. Open ChatGPT, watch a video, look at a product you already use. No installs.</p>
        </div>
      </div>

      <div class="home-cta-wrap">
        <button class="home-cta" id="homeStartBtn">${ctaLabel}</button>
        <div class="home-cta-sub">Or pick any topic from the sidebar.</div>
      </div>

      <div class="tagline">made by James, stealing Dave's idea, which he stole from Linkedin in the first place</div>
    </div>
  `;
  document.getElementById("content").innerHTML = html;
  document.getElementById("homeStartBtn").addEventListener("click", () => {
    Audio.stop();
    STATE.currentId = ctaTarget;
    saveState();
    renderAll();
    window.scrollTo({ top: 0, behavior: "instant" });
    maybeCloseDrawer();
  });
}

function renderContent() {
  if (STATE.currentId === "__home") { renderHome(); return; }
  const t = topicById(STATE.currentId) || ALL_TOPICS[0];
  const isDone = !!STATE.completed[t.id];
  const sectionName = t.section || "";
  const idx = ALL_TOPICS.findIndex(x => x.id === t.id);

  const sec = COURSE.find(s => s.section === sectionName);
  const isLastInSection = !!(sec && sec.topics[sec.topics.length - 1].id === t.id);
  const sectionExercise = (sec && sec.exercise) || "";

  const whyCard = t.whyItMatters
    ? `<div class="card why-it-matters">
         <h3>Why it matters</h3>
         <p>${t.whyItMatters}</p>
       </div>`
    : "";

  const exerciseCard = (isLastInSection && sectionExercise)
    ? `<div class="card exercise">
         <h3>Try this in the real world</h3>
         <p>${sectionExercise}</p>
       </div>`
    : "";

  const goDeeperCard = t.goDeeper
    ? `<div class="card go-deeper ${STATE.goDeeperExpanded ? "open" : ""}" id="goDeeperCard">
         <div class="go-deeper-header" id="goDeeperHeader" role="button" aria-expanded="${STATE.goDeeperExpanded ? "true" : "false"}" tabindex="0">
           <h3>Go deeper</h3>
           <span class="go-deeper-chevron" aria-hidden="true">+</span>
         </div>
         <div class="go-deeper-body">${t.goDeeper}</div>
       </div>`
    : "";

  const audioControls = SPEECH_AVAILABLE
    ? `<div class="audio-controls">
         <button class="audio-btn" id="audioBtn" type="button" aria-label="Play audio">
           <span class="audio-icon" id="audioIcon">&#9654;</span><span id="audioLabel">Listen</span>
         </button>
         <button class="audio-speed-btn" id="audioSpeedBtn" type="button" aria-label="Playback speed">${(STATE.audioRate || 1.0)}x</button>
       </div>`
    : `<div class="audio-unavailable">Audio playback isn't available in this browser.</div>`;

  const html = `
    <div class="crumbs"><span class="pill">${sectionName}</span> &nbsp; Topic ${idx + 1} of ${ALL_TOPICS.length}</div>
    <h2 class="topic-title">${t.title}</h2>
    <div class="meta">${isDone ? "You've got this one." : "Not done yet."}</div>

    ${audioControls}

    ${whyCard}

    <div class="card lesson">
      <h3>Lesson</h3>
      ${t.lesson}
    </div>

    <div class="card model">
      <h3>Mental model</h3>
      <p>${t.model}</p>
    </div>

    <div class="card mistakes">
      <h3>Common beginner mistakes</h3>
      <ul>${t.mistakes.map(m => `<li>${m}</li>`).join("")}</ul>
    </div>

    ${goDeeperCard}

    ${exerciseCard}

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" ${prevTopic(t.id) ? "" : "disabled"}>← Previous</button>
      <button class="complete-btn ${isDone ? "done" : ""}" id="completeBtn">${isDone ? "✓ Got it (click to undo)" : "I get this"}</button>
      <button class="nav-btn" id="nextBtn" ${nextTopic(t.id) ? "" : "disabled"}>Next →</button>
    </div>
    <div class="hint">Tip: use <span class="kbd">←</span> and <span class="kbd">→</span> to navigate, <span class="kbd">c</span> to toggle complete.</div>
    <div class="tagline">made by James, stealing Dave's idea, which he stole from Linkedin in the first place</div>
  `;
  document.getElementById("content").innerHTML = html;

  document.getElementById("prevBtn").addEventListener("click", () => goPrev());
  document.getElementById("nextBtn").addEventListener("click", () => goNext());
  document.getElementById("completeBtn").addEventListener("click", () => toggleComplete());

  const goDeeperHeader = document.getElementById("goDeeperHeader");
  if (goDeeperHeader) {
    const toggleGoDeeper = () => {
      STATE.goDeeperExpanded = !STATE.goDeeperExpanded;
      saveState();
      const card = document.getElementById("goDeeperCard");
      card.classList.toggle("open", STATE.goDeeperExpanded);
      goDeeperHeader.setAttribute("aria-expanded", STATE.goDeeperExpanded ? "true" : "false");
    };
    goDeeperHeader.addEventListener("click", toggleGoDeeper);
    goDeeperHeader.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleGoDeeper(); }
    });
  }

  const audioBtn = document.getElementById("audioBtn");
  if (audioBtn) {
    audioBtn.addEventListener("click", () => {
      if (Audio.playing && !Audio.paused) {
        Audio.pause();
      } else if (Audio.paused && Audio.currentTopicId === t.id) {
        Audio.resume();
      } else {
        const queue = buildAudioQueueForTopic(t, isLastInSection, sectionExercise);
        Audio.play(queue, t.id);
      }
    });
    document.getElementById("audioSpeedBtn").addEventListener("click", () => Audio.cycleSpeed());
  }
  syncAudioUI();
}

function renderAll() {
  renderNav();
  renderProgress();
  renderContent();
}

/* ------------------------------------------------------------------
   ACTIONS
   ------------------------------------------------------------------ */
function toggleComplete() {
  const id = STATE.currentId;
  if (id === "__home") return;
  const wasComplete = !!STATE.completed[id];
  STATE.completed[id] = !wasComplete;

  let celebrate = null;

  if (!wasComplete) {
    // Marking as understood
    STATE.xp = (STATE.xp || 0) + 10;
    bumpStreakOnCompletion();
    const sec = sectionForTopic(id);
    if (sec && maybeUnlockBadge(sec)) {
      celebrate = sec;
    }
  } else {
    // Undoing
    STATE.xp = Math.max(0, (STATE.xp || 0) - 10);
    const sec = sectionForTopic(id);
    if (sec && STATE.badges[sec]) {
      const { done, total } = sectionProgress(sec);
      if (done < total) {
        delete STATE.badges[sec];
        delete STATE.celebrated[sec];
        STATE.xp = Math.max(0, STATE.xp - 100);
      }
    }
  }

  saveState();
  renderAll();
  if (celebrate) showCelebration(celebrate);
}

/* Mobile drawer */
const MOBILE_BREAKPOINT = 880;
function isMobile() { return window.innerWidth <= MOBILE_BREAKPOINT; }
function openDrawer() {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebarBackdrop").classList.add("open");
  document.body.classList.add("drawer-open");
  document.getElementById("menuToggle").setAttribute("aria-expanded", "true");
}
function closeDrawer() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarBackdrop").classList.remove("open");
  document.body.classList.remove("drawer-open");
  document.getElementById("menuToggle").setAttribute("aria-expanded", "false");
}
function maybeCloseDrawer() { if (isMobile()) closeDrawer(); }
document.getElementById("menuToggle").addEventListener("click", () => {
  if (document.getElementById("sidebar").classList.contains("open")) closeDrawer();
  else openDrawer();
});
document.getElementById("sidebarBackdrop").addEventListener("click", closeDrawer);
window.addEventListener("resize", () => {
  if (!isMobile() && document.getElementById("sidebar").classList.contains("open")) closeDrawer();
});

/* ------------------------------------------------------------------
   AUDIO PLAYBACK (Web Speech API)
   ------------------------------------------------------------------ */
const AUDIO_SPEEDS = [1.0, 1.25, 1.5, 2.0];
const SPEECH_AVAILABLE = typeof window !== "undefined" && "speechSynthesis" in window;

const Audio = {
  queue: [],
  index: 0,
  playing: false,
  paused: false,
  currentTopicId: null,
  keepAliveTimer: null,

  play(items, topicId) {
    this.stop();
    if (!SPEECH_AVAILABLE || !items.length) return;
    this.queue = items;
    this.index = 0;
    this.playing = true;
    this.paused = false;
    this.currentTopicId = topicId;
    this._startKeepAlive();
    this._next();
    syncAudioUI();
  },

  _next() {
    if (!this.playing || this.index >= this.queue.length) {
      this.stop();
      return;
    }
    const item = this.queue[this.index++];
    const u = new SpeechSynthesisUtterance(item.text);
    u.rate = STATE.audioRate || 1.0;
    u.onend = () => this._next();
    u.onerror = (e) => {
      // Some browsers fire 'interrupted' when we cancel; that's fine
      if (e && e.error && e.error !== "interrupted" && e.error !== "canceled") {
        this.stop();
      }
    };
    speechSynthesis.speak(u);
  },

  pause() {
    if (!this.playing || this.paused) return;
    speechSynthesis.pause();
    this.paused = true;
    syncAudioUI();
  },

  resume() {
    if (!this.paused) return;
    speechSynthesis.resume();
    this.paused = false;
    syncAudioUI();
  },

  stop() {
    if (SPEECH_AVAILABLE) speechSynthesis.cancel();
    this.queue = [];
    this.index = 0;
    this.playing = false;
    this.paused = false;
    this.currentTopicId = null;
    this._stopKeepAlive();
    syncAudioUI();
  },

  cycleSpeed() {
    const cur = STATE.audioRate || 1.0;
    const idx = AUDIO_SPEEDS.indexOf(cur);
    const next = AUDIO_SPEEDS[(idx + 1) % AUDIO_SPEEDS.length];
    STATE.audioRate = next;
    saveState();
    // If currently playing, restart from the current chunk at the new rate
    if (this.playing && this.queue.length) {
      const remaining = this.queue.slice(Math.max(0, this.index - 1));
      const topic = this.currentTopicId;
      this.stop();
      this.play(remaining, topic);
    } else {
      syncAudioUI();
    }
  },

  isActive() { return this.playing; },

  _startKeepAlive() {
    // Chrome's TTS goes silent after ~14s. Pulse pause/resume to keep it alive.
    this._stopKeepAlive();
    this.keepAliveTimer = setInterval(() => {
      if (this.playing && !this.paused && speechSynthesis.speaking) {
        speechSynthesis.pause();
        speechSynthesis.resume();
      }
    }, 10000);
  },
  _stopKeepAlive() {
    if (this.keepAliveTimer) {
      clearInterval(this.keepAliveTimer);
      this.keepAliveTimer = null;
    }
  },
};

function htmlToText(html) {
  const d = document.createElement("div");
  d.innerHTML = html || "";
  return (d.textContent || d.innerText || "").replace(/\s+/g, " ").trim();
}
function extractParagraphs(html) {
  const d = document.createElement("div");
  d.innerHTML = html || "";
  const ps = Array.from(d.querySelectorAll("p")).map(p => p.textContent.replace(/\s+/g, " ").trim()).filter(Boolean);
  if (ps.length === 0) {
    const t = htmlToText(html);
    if (t) ps.push(t);
  }
  return ps;
}
function buildAudioQueueForTopic(t, isLastInSection, sectionExercise) {
  const items = [];
  items.push({ text: t.title + "." });
  if (t.whyItMatters) {
    items.push({ text: "Why it matters." });
    items.push({ text: t.whyItMatters });
  }
  items.push({ text: "Lesson." });
  extractParagraphs(t.lesson).forEach(p => items.push({ text: p }));
  items.push({ text: "Mental model." });
  items.push({ text: htmlToText(t.model) });
  if (t.mistakes && t.mistakes.length) {
    items.push({ text: "Common beginner mistakes." });
    t.mistakes.forEach(m => items.push({ text: m }));
  }
  if (t.goDeeper && STATE.goDeeperExpanded) {
    items.push({ text: "Go deeper." });
    extractParagraphs(t.goDeeper).forEach(p => items.push({ text: p }));
  }
  if (isLastInSection && sectionExercise) {
    items.push({ text: "Try this in the real world." });
    items.push({ text: htmlToText(sectionExercise) });
  }
  return items;
}

function syncAudioUI() {
  const btn = document.getElementById("audioBtn");
  const speed = document.getElementById("audioSpeedBtn");
  const icon = document.getElementById("audioIcon");
  const label = document.getElementById("audioLabel");
  if (!btn || !icon || !label) return;
  if (Audio.playing && !Audio.paused) {
    btn.classList.add("playing");
    icon.innerHTML = "&#9208;"; // ⏸
    label.textContent = "Pause";
  } else if (Audio.paused) {
    btn.classList.add("playing");
    icon.innerHTML = "&#9654;"; // ▶
    label.textContent = "Resume";
  } else {
    btn.classList.remove("playing");
    icon.innerHTML = "&#9654;";
    label.textContent = "Listen";
  }
  if (speed) speed.textContent = (STATE.audioRate || 1.0) + "x";
}

// Stop audio when the tab closes or is hidden
window.addEventListener("pagehide", () => Audio.stop());

/* Celebration */
function showCelebration(sectionName) {
  const def = BADGE_DEFS[sectionName];
  if (!def) return;
  Audio.stop();
  document.getElementById("celBadge").textContent = def.icon;
  document.getElementById("celName").textContent = def.name;
  document.getElementById("celBlurb").textContent = def.blurb;
  document.getElementById("celRewards").textContent = "+ 100 XP";

  const sec = COURSE.find(s => s.section === sectionName);
  const exerciseText = (sec && sec.exercise) || "";
  const wrap = document.getElementById("celExerciseWrap");
  if (exerciseText) {
    document.getElementById("celExercise").textContent = exerciseText;
    wrap.classList.remove("hidden");
  } else {
    wrap.classList.add("hidden");
  }

  document.getElementById("celebration").classList.remove("hidden");
  STATE.celebrated[sectionName] = true;
  saveState();
}
function hideCelebration() {
  document.getElementById("celebration").classList.add("hidden");
}
document.getElementById("celBtn").addEventListener("click", hideCelebration);
document.getElementById("celebration").addEventListener("click", (e) => {
  if (e.target.id === "celebration") hideCelebration();
});
function goNext() {
  const n = nextTopic(STATE.currentId);
  if (n) { Audio.stop(); STATE.currentId = n.id; saveState(); renderAll(); window.scrollTo({ top: 0, behavior: "instant" }); }
}
function goPrev() {
  const p = prevTopic(STATE.currentId);
  if (p) { Audio.stop(); STATE.currentId = p.id; saveState(); renderAll(); window.scrollTo({ top: 0, behavior: "instant" }); }
}

/* Reset / Export / Import */
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Reset all progress? This cannot be undone.")) {
    STATE = defaultState();
    saveState();
    renderAll();
  }
});
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "llm-course-progress.json";
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("importBtn").addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        STATE = Object.assign(defaultState(), parsed);
        saveState();
        renderAll();
      } catch (err) {
        alert("Invalid file.");
      }
    };
    reader.readAsText(file);
  };
  input.click();
});

document.getElementById("search").addEventListener("input", (e) => {
  STATE.search = e.target.value;
  saveState();
  renderNav();
});

document.addEventListener("keydown", (e) => {
  // Esc always closes the drawer, even from inside the search input
  if (e.key === "Escape" && document.getElementById("sidebar").classList.contains("open")) {
    closeDrawer();
    return;
  }
  if (e.target.tagName === "INPUT") return;
  const celebrationOpen = !document.getElementById("celebration").classList.contains("hidden");
  if (celebrationOpen) {
    if (e.key === "Escape" || e.key === "Enter") hideCelebration();
    return;
  }
  if (e.key === "ArrowRight") goNext();
  else if (e.key === "ArrowLeft") goPrev();
  else if (e.key.toLowerCase() === "c") toggleComplete();
});

/* Init */
document.getElementById("search").value = STATE.search || "";
renderAll();
</script>

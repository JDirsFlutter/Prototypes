<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
  :root {
    /* Flutter UK&I brand tokens */
    --navy: #021237;
    --accent: #0091FF;
    --accent-2: #3B4B8C;

    --bg: #FFFFFF;
    --panel: #F4F6FA;
    --panel-2: #E8ECF3;
    --line: #D5DCE7;
    --text: #021237;
    --muted: #5A6680;
    --good: #0E8F5C;
    --warn: #C2641A;
    --bad: #C42B2B;
    --code-bg: #FFFFFF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; font-size: 15px; line-height: 1.55; font-weight: 400; }
  a { color: var(--accent); }
  button { font-family: inherit; }
  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
  .sidebar { background: var(--panel); border-right: 1px solid var(--line); height: 100vh; overflow-y: auto; position: sticky; top: 0; }
  .brand { padding: 18px 18px 6px 18px; }
  .brand h1 { font-size: 16px; margin: 0; letter-spacing: 0.2px; }
  .brand p { font-size: 12px; color: var(--muted); margin: 4px 0 0 0; }
  .progress-wrap { padding: 12px 18px 12px 18px; }
  .progress-text { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-bar { background: var(--panel-2); height: 8px; border-radius: 99px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent-2)); height: 100%; width: 0%; transition: width 240ms ease; }
  .controls { padding: 4px 12px 12px 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .ctrl-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; }
  .ctrl-btn:hover { background: #DCE2EC; }
  .section-title { padding: 12px 18px 6px 18px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .topic { padding: 8px 18px; cursor: pointer; font-size: 13.5px; display: flex; align-items: center; gap: 8px; border-left: 3px solid transparent; }
  .topic:hover { background: #E8ECF3; }
  .topic.active { background: #E1EAFA; border-left-color: var(--accent); }
  .topic .check { width: 14px; height: 14px; border: 1px solid var(--line); border-radius: 3px; display: inline-block; flex: 0 0 14px; }
  .topic.done .check { background: var(--good); border-color: var(--good); position: relative; }
  .topic.done .check::after { content: "✓"; color: #FFFFFF; font-size: 10px; position: absolute; top: -2px; left: 2px; font-weight: 700; }
  .topic.done .label { color: var(--muted); text-decoration: line-through; }
  .content { padding: 36px 56px 80px 56px; max-width: 880px; }
  .crumbs { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  h2.topic-title { font-size: 28px; margin: 0 0 6px 0; }
  .meta { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px 22px; margin: 18px 0; }
  .card h3 { margin: 0 0 8px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .card.lesson h3 { color: var(--accent); }
  .card.model h3 { color: var(--accent-2); }
  .card.mistakes h3 { color: var(--warn); }
  .card.exercise h3 { color: var(--good); }
  .card p, .card ul { margin: 0 0 10px 0; }
  .card ul { padding-left: 20px; }
  .card li { margin-bottom: 4px; }
  pre { background: var(--code-bg); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; overflow-x: auto; font-size: 13px; line-height: 1.5; }
  code { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.92em; }
  :not(pre) > code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--line); }
  .nav-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 32px; }
  .nav-btn { background: var(--panel); border: 1px solid var(--line); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .nav-btn:hover { background: var(--panel-2); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .complete-btn { background: var(--good); color: #FFFFFF; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; }
  .complete-btn:hover { filter: brightness(1.08); }
  .complete-btn.done { background: var(--panel-2); color: var(--muted); border: 1px solid var(--line); }
  .pill { display: inline-block; background: var(--panel-2); border: 1px solid var(--line); padding: 2px 8px; border-radius: 99px; font-size: 11px; color: var(--muted); }
  .kbd { font-family: ui-monospace, monospace; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-size: 11px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .search { width: calc(100% - 36px); margin: 0 18px 6px 18px; padding: 8px 10px; background: var(--panel-2); border: 1px solid var(--line); color: var(--text); border-radius: 6px; font-size: 13px; }
  .search:focus { outline: none; border-color: var(--accent); }
  .local-note { padding: 0 18px 10px 18px; font-size: 11px; line-height: 1.45; color: var(--muted); }
  .tagline { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--line); font-size: 12px; color: var(--muted); text-align: center; font-style: italic; }

  /* ── Flutter UK&I topbar: navy + diagonal beam ───────────────── */
  .topbar {
    position: relative;
    background: var(--navy);
    color: #FFFFFF;
    padding: 22px 36px;
    overflow: hidden;
    border-bottom: 4px solid var(--accent);
  }
  .topbar::before, .topbar::after {
    content: "";
    position: absolute;
    top: -30%;
    bottom: -30%;
    transform: skewX(-14deg);
    pointer-events: none;
  }
  .topbar::before {
    right: 18%;
    width: 10%;
    background: linear-gradient(90deg,
      rgba(0,145,255,0)    0%,
      rgba(0,145,255,0.18) 50%,
      rgba(0,145,255,0.55) 100%);
  }
  .topbar::after {
    right: -4%;
    width: 16%;
    background: linear-gradient(90deg,
      rgba(0,145,255,0.10) 0%,
      rgba(0,145,255,0.45) 55%,
      rgba(0,145,255,0.95) 92%,
      rgba(0,145,255,0.50) 100%);
    box-shadow: inset 1px 0 0 rgba(220,240,255,0.85);
  }
  .topbar-inner { position: relative; z-index: 1; display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
  .topbar h1 { font-family: "Poppins", sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.01em; margin: 0; color: #FFFFFF; }
  .topbar .topbar-sub { font-family: "Poppins", sans-serif; font-weight: 500; font-size: 13px; color: var(--accent); margin: 0; letter-spacing: 0.02em; }

  /* Sidebar/title type tuning for Poppins + brand */
  .brand h1 { font-weight: 600; color: var(--navy); }
  h2.topic-title { font-family: "Poppins", sans-serif; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; }
  .card h3 { font-family: "Poppins", sans-serif; font-weight: 600; }
  .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .sidebar { top: 0; }

  /* ── Gamification: topbar stats, sidebar section badges ─────── */
  .topbar-stats { margin-left: auto; display: flex; align-items: center; gap: 18px; font-family: "Poppins", sans-serif; }
  .topbar-stat { display: inline-flex; align-items: center; gap: 6px; color: #FFFFFF; font-size: 13px; font-weight: 500; }
  .topbar-stat .stat-icon { font-size: 15px; line-height: 1; }
  .topbar-stat.streak.cold { color: rgba(255,255,255,0.42); }
  .topbar-stat.streak.cold .stat-icon { filter: grayscale(1) opacity(0.6); }
  .topbar-stat.xp .stat-icon { color: var(--accent); }

  .section-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-right: 14px; }
  .section-title .sec-name { flex: 1; }
  .section-title .sec-prog { display: inline-flex; align-items: center; gap: 8px; text-transform: none; letter-spacing: 0; }
  .sec-prog-count { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; font-weight: 600; }
  .sec-badge {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--line); background: transparent;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9.5px; font-weight: 700; color: var(--muted);
    transition: all 220ms ease;
  }
  .sec-badge.earned {
    background: var(--navy); border-color: var(--accent); color: #FFFFFF;
    box-shadow: 0 0 0 2px rgba(0,145,255,0.22);
  }

  /* Celebration overlay */
  .celebration { position: fixed; inset: 0; background: rgba(2, 18, 55, 0.78); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 24px; animation: cel-fade 240ms ease; }
  .celebration.hidden { display: none; }
  @keyframes cel-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cel-pop { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  .celebration-card {
    position: relative; background: var(--navy); color: #FFFFFF;
    border-radius: 18px; padding: 52px 44px 36px;
    max-width: 520px; width: 100%; overflow: hidden; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    animation: cel-pop 380ms cubic-bezier(.2,.9,.3,1.2);
    font-family: "Poppins", sans-serif;
    border: 1px solid rgba(0,145,255,0.25);
  }
  .celebration-card .cel-beam, .celebration-card .cel-edge { position: absolute; left: -10%; right: -10%; pointer-events: none; }
  .celebration-card .cel-beam {
    top: 38%; height: 42%; transform: rotate(-18deg);
    background: linear-gradient(180deg,
      rgba(0,145,255,0) 0%, rgba(0,145,255,0.28) 35%,
      rgba(0,145,255,0.65) 50%, rgba(0,145,255,0.28) 65%,
      rgba(0,145,255,0) 100%);
  }
  .celebration-card .cel-edge {
    top: 50%; height: 2px; transform: rotate(-18deg);
    background: linear-gradient(90deg,
      rgba(180,220,255,0) 0%, rgba(220,235,255,0.95) 18%,
      rgba(255,255,255,1) 50%, rgba(220,235,255,0.95) 82%,
      rgba(180,220,255,0) 100%);
    box-shadow: 0 0 24px rgba(120,200,255,0.65);
  }
  .celebration-content { position: relative; z-index: 1; }
  .cel-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; margin-bottom: 16px; }
  .cel-badge {
    width: 92px; height: 92px; margin: 0 auto 22px;
    border-radius: 50%; background: rgba(0,145,255,0.15);
    border: 3px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; color: #FFFFFF;
    box-shadow: 0 0 0 6px rgba(0,145,255,0.16), 0 0 40px rgba(0,145,255,0.45);
  }
  .cel-name { font-size: 26px; font-weight: 700; margin: 0 0 8px 0; color: #FFFFFF; letter-spacing: -0.01em; }
  .cel-blurb { font-size: 14px; color: rgba(255,255,255,0.78); margin: 0 auto 20px; line-height: 1.5; max-width: 380px; }
  .cel-rewards { display: inline-block; font-size: 12px; color: var(--accent); border: 1px solid rgba(0,145,255,0.45); border-radius: 99px; padding: 4px 14px; margin-bottom: 24px; font-weight: 600; letter-spacing: 0.4px; }
  .cel-btn { background: var(--accent); color: #021237; border: 0; padding: 11px 28px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: inherit; }
  .cel-btn:hover { filter: brightness(1.08); }

  .cel-exercise-wrap.hidden { display: none; }
  .cel-divider { height: 1px; background: rgba(255,255,255,0.13); margin: 4px 0 20px; }
  .cel-exercise-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; margin-bottom: 10px; text-align: left; }
  .cel-exercise { font-size: 13.5px; color: rgba(255,255,255,0.85); line-height: 1.6; margin: 0 0 22px 0; text-align: left; }

  /* Why-it-matters card: prominent accent-blue treatment, top of every topic */
  .card.why-it-matters {
    background: rgba(0,145,255,0.06);
    border: 1px solid rgba(0,145,255,0.22);
    border-left-width: 4px;
  }
  .card.why-it-matters h3 { color: var(--accent); }
  .card.why-it-matters p { font-size: 15px; line-height: 1.55; color: var(--navy); font-weight: 500; margin: 0; }

  /* Go deeper: optional technical depth, collapsed by default */
  .card.go-deeper { padding: 14px 22px; background: var(--panel); }
  .go-deeper-header {
    display: flex; align-items: center; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .go-deeper-header h3 { margin: 0; color: var(--navy); font-family: "Poppins", sans-serif; font-weight: 600; }
  .go-deeper-chevron {
    margin-left: auto; color: var(--accent);
    font-size: 22px; line-height: 1; font-weight: 400;
    transition: transform 220ms ease;
    width: 20px; text-align: center;
  }
  .go-deeper.open .go-deeper-chevron { transform: rotate(45deg); }
  .go-deeper-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  .go-deeper.open .go-deeper-body { display: block; }
  .go-deeper-body p, .go-deeper-body ul, .go-deeper-body ol { margin: 0 0 10px 0; }
  .go-deeper-body ul, .go-deeper-body ol { padding-left: 20px; }
  .go-deeper-body li { margin-bottom: 4px; }

  /* ── Home / landing page ─────────────────────────────────────── */
  .home { max-width: 760px; padding: 4px 0 40px; font-family: "Poppins", sans-serif; }
  .home-eyebrow { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .home-accent-bar { display: inline-block; width: 32px; height: 3px; background: var(--accent); border-radius: 99px; }
  .home-eyebrow-text { font-size: 11px; text-transform: uppercase; letter-spacing: 2.2px; color: var(--accent); font-weight: 600; }
  .home-title { font-family: "Poppins", sans-serif; font-size: 38px; font-weight: 700; color: var(--navy); margin: 0 0 16px; letter-spacing: -0.02em; line-height: 1.15; max-width: 660px; text-wrap: balance; }
  .home-lede { font-size: 17px; line-height: 1.55; color: var(--navy); margin: 0 0 36px; max-width: 620px; }

  .home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 0 0 40px; }
  .home-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 22px 22px 20px; }
  .home-card-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--navy); color: #FFFFFF; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
  .home-card h3 { font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px; color: var(--navy); margin: 0 0 8px; letter-spacing: -0.005em; }
  .home-card p { font-size: 13.5px; line-height: 1.55; color: var(--text); margin: 0; }

  .home-cta-wrap { margin: 0 0 24px; }
  .home-cta {
    background: var(--navy); color: #FFFFFF;
    border: 0; padding: 14px 28px; border-radius: 10px;
    font-family: "Poppins", sans-serif; font-weight: 600; font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(2,18,55,0.18);
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  .home-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(2,18,55,0.25); }
  .home-cta-sub { font-size: 13px; color: var(--muted); margin-top: 10px; }

  /* Sidebar Home link */
  .nav-home {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; cursor: pointer;
    font-size: 13.5px; font-weight: 600; color: var(--navy);
    border-left: 3px solid transparent;
    margin-bottom: 4px;
  }
  .nav-home:hover { background: #E8ECF3; }
  .nav-home.active { background: #E1EAFA; border-left-color: var(--accent); }
  .nav-home .home-link-arrow { font-size: 14px; line-height: 1; color: var(--accent); }

  /* Mobile drawer scaffolding (hidden on desktop) */
  .menu-toggle { display: none; }
  .sidebar-backdrop { display: none; }

  /* ── Audio playback controls ────────────────────────────────── */
  .audio-controls {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 28px 0;
    flex-wrap: wrap;
  }
  .audio-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--navy); color: #FFFFFF;
    border: 0; padding: 9px 16px;
    border-radius: 8px;
    font-family: "Poppins", sans-serif; font-weight: 500; font-size: 13px;
    cursor: pointer; transition: background 120ms ease, transform 120ms ease;
  }
  .audio-btn:hover { background: #051a4d; transform: translateY(-1px); }
  .audio-btn.playing { background: var(--accent); }
  .audio-btn.playing:hover { background: var(--accent); filter: brightness(1.06); }
  .audio-btn .audio-icon { font-size: 11px; line-height: 1; }

  .audio-speed-btn {
    background: var(--panel); color: var(--navy);
    border: 1px solid var(--line); padding: 9px 12px;
    border-radius: 8px;
    font-family: "Poppins", sans-serif; font-weight: 600; font-size: 12px;
    cursor: pointer; min-width: 50px;
    transition: background 120ms ease;
  }
  .audio-speed-btn:hover { background: var(--panel-2); }
  .audio-speed-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .audio-status { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .audio-unavailable { font-size: 12px; color: var(--muted); padding: 6px 0; }

  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .content { padding: 22px 18px 60px 18px; max-width: 100%; }

    /* Off-canvas drawer */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      height: 100vh;
      width: 86vw;
      max-width: 360px;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 240ms ease;
      box-shadow: 0 0 40px rgba(2,18,55,0.28);
      border-right: 1px solid var(--line);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-backdrop {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(2,18,55,0.5);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }

    /* Hamburger button in topbar */
    .menu-toggle {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.08);
      color: #FFFFFF;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .menu-toggle:hover { background: rgba(255,255,255,0.16); }
    .menu-toggle svg { width: 18px; height: 18px; display: block; }

    /* Topbar mobile layout */
    .topbar { padding: 12px 16px; }
    .topbar-inner { gap: 12px; align-items: center; flex-wrap: nowrap; }
    .topbar h1 { font-size: 17px; flex: 0 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-sub { display: none; }
    .topbar-stats { margin-left: auto; gap: 12px; flex-shrink: 0; }
    .topbar-stat { font-size: 12px; }
    .topbar-stat .stat-icon { font-size: 13px; }

    /* Home page */
    .home-title { font-size: 26px; line-height: 1.18; }
    .home-lede { font-size: 15.5px; }
    .home-grid { grid-template-columns: 1fr; gap: 12px; }
    .home-cta { width: 100%; padding: 14px 22px; }

    /* Content cards */
    .card { padding: 16px 18px; }
    h2.topic-title { font-size: 24px; }

    /* Nav buttons row, stack on narrow */
    .nav-row { flex-wrap: wrap; gap: 10px; }
    .nav-btn, .complete-btn { flex: 1 1 auto; min-width: 0; }
    .complete-btn { flex-basis: 100%; order: 3; }

    /* Celebration */
    .celebration-card { padding: 40px 24px 28px; border-radius: 16px; }
    .cel-name { font-size: 22px; }
    .cel-badge { width: 80px; height: 80px; font-size: 30px; }
  }

  /* Prevent body scroll when drawer open on mobile */
  body.drawer-open { overflow: hidden; }

const COURSE = [
  {
    section: "Foundations",
    exercise: `Open ChatGPT or Claude on your phone. Ask the same question three times, worded slightly differently each time. Don't try to be clever, just rephrase naturally. Notice that the answers change in small ways. That variability is the 'next-word slot machine' from Topic 1, running live.`,
    topics: [
      {
        id: "llm-basics",
        title: "LLM basics",
        whyItMatters: `This is the foundational fact that explains everything else. Once you see that AI is really just very good next-word prediction, every confusing thing it does starts to make sense.`,
        lesson: `<p>An <b>LLM</b> (Large Language Model) is a piece of software that learned to predict the next word by reading a huge chunk of the internet. That is the whole trick. Everything else (chat, code, agents, search) is built on top of "guess the next word, really really well."</p>
<p>Think of an LLM like a person who read a million books and then plays a game: "I'll show you the start of a sentence, you finish it." After enough practice, the answers start sounding smart. But the model has no idea what is true. It just learned which words tend to follow which other words.</p>
<p>Real-world analogy: it is like predictive text on your phone, but trained on the entire library of humanity, with much better memory of what came before.</p>`,
        model: `<b>Mental model:</b> An LLM is a "next-word slot machine" that got very good at guessing. It does not "know" things. It pattern-matches based on what it saw during training.`,
        mistakes: [
          "Thinking the LLM 'understands' like a human. It does not. It predicts.",
          "Trusting confident answers as truth. Confidence and correctness are unrelated in LLMs."
        ],
        goDeeper: `<p>The thing that surprised researchers: just getting really good at "predict the next word" turned out to produce something that looks like understanding. Nobody set out to build a conversation partner. The conversation emerged from raw scale (more data, bigger model) plus the right architecture (transformers, attention).</p>
<p>Underneath, the model isn't "choosing" a word. For every position, it produces a probability distribution across its entire vocabulary, often 50,000 to 200,000 candidate tokens. Most have a vanishingly small probability. A few are likely. One is picked: sometimes the most likely, sometimes a random pick weighted by probability. That randomness is why you get different answers each time you ask the same question.</p>
<p>The dial that controls this is <b>temperature</b>. Low temperature (close to 0) almost always picks the most likely token, giving you predictable, safe answers. High temperature (close to 1) takes more risks, giving you creative-but-less-reliable answers. ChatGPT and Claude default to something in the middle.</p>
<p>The philosophical edge: some researchers argue this is "just" pattern matching with no understanding (the "stochastic parrots" position). Others argue that pattern matching at this scale might be functionally indistinguishable from understanding. Worth knowing the debate exists. Nothing changes about what you should expect from the tool today either way.</p>`
      },
      {
        id: "how-ai-models-work",
        title: "How AI models work",
        whyItMatters: `When people say AI is a 'black box', they mostly mean they haven't looked inside. The shape of it is actually simple, and knowing it lets you stop being intimidated.`,
        lesson: `<p>An AI model is a giant maths function. You put numbers in, you get numbers out. The "model" is a set of weights (numbers) that decide how the input is transformed into the output.</p>
<p>For an LLM, the input is text turned into numbers, and the output is a probability for every possible next word. The model picks one (usually the most likely, with some randomness), adds it to the input, and repeats. That loop is how you get a long answer.</p>
<p>Daily-life analogy: imagine a coffee machine with thousands of knobs. Training is the process of slowly turning each knob so that, when you put in "good morning," it reliably outputs "how are you?" The knobs are the weights. Once trained, the machine is frozen.</p>`,
        model: `Input → numbers → giant matrix multiplications → probabilities → next token → repeat. The "intelligence" lives in billions of frozen knob settings.`,
        mistakes: [
          "Believing models 'think' between requests. Each request starts fresh, with no memory of the last one unless the conversation history is included.",
          "Assuming bigger always means smarter. Architecture and training data matter more than raw size past a certain point."
        ],
        goDeeper: `<p><b>The maths is genuinely simple.</b> A neural network is just a sequence of matrix multiplications and a small handful of non-linear functions (like "turn negative numbers to zero"). Stack enough of these together, train them on enough data, and you get something that can predict the next token reasonably well. There's no special sauce.</p>
<p><b>What "training" actually does.</b> Start with random weights. Show the model a chunk of text from the training data. Ask it to predict the next token. Compare its guess to the actual token. Nudge every weight slightly to reduce the error. Repeat trillions of times across the entire internet. The model never explicitly sees that it was wrong; it just gets gently bullied into being slightly less wrong each step.</p>
<p><b>Why size matters but isn't everything.</b> Bigger models (more parameters) can encode more patterns, but past about 10 billion parameters, the marginal return on size drops sharply. What matters more: data quality, training recipe, and post-training techniques like instruction tuning and RLHF. GPT-3 was 175 billion params and is now worse at most tasks than today's much smaller models trained with better methods.</p>
<p><b>Frozen at inference.</b> Once trained, the weights don't change. Every conversation with ChatGPT uses the exact same "frozen" model. The illusion of the model learning across conversations comes from giving it your previous messages each time, not from anything actually changing inside the model.</p>`
      },
      {
        id: "tokens",
        title: "Tokens",
        whyItMatters: `Tokens are the unit of everything in AI: cost, speed, memory. If you've ever hit a 'message too long' error or wondered why ChatGPT costs what it does, this is the answer.`,
        lesson: `<p>An LLM does not see words. It sees <b>tokens</b>. A token is a chunk of text, sometimes a whole word ("cat"), sometimes a piece of a word ("ing"), sometimes a single character or a space.</p>
<p>Why? Because there are too many possible words across all languages, code, names, and emoji to give each one its own slot. Splitting into smaller reusable pieces means a manageable vocabulary can cover almost anything.</p>
<p>Tokens are the unit AI is priced and limited in. When ChatGPT costs money, it's per token. When you hit "message too long", you've hit a token limit. When someone says a model is "fast", they mean tokens per second. The whole industry's pricing and performance language is in tokens.</p>`,
        model: `Tokens are the model's "atoms". Words are molecules built from them. The model only ever reads and writes atoms.`,
        mistakes: [
          "Counting words instead of tokens when estimating cost or context use.",
          "Forgetting that non-English text often uses 2-3x more tokens per word, which makes AI roughly 2-3x more expensive in those languages."
        ],
        goDeeper: `<p><b>The maths.</b> Rough rule of thumb in English: 1 token is about 4 characters, or three-quarters of a word. So 1,000 English words is roughly 1,300 tokens. A normal email is 100-200 tokens. A long article: 2,000-5,000 tokens.</p>
<p><b>Why JSON, code, and non-English text use way more.</b> JSON like <code>{"name": "x"}</code> is brutal because every punctuation mark, bracket, and quote is its own token. Code is similar. Non-English languages often weren't well represented when the tokenizer was trained, so common words there get broken into many small pieces. A French paragraph can use 50% more tokens than the same paragraph in English.</p>
<p><b>Pricing example.</b> GPT-4o-mini costs roughly $0.15 per 1 million input tokens and $0.60 per 1 million output tokens (2025 prices). A typical exchange (you ask 100 words, it replies 300 words) is around 1,600 tokens, which costs a fraction of a penny. The bill adds up at scale: 10,000 daily users doing 20 exchanges each is meaningful money.</p>
<p><b>Subtle gotcha.</b> A trailing space or invisible character in your prompt can change how it tokenizes, and (rarely) change the model's output. If a prompt suddenly behaves differently for no apparent reason, check for invisible whitespace.</p>
<p><b>Useful tool.</b> Most providers have a free tokenizer playground. OpenAI's is at <code>platform.openai.com/tokenizer</code>. Paste any text in to see exactly how it gets chopped up.</p>`
      },
      {
        id: "tokenization",
        title: "Tokenization",
        whyItMatters: `Same text, different model, different price. That's because they chop language up differently. Worth knowing the moment you start comparing AI tools.`,
        lesson: `<p><b>Tokenization</b> is the process of turning your text into those tokens. The most common method is <b>Byte Pair Encoding (BPE)</b>: start with all single characters, then repeatedly merge the most common pair of tokens into a new token, until you have your target vocabulary size.</p>
<p>So "playing" might be one token if it was common in training, or two tokens ("play" + "ing") if not.</p>
<p>Different models use different tokenizers. The Llama tokenizer and the GPT tokenizer will split the same sentence differently. That matters when you switch models: same text, different token count, different cost.</p>`,
        model: `Tokenization is a learned shorthand. Common words get short codes, rare ones get spelled out from smaller pieces.`,
        mistakes: [
          "Assuming all models use the same tokenizer. They don't. Same text, different model, different token count, different cost.",
          "Forgetting that tokenization happens before the model sees anything, so weird spacing or invisible characters can change outputs in ways that look like bugs."
        ],
        goDeeper: `<p><b>How BPE actually works.</b> Byte Pair Encoding (the most common tokenizer algorithm) starts with every single character as its own token. Then it scans the training data, finds the most common pair of adjacent tokens (say 't' + 'h'), and merges them into a new token ('th'). Repeat tens of thousands of times. The result: common patterns get short codes, rare ones spell themselves out from smaller pieces.</p>
<p><b>The vocabulary trade-off.</b> Bigger vocabulary (200k+ tokens) means each input uses fewer tokens, but the model has to learn embeddings for more tokens. Smaller vocabulary (32k) is cheaper to train but uses more tokens per input. Most modern models land at 50k-200k. Llama 3 uses 128k; GPT-4 uses about 100k.</p>
<p><b>Different tokenizers, real impact.</b> The same English paragraph might be 250 tokens in GPT-4's tokenizer and 280 in Llama's. Multiplied across millions of calls, that's a real cost difference. Multilingual content amplifies this: tokenizers trained mostly on English break non-English text into way more pieces.</p>
<p><b>Practical tool.</b> Tiktoken (Python) lets you count tokens for OpenAI models. <code>tiktoken.get_encoding('cl100k_base').encode('hello world')</code> returns the actual integer IDs. Run this on a sample of your real prompts to estimate cost before sending traffic.</p>`
      },
      {
        id: "context-windows",
        title: "Context windows",
        whyItMatters: `This is why ChatGPT 'forgets' things you said earlier in a long chat. The context window is the model's desk space, and once it's full, old papers fall off the edge.`,
        lesson: `<p>A <b>context window</b> is the maximum number of tokens a model can read and write in one go. Older GPT had 4k tokens. Modern models go from 128k to over 1 million tokens.</p>
<p>It is the model's "working memory" for that single conversation. Anything outside the window is invisible. If your chat goes past the limit, older messages start getting cut off or summarised.</p>
<p>Daily-life analogy: it is your desk. You can spread out only so many papers at once. Bigger desk = you can work with more documents simultaneously. But: bigger desk also means slower (more attention to compute) and more expensive.</p>`,
        model: `Context window = how much the model can "see" at this exact moment. Outside it = doesn't exist.`,
        mistakes: [
          "Confusing context window with long-term memory. Once the conversation ends, the window is gone. Nothing carries over unless you explicitly re-include it.",
          "Assuming a 1 million token window means you should fill it. Quality degrades at the edges; the model 'forgets' things buried deep in long contexts."
        ],
        goDeeper: `<p><b>The numbers in 2025.</b> GPT-4o: 128k tokens. Claude Sonnet 4.5: 200k. Gemini 2.5 Pro: 2 million. Llama 3.1: 128k. A 200k context window can fit a full novel; a 2 million window can fit a whole codebase.</p>
<p><b>The "lost in the middle" problem.</b> Research consistently shows that information placed at the beginning or end of a long context gets recalled accurately, but information in the middle gets fuzzy. If you're putting 50 documents in context, the ones in slots 20-30 will be the worst served. Solutions: put the most important info at the start or end, or use RAG to surface only what's needed.</p>
<p><b>Cost scaling.</b> Inputs are priced per token, so a 200k token request costs roughly 100x a 2k request. Just because you can fit more doesn't mean you should. The "right" context size is usually the smallest one that contains the answer.</p>
<p><b>Output tokens count too.</b> Many people forget: the context window holds both input AND output. A 128k window with a 100k input leaves only 28k for the model's response. Try to generate more and it cuts off mid-sentence. Plan for both.</p>`
      },
      {
        id: "embeddings",
        title: "Embeddings",
        whyItMatters: `Embeddings are how AI knows that 'dog' and 'puppy' are related but 'dog' and 'spreadsheet' aren't. Every AI search, recommendation, and memory system runs on this idea.`,
        lesson: `<p>An <b>embedding</b> is a list of numbers that represents the meaning of a piece of text. Same idea = nearby numbers. Different ideas = far apart numbers.</p>
<p>Concretely, an embedding is a vector like <code>[0.12, -0.84, 0.33, ...]</code> with usually 768 to 3,072 dimensions. You can compare two embeddings using cosine similarity to see how related the original texts are.</p>
<p>Real-world analogy: imagine plotting every sentence on a giant map. "I love pizza" sits near "Pizza is amazing" and far from "Quantum mechanics is hard." Embeddings are the coordinates on that map.</p>
<p>This is the engine behind semantic search, RAG, clustering, and recommendation. You will use embeddings constantly.</p>`,
        model: `Embeddings = meaning turned into coordinates. Closeness on the map = similarity in meaning.`,
        mistakes: [
          "Confusing embeddings with the LLM itself. They are different models with different training, often produced by the same provider.",
          "Comparing embedding values directly. They are not interpretable on their own; you compare distances between them."
        ],
        goDeeper: `<p><b>What an embedding actually is.</b> A long list of numbers (a "vector") that represents the meaning of a piece of text. OpenAI's text-embedding-3-small produces 1,536-dimensional vectors. Each individual number means nothing. The shape of all 1,536 together captures meaning.</p>
<p><b>How meaning becomes geometry.</b> Texts with similar meaning end up close in vector space. "I love dogs" and "I adore puppies" will be close. "I love dogs" and "The stock market crashed" will be far apart. Closeness is measured by cosine similarity (the angle between the two vectors) or sometimes Euclidean distance.</p>
<p><b>Where embeddings come from.</b> They're produced by a smaller model trained specifically to put similar text in nearby places. The training trick: take a pair of related sentences, push their embeddings together; take a pair of unrelated sentences, pull their embeddings apart. Repeat at massive scale.</p>
<p><b>What they enable.</b> Semantic search (find docs matching meaning, not just keywords). RAG (find relevant chunks for a question). Clustering (group similar texts). Recommendations. Roughly every AI feature involving "find me things similar to this" is using embeddings underneath.</p>`
      },
      {
        id: "transformers",
        title: "Transformers",
        whyItMatters: `Every LLM you've ever used (GPT, Claude, Gemini, Llama) is a transformer. Knowing the name lets you read any AI news article and follow what's going on.`,
        lesson: `<p>The <b>Transformer</b> is the neural network architecture under almost every modern LLM (the "T" in GPT). It was introduced in the paper "Attention is All You Need" (2017) and replaced older recurrent designs.</p>
<p>Key idea: instead of reading text word by word in order (like older models), a Transformer looks at all tokens at once and figures out, for each one, which other tokens matter most. That "looking at all at once" is what makes it fast on GPUs.</p>
<p>Daily-life analogy: an old model reads a book one word at a time, top to bottom, never looking back. A Transformer spreads the whole page on a table and, for each word, draws arrows to every other word it cares about.</p>`,
        model: `Transformer = a stack of layers where each layer does "look at every other token, decide who matters, mix their information together."`,
        mistakes: [
          "Confusing 'transformer' (the AI architecture) with the same word used in electrical engineering or the Transformers movies. Same word, totally different things.",
          "Assuming 'transformer' is one specific model. It's a family of architectures. GPT, BERT, Llama, Claude, T5 are all transformers built differently."
        ],
        goDeeper: `<p><b>Why 2017 was the breakthrough year.</b> The original "Attention Is All You Need" paper (June 2017) introduced the transformer architecture. The key innovation: attention mechanisms that could process a whole sequence in parallel, instead of word-by-word like older RNN models. Suddenly you could train on much more data using much more hardware. Everything we now call "modern AI" descends from this paper.</p>
<p><b>The core insight.</b> Old models read text left-to-right, building up understanding word by word. Transformers look at the whole input at once and use attention to decide which earlier words are most relevant to each current word. Parallel processing plus context-awareness equals dramatically smarter models.</p>
<p><b>Two main flavours.</b> Encoder-decoder (T5, the original): one part processes input, another generates output. Decoder-only (GPT, Llama, Claude): one stream of attention that just predicts the next token. Most modern chat LLMs are decoder-only because it's simpler and scales better.</p>
<p><b>The receipt is everywhere.</b> When you read about "attention heads", "positional encodings", "feed-forward layers", or "residual connections", those are all parts of a transformer block. Every LLM you've used in the last 7 years is some variant of the same fundamental architecture.</p>`
      },
      {
        id: "attention",
        title: "Attention mechanism",
        whyItMatters: `Attention is the single trick that made modern AI possible. Pre-2017 chatbots were terrible. This is the thing that changed.`,
        lesson: `<p><b>Attention</b> is the trick that lets the Transformer mix information across tokens. For each token, attention computes: "how much should I listen to every other token in this sequence?"</p>
<p>Mechanically: each token produces three vectors, called Query (Q), Key (K), and Value (V). The model multiplies your Query against everyone else's Keys to get a score, softmaxes the scores so they sum to 1, then uses those scores to mix everyone's Values together. That mix becomes your new representation.</p>
<p>Daily-life analogy: you walk into a meeting and ask "who here knows about pricing?" (that is your Query). Everyone has a sign on them saying what they know (their Keys). You compare and rank. Then you actually take notes (Values) from the people whose signs matched best, weighted by how good a match they were.</p>`,
        model: `Attention = "for each token, do a soft weighted average of every other token, where the weights are learned similarity scores."`,
        mistakes: [
          "Confusing 'attention' (the LLM mechanism) with how humans pay attention. They're a metaphor away from each other, not the same thing.",
          "Believing attention is the only thing the model does. It's one component; the feed-forward layers and the training data matter as much."
        ],
        goDeeper: `<p><b>What attention actually computes.</b> For each token, the model produces three vectors: a Query, a Key, and a Value. To decide how much one token should be influenced by another, you take the Query of the first and the Key of the second, multiply them together (a dot product), and that gives a "relevance score". Do this for every pair of tokens, normalise, then use the scores to weight a sum of Value vectors. That weighted sum becomes the new representation of the token.</p>
<p><b>Multi-head attention.</b> Modern transformers don't have just one attention mechanism. They have many ("heads") running in parallel, each learning a different kind of relationship. One head might track grammatical structure; another might track which pronouns refer to which nouns. The model combines all of them.</p>
<p><b>Why it's so expensive.</b> Every token attends to every other token, so the compute scales as O(n squared) with context length. A 100k context isn't just 100x more work than 1k; it's 10,000x. This is why long context is so much pricier and slower than short context.</p>
<p><b>The classic example.</b> "The trophy did not fit in the suitcase because it was too big." What does "it" refer to? Now: "The trophy did not fit in the suitcase because it was too small." Now "it" refers to the suitcase. The only way to know is to weigh up the surrounding words. That weighing is attention.</p>`
      },
      {
        id: "parameters",
        title: "Parameters",
        whyItMatters: `When someone says 'a 70-billion-parameter model', this is what they mean. The number tells you roughly how powerful it is and how big a computer you'd need to run it.`,
        lesson: `<p><b>Parameters</b> are the numbers (the knobs) that make up the model. A "7B parameter model" has 7 billion individually tunable numbers. These are the things training adjusts.</p>
<p>More parameters generally means more capacity to learn patterns. But: more parameters also means more memory to load, more compute to run, and more data needed to train well without overfitting.</p>
<p>Rough mental scale:</p>
<ul>
<li>1B-3B: tiny models. Run on phones. Good for narrow tasks.</li>
<li>7B-13B: small models. Run on a laptop with a decent GPU.</li>
<li>30B-70B: medium. Need serious hardware or quantization.</li>
<li>100B+: large. Cloud only. GPT-4, Claude, etc. (exact numbers are usually secret).</li>
</ul>`,
        model: `Parameters = total knobs the model has. Roughly: more knobs = more skill ceiling, more cost, slower.`,
        mistakes: [
          "Comparing parameter counts across model families as if they mean the same thing. A 70B dense model and a 70B mixture-of-experts model behave very differently.",
          "Assuming you need to know the parameter count to use a model well. You mostly don't. It affects cost and where it can run."
        ],
        goDeeper: `<p><b>What a parameter is.</b> A single number inside the model that was learned during training. Modern models have anywhere from 1 billion to over a trillion parameters. Each one is typically a 16-bit or 32-bit floating point number representing a tiny piece of the model's "knowledge".</p>
<p><b>Memory cost.</b> At 16-bit precision (fp16), every parameter takes 2 bytes of memory. So a 70B model needs 140GB of GPU memory just to be loaded, before you do any inference. Quantization to 4-bit cuts this 4x, bringing 70B down to about 35-40GB and into reach of a single high-end GPU.</p>
<p><b>Common sizes in 2025.</b> Edge/phone: 1-3B (Llama 3.2, Phi-3 Mini). Laptop-runnable: 7-13B (Llama 3.1 8B, Qwen 2.5 7B). Server-grade open: 70B (Llama 3.1 70B). Frontier closed-source: estimated 200B-1T+ (GPT-5, Claude Opus, Gemini Ultra). The labs don't publish exact numbers anymore.</p>
<p><b>Mixture of Experts changes the equation.</b> A Mixture of Experts (MoE) model like Mixtral 8x7B has 47 billion total parameters, but for any given token only about 13 billion are "active". So it costs less to run than a 47B dense model but has the capacity of one. The trend in frontier models is heavily MoE.</p>`
      },
      {
        id: "training-vs-inference",
        title: "Training vs inference",
        whyItMatters: `Training builds the model (slow, expensive, done once). Inference is using it (every time you send a message). Knowing the difference clears up almost every confusing AI cost conversation.`,
        lesson: `<p>Two completely different phases. People mix these up constantly.</p>
<p><b>Training</b>: you take a model with random weights, feed it tons of text, and slowly adjust every parameter so it predicts the next token better. This is slow (weeks/months), needs huge clusters of GPUs, and costs millions of dollars for frontier models.</p>
<p><b>Inference</b>: you use a trained model to answer one prompt. The weights don't change. This is what you do every time you chat with ChatGPT.</p>
<p>Analogy: training is like teaching a chef every recipe in the world (years of school). Inference is asking the chef to cook one specific dish (a few minutes). The chef does not learn from your one order.</p>`,
        model: `Training = teaching (slow, expensive, rare). Inference = using (fast, cheap per call, constant).`,
        mistakes: [
          "Mixing up the costs. Training is expensive once. Inference is cheap each time but happens billions of times. Most of the AI bill is inference at scale.",
          "Thinking 'training' is happening when you chat. The model is frozen. Your chat history is just input data."
        ],
        goDeeper: `<p><b>Training in numbers.</b> Training GPT-4 reportedly cost upwards of $100 million in compute. Training Llama 3.1 405B took roughly 30 million GPU-hours. These numbers are why only a handful of organisations train frontier models from scratch.</p>
<p><b>Three phases of training.</b> Pretraining (the big one, on the whole internet, builds raw next-token prediction). Supervised fine-tuning (much smaller, teaches the model how to respond to instructions). RLHF or DPO (smaller still, teaches it which responses humans prefer). Each phase costs an order of magnitude less than the one before it.</p>
<p><b>Inference in numbers.</b> A single ChatGPT response costs maybe a fraction of a cent in raw compute. But across hundreds of millions of users, OpenAI spends huge sums on inference daily. Inference is where the scaling cost lives, not training.</p>
<p><b>Why this matters for products.</b> Training and fine-tuning are one-off costs you can budget for. Inference is a per-user, per-call cost that scales with success. The unit economics question for any AI product is always: what does this cost per call, and can the user pay for it?</p>`

        id: "open-closed",
        title: "Open-source vs closed-source models",
        whyItMatters: `Closed models (ChatGPT, Claude) are like renting a car. Open models (Llama, Mistral) are like owning one. The choice shapes cost, privacy, and what you can build.`,
        lesson: `<p><b>Closed-source</b>: you access the model only through an API. The provider hosts it. You don't see the weights. Examples: GPT-4, Claude, Gemini.</p>
<p><b>Open-source / open-weight</b>: the model weights are published. You can download them and run them on your own hardware. Examples: Llama, Mistral, Qwen, Gemma, DeepSeek.</p>
<p>Trade-offs:</p>
<ul>
<li>Closed: usually higher quality (today), zero infra work, but you pay per token, your data leaves your network, and you cannot fine-tune deeply.</li>
<li>Open: full control, you can fine-tune, run offline, predictable cost. But you manage GPUs, scaling, evals, security. And the very best frontier models are still closed.</li>
</ul>
<p>Most serious AI products today use both: closed APIs for hard tasks, open models for cheap/local/private tasks.</p>`,

        ],
        goDeeper: `<p><b>What "open" actually means.</b> "Open weights" means anyone can download the trained model file and run it. It does NOT mean the training data or the training process is open. Llama, Mistral, Qwen, DeepSeek are all "open weights". True open source (weights + training data + code) is rare; the most notable example is OLMo from Allen AI.</p>
<p><b>Closed-source advantages.</b> Frontier quality (GPT-5, Claude Sonnet 4.5, Gemini 2.5 are still ahead of any open model on the hardest tasks). No infrastructure burden. Hosted safety filters. Stable APIs. Pay-as-you-go pricing.</p>
<p><b>Open-source advantages.</b> Run on-prem (data never leaves your network). No per-call fees (just compute cost). Full customisation via fine-tuning. No vendor lock-in. No surprise API deprecations.</p>
<p><b>2025 reality check.</b> The quality gap between open and closed has shrunk dramatically. Llama 3.1 405B is competitive with GPT-4 for many tasks. Most enterprises now run a portfolio: closed APIs for the hardest tasks, open models for high-volume or privacy-sensitive work. The "either-or" framing is outdated.</p>`

  {
    section: "Datasets & Training",
    exercise: `Ask ChatGPT to write a short story in the voice of someone famous (Hemingway, a sports commentator, whoever). Read it back. Notice what feels distinctively them. That tone wasn't programmed in, it was learned from examples in the training data. You're reading the dataset through the model.`,
    topics: [
      {
        id: "sft-datasets",
        title: "SFT datasets",
        whyItMatters: `When ChatGPT 'sounds helpful', it learned that tone from examples someone wrote. SFT is just 'show the model how to talk' at massive scale.`,
        lesson: `<p><b>SFT</b> stands for <b>Supervised Fine-Tuning</b>. An SFT dataset is a list of (input, ideal output) pairs that you use to teach a base model how to behave.</p>
<p>Example format:</p>
<pre><code>{"prompt": "Translate to French: I love pizza", "response": "J'adore la pizza"}
{"prompt": "Summarise: ...", "response": "..."}</code></pre>
<p>This is how you turn a "raw" base model (good at predicting next token, useless at chat) into an "instruct" model that answers questions politely. It is the simplest and most common form of fine-tuning.</p>
<p>Quality matters more than quantity. 1,000 hand-crafted examples often beat 100,000 noisy ones.</p>`,
        model: `SFT dataset = a stack of "here is a question, here is the perfect answer" cards. You hand the cards to the model many times until it learns the style.`,

        ],
        goDeeper: `<p><b>SFT = Supervised Fine-Tuning.</b> The process where you take a base model that's just been trained to predict next tokens, and show it thousands of input-output pairs in the format "here's a prompt, here's the ideal response". The model learns to produce that format.</p>
<p><b>Where SFT datasets come from.</b> Hand-written by humans (high quality, expensive). Generated by other LLMs and curated (faster, lower cost, watch for noise). Scraped from real conversations (most realistic, hardest to keep clean). Most modern SFT mixes all three.</p>
<p><b>Famous open SFT datasets.</b> Alpaca (52k instructions, the OG of the genre). Dolly 15k (high quality, hand-written). Open-Hermes (1M+ entries, mixed). UltraChat (1.5M dialogues). These are useful starting points; most production fine-tunes use private, curated mixes.</p>
<p><b>Format matters more than people expect.</b> Each model expects a specific chat template (special tokens marking user/assistant turns). Mismatched templates between training and inference is one of the most common silent failure modes in fine-tuning.</p>`
      },
      {
        id: "instruction-tuning",
        title: "Instruction tuning",
        whyItMatters: `The reason ChatGPT does what you ask, instead of just continuing your text, is instruction tuning. It's what turned 'fancy autocomplete' into 'helpful assistant'.`,
        lesson: `<p><b>Instruction tuning</b> is SFT but specifically with instructions and their answers. It is the recipe that turned GPT-3 (a base model) into ChatGPT (an instructable assistant).</p>
<p>The dataset format usually looks like:</p>
<pre><code>{"instruction": "Write a haiku about rain",
 "input": "",
 "output": "Soft drops on the roof..."}</code></pre>
<p>Some datasets include an "input" slot for context, some don't. The famous public ones are Alpaca, Dolly, OpenAssistant, FLAN.</p>`,
        model: `Instruction tuning = teaching the base model the game of "I ask, you answer cleanly." Same technique as SFT, just with one specific data shape.`,
        mistakes: [

        ],
        goDeeper: `<p><b>Why this was a breakthrough.</b> The 2020-era GPT-3 was technically capable but hard to use because it would just continue your text. You had to write clever prompts to make it answer questions. Instruction tuning (popularised by OpenAI's InstructGPT in 2022) reframed the model: train it to answer when asked, not just continue.</p>
<p><b>The training recipe.</b> Take a base model. Show it thousands of (instruction, ideal response) pairs. The instructions cover everything: "summarise this", "rewrite this politely", "explain like I'm five", "translate this". Train. Now the model has learned the general pattern of "do what is asked".</p>
<p><b>Why ChatGPT felt magic when it launched.</b> Underneath: GPT-3.5 + instruction tuning + RLHF. The base model didn't change much. The new layer of training was what made it feel useful instead of just impressive.</p>
<p><b>Trade-off.</b> Instruction-tuned models are easier to use but slightly worse at raw text continuation. If you want to generate a long piece of creative writing, the base (non-instruction-tuned) version often produces more natural flow. Most labs ship both versions for this reason.</p>`

      {
        id: "preference-datasets",
        title: "Preference datasets",
        whyItMatters: `When a model picks the polite reply over the rude one, this is why. Humans rated thousands of answer-pairs and the model learned the pattern of 'better' vs 'worse'.`,
        lesson: `<p>A <b>preference dataset</b> has the format: prompt + chosen response + rejected response. Instead of teaching "this is the right answer," you teach "between these two answers, this one is better."</p>
<pre><code>{"prompt": "How do I cook rice?",
 "chosen": "Rinse the rice, then...",
 "rejected": "Just microwave it for an hour."}</code></pre>
<p>This is the fuel for RLHF and DPO (we cover both later). It captures nuance that SFT misses, like tone, helpfulness, or safety preferences.</p>
<p>Coming up with the rejected response is the hard part. Often it's a worse model's answer, or an earlier version of the same model.</p>`,
        model: `SFT teaches "do this." Preferences teach "this beats that." Comparison is easier to label than absolute correctness.`,

        ],
        goDeeper: `<p><b>The data shape.</b> A preference dataset has rows like: (prompt, chosen response, rejected response). The "chosen" is what humans prefer; the "rejected" is the worse alternative. This is the fuel for both RLHF and the newer DPO method.</p>
<p><b>How they're collected.</b> Show humans a prompt and two model-generated responses. They pick the better one. Do this thousands of times. The dataset has two superpowers: it captures human taste, and humans find it much easier to compare two answers than to write a perfect one from scratch.</p>
<p><b>What makes a good preference dataset.</b> Diverse prompts (not just easy questions). Clear annotation guidelines (so labellers are consistent). Multiple annotators per pair (catches subjective disagreements). At least 10k pairs, ideally more (smaller and the signal is noisy).</p>
<p><b>Famous open ones.</b> Anthropic's HH-RLHF (170k pairs, helpfulness and harmlessness). OpenAssistant. UltraFeedback. Most production preference work is private because the data is so company-specific.</p>`

        title: "Synthetic datasets",

        lesson: `<p><b>Synthetic data</b> means data generated by another model. You use a strong model (GPT-4, Claude) to produce training examples for a smaller model. This is how most modern open models are post-trained cheaply.</p>
<p>Common pattern: "self-instruct" or "distillation." You prompt the big model with seed instructions, ask it to generate variations and answers, filter for quality, and feed the result into SFT for the small model.</p>
<p>It is powerful but it has limits. The student model can only get as good as what the teacher would have said. And legal terms of some APIs forbid this for commercial models.</p>`,

        goDeeper: `<p><b>Why it took off.</b> Hand-written training data is slow and expensive. A strong LLM (Claude, GPT-5) can generate thousands of examples in minutes for cents. The maths gets very attractive at scale.</p>
<p><b>The recipe.</b> Start with "seed" prompts (a few hundred good examples). Ask a strong model to generate variations and expansions. Curate by filtering bad outputs, deduplicating, and sometimes having a second model rate quality.</p>
<p><b>Famous results.</b> Microsoft's Phi series was trained almost entirely on synthetic "textbook-quality" data and competes with much larger models. Anthropic's Constitutional AI uses synthetic preference data. Nvidia's Nemotron uses heavily synthetic SFT data.</p>
<p><b>The "model collapse" worry.</b> Some researchers warn that training future models on data generated by current models could lead to a feedback loop where quality declines over generations. So far this hasn't materialised in practice, partly because filtering and human review break the loop. But it's a real long-term risk worth tracking.</p>`

      {
        id: "data-curation",
        title: "Data curation",
        whyItMatters: `Garbage in, garbage out, but at terabyte scale. The reason some models are sharper than others usually isn't size, it's what they were fed.`,
        lesson: `<p><b>Curation</b> is the art of picking which data goes into training, and how much. It is the single biggest lever on model quality after the architecture is fixed.</p>
<p>Common curation steps:</p>
<ul>
<li><b>Filter</b> out toxic, low-quality, or duplicate text.</li>
<li><b>Balance</b> the mix (code, math, English prose, multilingual, dialogue) according to what you want the model good at.</li>
<li><b>Up-weight</b> high-value sources (textbooks, well-edited prose).</li>
<li><b>Deduplicate</b>. Repeats inflate sample count without teaching new things.</li>
</ul>
<p>For fine-tuning specifically: a few hundred high-quality, diverse, well-formatted examples often beats tens of thousands of mediocre ones.</p>`,
        model: `Curation = being a strict librarian for your model. Every example you keep shapes behaviour. Every duplicate is wasted attention.`,

        goDeeper: `<p><b>What data curation actually means.</b> Picking, filtering, cleaning, balancing, and structuring your training corpus. For pretraining, this might involve filtering 10 trillion web tokens down to 2 trillion "high quality" ones. For fine-tuning, it's reading through a hand-curated 10k examples and removing the duplicates and the obviously bad ones.</p>
<p><b>The tools of the trade.</b> Language identification (drop everything not in your target languages). Deduplication (exact match, near-duplicate detection via MinHash). Quality filtering (often using a classifier trained on "good" vs "bad" examples). Toxicity filtering. PII removal.</p>
<p><b>Famous examples.</b> FineWeb is Hugging Face's open curated pretraining corpus (15T tokens, heavily filtered from CommonCrawl). RedPajama is another. Both showed that careful curation of public data can match the quality of proprietary corpora.</p>
<p><b>What dominates real teams' time.</b> Most production AI teams spend more on data work (acquisition, curation, labelling, evaluation) than on the model architecture itself. The clichéd "80% of ML is data" is roughly right.</p>`

      {
        id: "dataset-cleaning",
        title: "Dataset cleaning",
        whyItMatters: `Most of an AI team's actual work is this, not the cool maths. Knowing it helps you stop assuming the magic happens elsewhere.`,
        lesson: `<p>Cleaning is the unsexy plumbing that decides whether your fine-tune works. Typical operations:</p>
<ul>
<li><b>Remove duplicates</b> exact and near (use MinHash or simple hashing).</li>
<li><b>Strip junk</b>: HTML tags, control characters, broken encodings.</li>
<li><b>Filter by length</b>: kill 5-word "responses" and 50,000-token monsters.</li>
<li><b>Language filter</b>: drop examples in languages you don't want.</li>
<li><b>PII redaction</b>: scrub emails, phone numbers, names if sensitive.</li>
<li><b>Quality scoring</b>: optionally rank with a small classifier or LLM-as-judge.</li>
</ul>
<p>Before/after metrics matter. Always log how many rows you cut and why.</p>`,

        ],
        goDeeper: `<p><b>The common cleaning steps.</b> Deduplication (drop exact and near-duplicates). Length filtering (drop too-short and too-long examples). Format normalisation (consistent whitespace, encoding, newlines). Language detection (keep only target languages). PII redaction (strip emails, names, phone numbers). Profanity and toxicity filtering. URL removal or replacement.</p>
<p><b>Order matters.</b> Deduplicate before quality filtering (otherwise you waste compute filtering things you'd drop anyway). Normalise format before any text-matching cleaning. Language-detect before any English-specific heuristics fire.</p>
<p><b>The hidden value.</b> A common finding: removing the worst 10% of training data improves model quality more than adding 20% more average-quality data. Cleaning is one of the highest-ROI activities in ML.</p>
<p><b>Tooling.</b> Hugging Face Datasets library (filter, dedupe, map). Pandas for quick exploration. Custom regex or LLM-based classifiers for trickier filtering. For pretraining-scale, distributed tools like Spark or Apache Beam.</p>`

      {
        id: "dataset-formatting",
        title: "Dataset formatting",
        whyItMatters: `The exact way data is structured (templates, special tokens, JSON schemas) decides whether training works at all. It's plumbing, but invisible plumbing is what makes AI feel polished.`,
        lesson: `<p>Formatting is matching your data to the exact <b>chat template</b> the model expects during training. Get this wrong and the model learns garbage.</p>
<p>Modern chat models expect tokens like:</p>
<pre><code>&lt;|im_start|&gt;system
You are a helpful assistant.&lt;|im_end|&gt;
&lt;|im_start|&gt;user
What is 2+2?&lt;|im_end|&gt;
&lt;|im_start|&gt;assistant
4&lt;|im_end|&gt;</code></pre>
<p>Each model family (Llama, Qwen, Mistral, Gemma) has its own template. Hugging Face's <code>apply_chat_template</code> is the safe way to do this.</p>
<p>Also: pick one of JSONL, Parquet, or HF Datasets format and stick with it. Don't mix.</p>`,
        model: `Formatting = wearing the dress code. The model only "hears" you if your data wears the uniform it was trained on.`,

          "Mixing chat templates between training and inference. The same data formatted two different ways at train vs inference can silently break a fine-tune.",
          "Forgetting special tokens. Each model has its own conventions for marking user/assistant turns; ignoring them produces broken output."
        ],
        goDeeper: `<p><b>Chat templates.</b> Every model has a specific text format for marking conversation turns. Llama 3 uses tokens like <code>&lt;|begin_of_text|&gt;</code> and <code>&lt;|start_header_id|&gt;</code>. Mistral uses <code>[INST]</code> and <code>[/INST]</code>. Mismatching this between training and inference is the most common silent failure mode in fine-tuning.</p>
<p><b>The <code>tokenizer.apply_chat_template()</code> pattern.</b> Hugging Face standardised this with a method on the tokenizer that formats your messages list into the model's exact expected string. Use it religiously: read the model card, use the template it specifies, never roll your own.</p>
<p><b>JSONL is the de facto fine-tuning format.</b> One JSON object per line. Each line is one training example. Common shapes: a "messages" key holding a chat array, or "prompt" and "completion" keys for plain completion training. Different fine-tuning libraries expect different shapes; check your library's docs.</p>
<p><b>Special tokens beyond chat.</b> System messages. Tool calls. End-of-turn markers. Stop sequences. Each model handles these differently. When you read "this fine-tune mysteriously generates &lt;tool_call&gt; tags", the answer is almost always a format mismatch.</p>`

      {
        id: "fine-tuning-basics",
        title: "Fine-tuning basics",
        whyItMatters: `Fine-tuning is how you turn a generic AI into a specialist (your company's tone, a coding assistant, a medical helper). Most 'AI features' in real products are fine-tuned, not built from scratch.`,
        lesson: `<p><b>Fine-tuning</b> means continuing to train an existing model on your specific data, so its behaviour shifts in your direction. You start with someone else's smart base, and nudge it.</p>
<p>Three flavours:</p>
<ul>
<li><b>Full fine-tune</b>: update every parameter. Expensive, needs lots of VRAM, gives the most change.</li>
<li><b>LoRA / QLoRA</b>: train a tiny add-on while freezing the base. Cheap and effective for most use cases.</li>
<li><b>Continued pretraining</b>: train on raw text (not Q&A pairs) to add new domain knowledge.</li>
</ul>
<p>When to fine-tune vs just use a better prompt or RAG: fine-tune when you want consistent style/format/behaviour, not when you want new facts (RAG is better for that).</p>`,
        model: `Fine-tuning = adjusting an already-trained chef's seasoning preferences, not teaching them to cook from scratch.`,
        mistakes: [
          "Reaching for fine-tuning when prompting would solve it. Try good prompting plus few-shot examples first. Fine-tune only if prompting plateaus.",

        ],
        goDeeper: `<p><b>The decision tree.</b> Need the model to do a specific task in a specific format? Try prompting first. Still too inconsistent? Add few-shot examples (5-10 in the prompt). Still bad? Then fine-tune. Most teams skip the prompt-engineering phase and jump straight to fine-tuning. Big mistake.</p>
<p><b>Methods, from easiest to hardest.</b> Prompt engineering (no training). Few-shot prompting (no training). LoRA fine-tuning (cheap training). QLoRA (cheapest). Full fine-tuning (expensive). Continued pretraining (most expensive, rarely needed). Pick the simplest method that works.</p>
<p><b>What fine-tuning is good at.</b> Tone of voice. Output format (always reply in JSON, etc.). Domain-specific phrasing. Task-specific behaviours. NOT good at: teaching the model new factual knowledge (that's RAG's job).</p>
<p><b>The "catastrophic forgetting" trap.</b> Fine-tune too aggressively and the model "forgets" its general abilities. Sign of this: the model nails your fine-tuned task but is suddenly worse at unrelated tasks. Fix: use a small learning rate, train for fewer epochs, or mix in some general training data.</p>`
      },
      {
        id: "continued-pretraining",
        title: "Continued pretraining",
        whyItMatters: `Sometimes a model just doesn't know your industry's language. Continued pretraining teaches it new vocabulary before you ever fine-tune. Niche, but the right tool for some jobs.`,
        lesson: `<p><b>Continued pretraining</b> (also called <b>domain-adaptive pretraining</b>) is when you keep training a base model on a big pile of <i>raw text</i> from your domain, not Q&A pairs. The goal is to inject vocabulary, facts, or style.</p>
<p>Example: take Llama 3 base, train it on 10B tokens of medical literature, end up with a model that understands medical jargon natively. Then do SFT on top to make it a usable assistant.</p>
<p>This is heavy. You need a lot of clean text and a lot of GPU. Most teams skip straight to SFT or LoRA. Continued pretraining only pays off when your domain is genuinely far from the base distribution (rare languages, hard sciences, niche code).</p>`,
        model: `Continued pretraining = sending the model to a graduate programme in your field before you ask it to do the job.`,
        mistakes: [
          "Confusing continued pretraining with fine-tuning. Continued pretraining is more expensive and teaches the model new general knowledge, not just new behaviour.",
          "Reaching for it before considering simpler options. Most use cases don't need it; SFT or RAG will do."
        ],
        goDeeper: `<p><b>The hierarchy.</b> Pretraining (build the base model, expensive). Continued pretraining (teach more general knowledge on top, still expensive). Fine-tuning (teach behaviour, cheap). RAG (give knowledge at inference time, very cheap). Continued pretraining sits between regular pretraining and fine-tuning.</p>
<p><b>When you actually need it.</b> Niche domain with vocabulary the base model doesn't know (medical, legal, scientific). Non-English languages underrepresented in the base. Highly technical content where domain-specific structure matters. For most enterprise use cases, RAG covers the gap without this step.</p>
<p><b>The recipe.</b> Take a base model. Train it on a large corpus of your domain text (typically tens of millions of tokens minimum, often billions). Use a much lower learning rate than original pretraining. Then optionally fine-tune on top for specific tasks.</p>
<p><b>Cost reality.</b> Even "cheap" continued pretraining of a 7B model on 1B tokens costs in the low thousands of dollars of GPU time. Most teams skip it and rely on RAG to inject domain knowledge at inference instead.</p>`
      },
      {
        id: "hallucination-reduction",
        title: "Hallucination reduction",
        whyItMatters: `Hallucinations (AI confidently making things up) are the single biggest reason people don't trust AI yet. Knowing what causes them is the first step to picking tools that hallucinate less.`,
        lesson: `<p>A <b>hallucination</b> is when the model produces something confidently wrong. It is not the model "lying"; it is the model doing its job (predict plausible text) without any grounding in truth.</p>
<p>Main ways to reduce hallucinations:</p>
<ul>
<li><b>RAG</b>: give the model the actual facts in the prompt. By far the biggest lever.</li>
<li><b>Constrain</b>: use structured outputs (JSON schema, regex) to limit what the model can say.</li>
<li><b>Cite</b>: ask the model to include source quotes. Easier to spot fabrications.</li>
<li><b>Prompt</b>: tell it explicitly "if you don't know, say so." It actually helps.</li>
<li><b>Smaller temperature</b>: less randomness = less creative fabrication on factual tasks.</li>
<li><b>Tools</b>: let it call a calculator, search, or database instead of guessing.</li>
</ul>`,
        model: `Hallucinations are not a bug; they are the default. Grounding the model in real data is how you fight them.`,
        mistakes: [
          "Believing hallucinations can be eliminated. They can only be reduced. The underlying mechanism (statistical pattern completion) is inherently fallible.",
          "Treating 'I don't know' as a failure. It's actually a model behaving well. Penalise confident wrong answers, reward calibrated uncertainty."
        ],
        goDeeper: `<p><b>Why hallucinations happen.</b> LLMs are next-token prediction systems. When they don't know an answer, they don't have a "don't know" button. They just produce the most likely next token given the context. The result is plausible-sounding fabrication, especially in detailed factual answers.</p>
<p><b>The tools to reduce them.</b> RAG (give the model real source material). System prompts that explicitly say "if you don't know, say so". Citations (force the model to cite sources, then validate the citations exist). Lower temperature (less random sampling, closer to the most-confident token). Specific fine-tuning on "I don't know" examples.</p>
<p><b>Detection at scale.</b> Run the same query twice with non-zero temperature: if you get inconsistent answers, the model probably doesn't "know" the answer. Or use a second model as a critic: "Is this answer supported by this source?". Or look for specific output patterns (names, dates, citations) and validate them programmatically.</p>
<p><b>Frontier models in 2025.</b> Top models hallucinate maybe 1-3% of the time on factual tasks with good prompting. Smaller models, 10-20% or more. The gap is closing as labs invest in this, but it'll likely never hit zero.</p>`
      }
    ]

  {

    exercise: `Compare three AI products you can access for free: a general chatbot (ChatGPT or Claude), a coding helper (try Cursor or a free Copilot trial), and a customer-service bot on any retailer's website. Ask each one a question slightly outside its lane. Notice how different they feel. Same underlying technology, different fine-tunes.`,

/* ------------------------------------------------------------------
   COURSE DATA
   Each topic: { id, title, lesson (HTML string), model, mistakes (array), exercise }
   ------------------------------------------------------------------ */
const COURSE = [
  {
    section: "Foundations",
    topics: [
      {
        id: "llm-basics",
        title: "LLM basics",
        lesson: `<p>An <b>LLM</b> (Large Language Model) is a piece of software that learned to predict the next word by reading a huge chunk of the internet. That is the whole trick. Everything else (chat, code, agents, search) is built on top of "guess the next word, really really well."</p>
<p>Think of an LLM like a person who read a million books and then plays a game: "I'll show you the start of a sentence, you finish it." After enough practice, the answers start sounding smart. But the model has no idea what is true. It just learned which words tend to follow which other words.</p>
<p>Real-world analogy: it is like predictive text on your phone, but trained on the entire library of humanity, with much better memory of what came before.</p>`,
        model: `<b>Mental model:</b> An LLM is a "next-word slot machine" that got very good at guessing. It does not "know" things. It pattern-matches based on what it saw during training.`,
        mistakes: [
          "Thinking the LLM 'understands' like a human. It does not. It predicts.",
          "Assuming it has access to real-time information. By default, it does not.",
          "Trusting confident answers as truth. Confidence and correctness are unrelated in LLMs."
        ],
        exercise: `Open ChatGPT, Claude, or any LLM. Ask the same question 3 times with slightly different phrasing. Notice how the answers differ. Write down what changed and what stayed the same. That variability is the slot machine talking.`
      },
      {
        id: "how-ai-models-work",
        title: "How AI models work",
        lesson: `<p>An AI model is a giant maths function. You put numbers in, you get numbers out. The "model" is a set of weights (numbers) that decide how the input is transformed into the output.</p>
<p>For an LLM, the input is text turned into numbers, and the output is a probability for every possible next word. The model picks one (usually the most likely, with some randomness), adds it to the input, and repeats. That loop is how you get a long answer.</p>
<p>Daily-life analogy: imagine a coffee machine with thousands of knobs. Training is the process of slowly turning each knob so that, when you put in "good morning," it reliably outputs "how are you?" The knobs are the weights. Once trained, the machine is frozen.</p>`,
        model: `Input → numbers → giant matrix multiplications → probabilities → next token → repeat. The "intelligence" lives in billions of frozen knob settings.`,
        mistakes: [
          "Believing models 'think' between requests. They don't. Each request is fresh maths.",
          "Confusing the model file with the running process. The file is static; the inference engine is what does the work.",
          "Assuming bigger always means smarter. Architecture and data matter more than raw size past a point."
        ],
        exercise: `Draw a 3-box diagram: [Your text] → [Model = frozen weights] → [Predicted next word]. Now extend it to show how the model loops to produce a full sentence. Keep this diagram nearby for the rest of the course.`
      },
      {
        id: "tokens",
        title: "Tokens",
        lesson: `<p>An LLM does not see words. It sees <b>tokens</b>. A token is a chunk of text, sometimes a whole word ("cat"), sometimes a piece of a word ("ing"), sometimes a single character or a space.</p>
<p>Why? Because there are too many possible words (especially across languages, code, names, emoji). Splitting into smaller reusable pieces means a vocabulary of around 50k-200k tokens can cover almost anything.</p>
<p>Rough rule of thumb in English: <b>1 token ≈ 4 characters ≈ ¾ of a word</b>. So 1,000 words is roughly 1,300 tokens. Code, JSON and non-English text use more tokens per word.</p>
<p>Why you care: you pay per token. Context limits are measured in tokens. Speed is measured in tokens per second.</p>`,
        model: `Tokens are the model's "atoms." Words are molecules built from them. The model only ever reads and writes atoms.`,
        mistakes: [
          "Counting words instead of tokens when estimating cost or context use.",
          "Forgetting that non-English text often uses 2-3x more tokens per word.",
          "Thinking spaces and punctuation are free. They are usually tokens too."
        ],
        exercise: `Go to <code>platform.openai.com/tokenizer</code> (or any tokenizer playground). Paste a paragraph of English, then the same in French, then some JSON. Compare token counts. Notice how JSON is brutal.`
      },
      {
        id: "tokenization",
        title: "Tokenization",
        lesson: `<p><b>Tokenization</b> is the process of turning your text into those tokens. The most common method is <b>Byte Pair Encoding (BPE)</b>: start with all single characters, then repeatedly merge the most common pair of tokens into a new token, until you have your target vocabulary size.</p>
<p>So "playing" might be one token if it was common in training, or two tokens ("play" + "ing") if not.</p>
<p>Different models use different tokenizers. The Llama tokenizer and the GPT tokenizer will split the same sentence differently. That matters when you switch models: same text, different token count, different cost.</p>`,
        model: `Tokenization is a learned shorthand. Common words get short codes, rare ones get spelled out from smaller pieces.`,
        mistakes: [
          "Assuming all models use the same tokenizer. They don't.",
          "Forgetting that tokenization happens before the model sees anything, so weird spacing or invisible characters can break things subtly.",
          "Ignoring 'token boundary' bugs in prompts (e.g. trailing spaces changing model behaviour)."
        ],
        exercise: `In Python, install <code>tiktoken</code> and run:<br><pre><code>import tiktoken
enc = tiktoken.get_encoding("cl100k_base")
print(enc.encode("Hello, how are you doing today?"))</code></pre>Look at the integer IDs. Each one is a token.`
      },
      {
        id: "context-windows",
        title: "Context windows",
        lesson: `<p>A <b>context window</b> is the maximum number of tokens a model can read and write in one go. Older GPT had 4k tokens. Modern models go from 128k to over 1 million tokens.</p>
<p>It is the model's "working memory" for that single conversation. Anything outside the window is invisible. If your chat goes past the limit, older messages start getting cut off or summarised.</p>
<p>Daily-life analogy: it is your desk. You can spread out only so many papers at once. Bigger desk = you can work with more documents simultaneously. But: bigger desk also means slower (more attention to compute) and more expensive.</p>`,
        model: `Context window = how much the model can "see" at this exact moment. Outside it = doesn't exist.`,
        mistakes: [
          "Confusing context window with long-term memory. Once the request ends, the window is gone.",
          "Assuming a 1M token window means you should fill it. Quality degrades at the edges (the 'lost in the middle' problem).",
          "Forgetting that input tokens + output tokens both count against the window."
        ],
        exercise: `Take a long PDF you have. Estimate its tokens (chars / 4). Check which open models could fit it whole. Now think: would you actually want to send the whole thing, or chunk it and use RAG? You will revisit this in the RAG section.`
      },
      {
        id: "embeddings",
        title: "Embeddings",
        lesson: `<p>An <b>embedding</b> is a list of numbers that represents the meaning of a piece of text. Same idea = nearby numbers. Different ideas = far apart numbers.</p>
<p>Concretely, an embedding is a vector like <code>[0.12, -0.84, 0.33, ...]</code> with usually 768 to 3,072 dimensions. You can compare two embeddings using cosine similarity to see how related the original texts are.</p>
<p>Real-world analogy: imagine plotting every sentence on a giant map. "I love pizza" sits near "Pizza is amazing" and far from "Quantum mechanics is hard." Embeddings are the coordinates on that map.</p>
<p>This is the engine behind semantic search, RAG, clustering, and recommendation. You will use embeddings constantly.</p>`,
        model: `Embeddings = meaning turned into coordinates. Closeness on the map = similarity in meaning.`,
        mistakes: [
          "Comparing embeddings from different models. They live in different spaces, the numbers are not interchangeable.",
          "Using raw cosine values as 'percent similar.' They are relative, not absolute.",
          "Embedding huge chunks of text. The longer the chunk, the more blurred the meaning."
        ],
        exercise: `Pick 5 sentences. Generate embeddings (OpenAI <code>text-embedding-3-small</code> or any open model via Hugging Face). Compute cosine similarity between all pairs. Confirm: similar sentences score higher.`
      },
      {
        id: "transformers",
        title: "Transformers",
        lesson: `<p>The <b>Transformer</b> is the neural network architecture under almost every modern LLM (the "T" in GPT). It was introduced in the paper "Attention is All You Need" (2017) and replaced older recurrent designs.</p>
<p>Key idea: instead of reading text word by word in order (like older models), a Transformer looks at all tokens at once and figures out, for each one, which other tokens matter most. That "looking at all at once" is what makes it fast on GPUs.</p>
<p>Daily-life analogy: an old model reads a book one word at a time, top to bottom, never looking back. A Transformer spreads the whole page on a table and, for each word, draws arrows to every other word it cares about.</p>`,
        model: `Transformer = a stack of layers where each layer does "look at every other token, decide who matters, mix their information together."`,
        mistakes: [
          "Thinking Transformers process text sequentially. Training is parallel; only generation is sequential.",
          "Believing 'Transformer' means 'LLM.' Transformers also power vision, audio and protein models.",
          "Conflating the architecture with the weights. Same architecture, different weights = totally different model."
        ],
        exercise: `Read just the abstract of "Attention is All You Need" (arxiv.org/abs/1706.03762). Don't try to follow the maths yet. Just notice the words "attention," "parallel," "no recurrence." That's the vibe.`
      },
      {
        id: "attention",
        title: "Attention mechanism",
        lesson: `<p><b>Attention</b> is the trick that lets the Transformer mix information across tokens. For each token, attention computes: "how much should I listen to every other token in this sequence?"</p>
<p>Mechanically: each token produces three vectors, called Query (Q), Key (K), and Value (V). The model multiplies your Query against everyone else's Keys to get a score, softmaxes the scores so they sum to 1, then uses those scores to mix everyone's Values together. That mix becomes your new representation.</p>
<p>Daily-life analogy: you walk into a meeting and ask "who here knows about pricing?" (that is your Query). Everyone has a sign on them saying what they know (their Keys). You compare and rank. Then you actually take notes (Values) from the people whose signs matched best, weighted by how good a match they were.</p>`,
        model: `Attention = "for each token, do a soft weighted average of every other token, where the weights are learned similarity scores."`,
        mistakes: [
          "Thinking attention is one thing. There are many 'attention heads' running in parallel, each learning to focus on different patterns.",
          "Believing attention costs scale linearly with context. They are O(n²) by default, which is why long contexts are expensive.",
          "Confusing self-attention (tokens within one sequence) with cross-attention (tokens between two sequences, used in encoder-decoder models)."
        ],
        exercise: `Take this sentence: "The trophy didn't fit in the suitcase because it was too big." Identify what "it" refers to. Now do the same for: "The trophy didn't fit in the suitcase because it was too small." That's attention resolving ambiguity using context.`
      },
      {
        id: "parameters",
        title: "Parameters",
        lesson: `<p><b>Parameters</b> are the numbers (the knobs) that make up the model. A "7B parameter model" has 7 billion individually tunable numbers. These are the things training adjusts.</p>
<p>More parameters generally means more capacity to learn patterns. But: more parameters also means more memory to load, more compute to run, and more data needed to train well without overfitting.</p>
<p>Rough mental scale:</p>
<ul>
<li>1B-3B: tiny models. Run on phones. Good for narrow tasks.</li>
<li>7B-13B: small models. Run on a laptop with a decent GPU.</li>
<li>30B-70B: medium. Need serious hardware or quantization.</li>
<li>100B+: large. Cloud only. GPT-4, Claude, etc. (exact numbers are usually secret).</li>
</ul>`,
        model: `Parameters = total knobs the model has. Roughly: more knobs = more skill ceiling, more cost, slower.`,
        mistakes: [
          "Equating parameter count with quality. A well-trained 8B can beat a poorly trained 70B on specific tasks.",
          "Forgetting the rough VRAM rule: in fp16, model needs ~2x parameter count in GB. A 7B model ≈ 14GB. With quantization (e.g. Q4), divide by ~4.",
          "Counting activated parameters vs total parameters in MoE models. Very different numbers."
        ],
        exercise: `Pick 3 popular open models (e.g. Llama 3.1 8B, Qwen 2.5 14B, Mistral 7B). Look up their parameter counts and estimate VRAM at fp16 and at 4-bit. Decide which would fit on your laptop GPU.`
      },
      {
        id: "training-vs-inference",
        title: "Training vs inference",
        lesson: `<p>Two completely different phases. People mix these up constantly.</p>
<p><b>Training</b>: you take a model with random weights, feed it tons of text, and slowly adjust every parameter so it predicts the next token better. This is slow (weeks/months), needs huge clusters of GPUs, and costs millions of dollars for frontier models.</p>
<p><b>Inference</b>: you use a trained model to answer one prompt. The weights don't change. This is what you do every time you chat with ChatGPT.</p>
<p>Analogy: training is like teaching a chef every recipe in the world (years of school). Inference is asking the chef to cook one specific dish (a few minutes). The chef does not learn from your one order.</p>`,
        model: `Training = teaching (slow, expensive, rare). Inference = using (fast, cheap per call, constant).`,
        mistakes: [
          "Thinking ChatGPT 'learns' from your conversation. It does not, unless explicit fine-tuning happens later.",
          "Comparing training cost to inference cost as if they are similar. Training is a one-off megabudget; inference is a per-request cost.",
          "Believing you need to train from scratch to customise a model. You almost never do. Fine-tuning or RAG is enough."
        ],
        exercise: `Find one estimate online of (a) GPT-4 training cost and (b) the per-token API cost. Calculate how many tokens you'd have to buy to equal the training budget. The number is absurd. Internalise the gap.`
      },
      {
        id: "open-closed",
        title: "Open-source vs closed-source models",
        lesson: `<p><b>Closed-source</b>: you access the model only through an API. The provider hosts it. You don't see the weights. Examples: GPT-4, Claude, Gemini.</p>
<p><b>Open-source / open-weight</b>: the model weights are published. You can download them and run them on your own hardware. Examples: Llama, Mistral, Qwen, Gemma, DeepSeek.</p>
<p>Trade-offs:</p>
<ul>
<li>Closed: usually higher quality (today), zero infra work, but you pay per token, your data leaves your network, and you cannot fine-tune deeply.</li>
<li>Open: full control, you can fine-tune, run offline, predictable cost. But you manage GPUs, scaling, evals, security. And the very best frontier models are still closed.</li>
</ul>
<p>Most serious AI products today use both: closed APIs for hard tasks, open models for cheap/local/private tasks.</p>`,
        model: `Closed = renting a Ferrari. Open = owning a kit car you can mod. Pick based on cost, privacy, customisation, and how hard the task is.`,
        mistakes: [
          "Calling 'open weight' the same as 'open source.' Open weight ≠ open data ≠ open training code.",
          "Assuming open models are free. The model is free; the GPUs to serve it are not.",
          "Locking into one provider. Always design your stack so you can swap models."
        ],
        exercise: `Pick one task you'd want AI to do (e.g. summarise customer support tickets). Sketch two versions: one with a closed API, one with a local open model. List cost, latency, privacy, and effort for each. Which wins?`
      }
    ]
  },
  {
    section: "Datasets & Training",
    topics: [
      {
        id: "sft-datasets",
        title: "SFT datasets",
        lesson: `<p><b>SFT</b> stands for <b>Supervised Fine-Tuning</b>. An SFT dataset is a list of (input, ideal output) pairs that you use to teach a base model how to behave.</p>
<p>Example format:</p>
<pre><code>{"prompt": "Translate to French: I love pizza", "response": "J'adore la pizza"}
{"prompt": "Summarise: ...", "response": "..."}</code></pre>
<p>This is how you turn a "raw" base model (good at predicting next token, useless at chat) into an "instruct" model that answers questions politely. It is the simplest and most common form of fine-tuning.</p>
<p>Quality matters more than quantity. 1,000 hand-crafted examples often beat 100,000 noisy ones.</p>`,
        model: `SFT dataset = a stack of "here is a question, here is the perfect answer" cards. You hand the cards to the model many times until it learns the style.`,
        mistakes: [
          "Using web-scraped noisy data for SFT. Garbage in, garbage out, faster than you'd think.",
          "Making all examples too similar. The model will collapse to that one pattern.",
          "Forgetting to include 'refusal' or 'edge case' examples. Then the model has no idea what to do when something weird comes in."
        ],
        exercise: `Write 10 SFT examples by hand for a specific task you care about (e.g. turning meeting notes into a Slack update in your voice). Keep them in a <code>.jsonl</code> file. You'll need them when we hit fine-tuning.`
      },
      {
        id: "instruction-tuning",
        title: "Instruction tuning",
        lesson: `<p><b>Instruction tuning</b> is SFT but specifically with instructions and their answers. It is the recipe that turned GPT-3 (a base model) into ChatGPT (an instructable assistant).</p>
<p>The dataset format usually looks like:</p>
<pre><code>{"instruction": "Write a haiku about rain",
 "input": "",
 "output": "Soft drops on the roof..."}</code></pre>
<p>Some datasets include an "input" slot for context, some don't. The famous public ones are Alpaca, Dolly, OpenAssistant, FLAN.</p>`,
        model: `Instruction tuning = teaching the base model the game of "I ask, you answer cleanly." Same technique as SFT, just with one specific data shape.`,
        mistakes: [
          "Using only single-turn examples and then being surprised the model is bad at multi-turn chat.",
          "Forgetting system prompts in the data. The model won't learn to respect them.",

<li><b>Deduplicate</b>. Repeats inflate sample count without teaching new things.</li>

<p>Three flavours:</p>
<ul>
<li><b>Full fine-tune</b>: update every parameter. Expensive, needs lots of VRAM, gives the most change.</li>
<li><b>LoRA / QLoRA</b>: train a tiny add-on while freezing the base. Cheap and effective for most use cases.</li>
<li><b>Continued pretraining</b>: train on raw text (not Q&A pairs) to add new domain knowledge.</li>

<p>When to fine-tune vs just use a better prompt or RAG: fine-tune when you want consistent style/format/behaviour, not when you want new facts (RAG is better for that).</p>`,

<p>Example: take Llama 3 base, train it on 10B tokens of medical literature, end up with a model that understands medical jargon natively. Then do SFT on top to make it a usable assistant.</p>
<p>This is heavy. You need a lot of clean text and a lot of GPU. Most teams skip straight to SFT or LoRA. Continued pretraining only pays off when your domain is genuinely far from the base distribution (rare languages, hard sciences, niche code).</p>`,

<p>Main ways to reduce hallucinations:</p>
<ul>
<li><b>RAG</b>: give the model the actual facts in the prompt. By far the biggest lever.</li>
<li><b>Constrain</b>: use structured outputs (JSON schema, regex) to limit what the model can say.</li>
<li><b>Cite</b>: ask the model to include source quotes. Easier to spot fabrications.</li>
<li><b>Prompt</b>: tell it explicitly "if you don't know, say so." It actually helps.</li>
<li><b>Smaller temperature</b>: less randomness = less creative fabrication on factual tasks.</li>
<li><b>Tools</b>: let it call a calculator, search, or database instead of guessing.</li>
</ul>`,

<p>Why it matters: this is what makes fine-tuning a 70B model on consumer hardware possible. You can fit Llama 3.1 70B on a single 48GB GPU with QLoRA. Without it, you'd need a small cluster.</p>

        title: "KV cache",
        lesson: `<p>When a Transformer generates token by token, every new token needs to attend to every previous token. Naively, that means recomputing the Keys (K) and Values (V) for the entire prompt at every step. Expensive.</p>
<p>The <b>KV cache</b> stores the K and V vectors for tokens already processed. New tokens just compute their own Q, K, V and read everyone else's K and V from the cache. Huge speedup.</p>
<p>Cost: the cache lives in GPU memory. It grows with context length, batch size, and number of layers. For long contexts, the KV cache can be larger than the model itself.</p>`,

<p>The trick: it never writes the full attention matrix (size n × n) to slow GPU memory. Instead, it streams blocks through fast on-chip memory and combines the results cleverly. Hardware-aware engineering, not a new algorithm.</p>
<p>Result: 2-4x faster attention, much less memory used, longer contexts feasible. It is now the default in PyTorch, vLLM, and most modern inference engines.</p>`,

<p>If the big model agrees with the guesses, you got several tokens in the time of one. If it disagrees, you fall back to the standard token. Either way, the final output is exactly what the big model would have produced alone.</p>

<ul>
<li><b>Batching</b>: serve many requests on the same GPU in parallel.</li>
<li><b>KV cache management</b>: reuse, share, quantize the cache.</li>
<li><b>Quantization</b>: 4-bit weights cut compute and memory.</li>
<li><b>Flash Attention</b>: faster attention kernels.</li>
<li><b>Speculative decoding</b>: parallelise across tokens.</li>
<li><b>Tensor / pipeline parallelism</b>: split a big model across many GPUs.</li>
<li><b>Continuous batching</b>: don't wait for slow requests to finish before starting new ones (vLLM's signature trick).</li>
</ul>
<p>You rarely build these yourself. You pick an engine (vLLM, TensorRT-LLM, SGLang, llama.cpp) that does most of them for you.</p>`,

<li><b>Ingest</b>: split docs into chunks, embed them, store in a vector DB.</li>

        title: "Tool calling",
        lesson: `<p><b>Tool calling</b> (also called function calling) is when the model, instead of answering directly, emits structured JSON saying "call this function with these arguments." Your code runs the function and feeds the result back. The model continues the conversation with that result in hand.</p>
<p>Why: models are bad at maths, can't access the web, can't read your database. Give them tools and they suddenly can. This is the bedrock of agents.</p>
<p>Typical flow:</p>
<ol>
<li>You declare tools (name, description, parameter schema).</li>
<li>Model decides whether to call one and emits a JSON call.</li>
<li>Your code runs the tool, returns the result.</li>
<li>Model uses the result to answer.</li>

<li><b>Prompt chaining</b>: A → B → C in fixed order.</li>

/* ------------------------------------------------------------------
   STATE
   ------------------------------------------------------------------ */
const STORAGE_KEY = "llm-course-state-v1";
let STATE = loadState();

function defaultState() {
  return { completed: {}, currentId: COURSE[0].topics[0].id, search: "" };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  } catch (e) {
    return defaultState();
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
}

/* Helpers to flatten and find topics */
const ALL_TOPICS = COURSE.flatMap(s => s.topics.map(t => ({ ...t, section: s.section })));
function topicById(id) { return ALL_TOPICS.find(t => t.id === id); }
function nextTopic(id) {
  const idx = ALL_TOPICS.findIndex(t => t.id === id);
  return idx < ALL_TOPICS.length - 1 ? ALL_TOPICS[idx + 1] : null;
}
function prevTopic(id) {
  const idx = ALL_TOPICS.findIndex(t => t.id === id);
  return idx > 0 ? ALL_TOPICS[idx - 1] : null;
}

/* ------------------------------------------------------------------
   RENDER
   ------------------------------------------------------------------ */
function renderNav() {
  const nav = document.getElementById("nav");
  const q = (STATE.search || "").trim().toLowerCase();
  nav.innerHTML = "";
  COURSE.forEach(section => {
    const filtered = section.topics.filter(t => !q || t.title.toLowerCase().includes(q) || (t.section || "").toLowerCase().includes(q));
    if (!filtered.length) return;
    const h = document.createElement("div");
    h.className = "section-title";
    h.textContent = section.section;
    nav.appendChild(h);
    filtered.forEach(t => {
      const el = document.createElement("div");
      el.className = "topic" + (STATE.completed[t.id] ? " done" : "") + (STATE.currentId === t.id ? " active" : "");
      el.innerHTML = `<span class="check"></span><span class="label">${t.title}</span>`;
      el.addEventListener("click", () => {
        STATE.currentId = t.id;
        saveState();
        renderAll();
        window.scrollTo({ top: 0, behavior: "instant" });
      });
      nav.appendChild(el);
    });
  });
}

function renderProgress() {
  const total = ALL_TOPICS.length;
  const done = Object.values(STATE.completed).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progressLabel").textContent = `${done} / ${total}`;
  document.getElementById("progressPct").textContent = `${pct}%`;
  document.getElementById("progressFill").style.width = pct + "%";
}

function renderContent() {
  const t = topicById(STATE.currentId) || ALL_TOPICS[0];
  const isDone = !!STATE.completed[t.id];
  const sectionName = t.section || "";
  const idx = ALL_TOPICS.findIndex(x => x.id === t.id);
  const html = `
    <div class="crumbs"><span class="pill">${sectionName}</span> &nbsp; Topic ${idx + 1} of ${ALL_TOPICS.length}</div>
    <h2 class="topic-title">${t.title}</h2>
    <div class="meta">${isDone ? "Marked complete" : "Not yet completed"}</div>

    <div class="card lesson">
      <h3>Lesson</h3>
      ${t.lesson}
    </div>

    <div class="card model">
      <h3>Mental model</h3>
      <p>${t.model}</p>
    </div>

    <div class="card mistakes">
      <h3>Common beginner mistakes</h3>
      <ul>${t.mistakes.map(m => `<li>${m}</li>`).join("")}</ul>
    </div>

    <div class="card exercise">
      <h3>Exercise</h3>
      <p>${t.exercise}</p>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" ${prevTopic(t.id) ? "" : "disabled"}>← Previous</button>
      <button class="complete-btn ${isDone ? "done" : ""}" id="completeBtn">${isDone ? "✓ Completed (click to undo)" : "Mark as complete"}</button>
      <button class="nav-btn" id="nextBtn" ${nextTopic(t.id) ? "" : "disabled"}>Next →</button>
    </div>
    <div class="hint">Tip: use <span class="kbd">←</span> and <span class="kbd">→</span> to navigate, <span class="kbd">c</span> to toggle complete.</div>
    <div class="tagline">made by James, stealing Dave's idea, which he stole from Linkedin in the first place</div>
  `;
  document.getElementById("content").innerHTML = html;

  document.getElementById("prevBtn").addEventListener("click", () => goPrev());
  document.getElementById("nextBtn").addEventListener("click", () => goNext());
  document.getElementById("completeBtn").addEventListener("click", () => toggleComplete());
}

function renderAll() {
  renderNav();
  renderProgress();
  renderContent();
}

/* ------------------------------------------------------------------
   ACTIONS
   ------------------------------------------------------------------ */
function toggleComplete() {
  STATE.completed[STATE.currentId] = !STATE.completed[STATE.currentId];
  saveState();
  renderAll();
}
function goNext() {
  const n = nextTopic(STATE.currentId);
  if (n) { STATE.currentId = n.id; saveState(); renderAll(); window.scrollTo({ top: 0, behavior: "instant" }); }
}
function goPrev() {
  const p = prevTopic(STATE.currentId);
  if (p) { STATE.currentId = p.id; saveState(); renderAll(); window.scrollTo({ top: 0, behavior: "instant" }); }
}

/* Reset / Export / Import */
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Reset all progress? This cannot be undone.")) {
    STATE = defaultState();
    saveState();
    renderAll();
  }
});
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "llm-course-progress.json";
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("importBtn").addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        STATE = Object.assign(defaultState(), parsed);
        saveState();
        renderAll();
      } catch (err) {
        alert("Invalid file.");
      }
    };
    reader.readAsText(file);
  };
  input.click();
});

document.getElementById("search").addEventListener("input", (e) => {
  STATE.search = e.target.value;
  saveState();
  renderNav();
});

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowRight") goNext();
  else if (e.key === "ArrowLeft") goPrev();
  else if (e.key.toLowerCase() === "c") toggleComplete();
});

/* Init */
document.getElementById("search").value = STATE.search || "";
renderAll();
</script>
